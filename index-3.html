   tips:['"ТОЛЬКО JSON без лишнего текста" — добавляй всегда','Markdown напрямую в Obsidian','Структурированный формат = основа автоматизации']},
  {t:'Роли и Chain-of-Thought',xp:120,
   theory:`<h3>Почему роли работают — механика "активации экспертизы"</h3>
<p>Claude обучался на огромном корпусе текстов написанных реальными людьми разных профессий: CMO, разработчики, врачи, юристы, аналитики. Каждая профессия имеет свой стиль мышления, словарь, типичные вопросы которые она задаёт. Когда ты задаёшь роль — ты буквально активируешь этот "паттерн мышления" в модели.</p>
<p>Это не ролевая игра — это фокусировка. Без роли Claude отвечает усреднённо. С конкретной ролью он воспроизводит специфическое мышление этого типа специалиста.</p>
<h3>Три уровня ролей — как конкретизировать</h3>
<table><tr><th>Уровень</th><th>Пример</th><th>Что активирует</th></tr>
<tr><td>Базовый</td><td>"Ты — маркетолог"</td><td>Общий маркетинговый стиль</td></tr>
<tr><td>Средний</td><td>"Ты — CMO B2B SaaS с 10-летним опытом"</td><td>Специфику B2B, Product-Led Growth</td></tr>
<tr><td>Продвинутый</td><td>"Ты — скептичный инвестор который видел 200+ питчей и ценит честность выше оптимизма"</td><td>Конкретный угол зрения, предрассудки, стиль</td></tr></table>
<h3>Chain-of-Thought — почему это работает</h3>
<p>Исследования Anthropic и других лабораторий показывают: когда модель "думает вслух" пошагово — она делает на 30-50% меньше ошибок в сложных задачах. Механизм: явное рассуждение заставляет модель "проверять" каждый шаг прежде чем двигаться дальше, вместо прямого перехода от вопроса к ответу.</p>
<p>CoT особенно критичен для:</p>
<ul><li>Математических и логических задач</li><li>Многошаговых бизнес-решений (ценообразование, стратегия)</li><li>Анализа рисков — нужно рассмотреть каждый сценарий</li><li>Сложного кода где каждый шаг зависит от предыдущего</li></ul>
<h3>Техника "опровержения" для баланса</h3>
<p>После CoT-ответа добавь: <code>"А теперь попробуй опровергнуть свой вывод"</code>. Это вынуждает Claude рассмотреть контраргументы. Результат — более взвешенный и честный анализ. Особенно ценно для важных бизнес-решений.</p>
<div class="tip-box"><strong>💡 Самая мощная комбинация:</strong> Конкретная роль + CoT + запрос на опровержение = качество консультации уровня senior-специалиста за 30 секунд.</div>`,
   prompts:[{l:'Роль + CoT',p:`Ты — [роль] с [опыт] в [специализация].\nСтиль: [прямой/детальный].\n\nДумай шаг за шагом:\n1. Анализируй ситуацию\n2. Рассмотри варианты\n3. Оцени риски\n4. Дай рекомендацию\n\nЗадача: [опиши]`},{l:'Два эксперта',p:`Оцени идею с двух перспектив:\n\nОПТИМИСТ (венчурный инвестор):\n- Возможности и почему сработает\n\nСКЕПТИК (предприниматель с провалами):\n- Главные риски\n- Что упускаю\n\nИдея: [опиши]`}],
   steps:[{s:'Скопируй "Роль + CoT"',copy:true},{s:'Придумай роль для задачи'},{s:'После ответа: "Теперь опровергни вывод"'},{s:'Сравни с обычным промптом'}],
   tips:['Конкретнее роль — точнее ответ','CoT обязателен для необратимых решений','Два эксперта — лучший инструмент для решений']},
  {t:'Библиотека промптов и метапромптинг',xp:120,
   theory:`<h3>Почему библиотека промптов — это актив а не удобство</h3>
<p>Каждый хороший промпт который ты создал — это конкурентное преимущество. Конкурент который работает с Claude второй месяц будет получать средние результаты. Ты, с библиотекой из 30 проверенных шаблонов, получаешь результат в 3-5 раз лучше за то же время.</p>
<p>Аналогия: SOP (стандартная операционная процедура) в бизнесе. Один раз написал хорошо — все используют одинаково хорошо. Промпт — это SOP для работы с AI.</p>
<h3>Анатомия хорошего шаблона</h3>
<ul><li><strong>Роль</strong> — кто отвечает (задаёт экспертизу)</li><li><strong>Контекст с {{переменными}}</strong> — что подставляется каждый раз</li><li><strong>Задача</strong> — что конкретно нужно сделать</li><li><strong>Формат</strong> — как оформить результат</li><li><strong>Ограничения</strong> — что исключить</li></ul>
<h3>Метапромптинг — почему Claude пишет промпты лучше тебя</h3>
<p>Это не преувеличение. Claude обучался на тысячах примеров хороших промптов и знает что работает лучше большинства пользователей. Когда просишь "напиши оптимальный промпт для задачи X" — он применяет этот опыт. Стандартный результат: промпт от Claude работает на 20-40% лучше чем написанный с нуля самостоятельно.</p>
<h3>Где хранить библиотеку</h3>
<table><tr><th>Место</th><th>Плюсы</th><th>Когда использовать</th></tr>
<tr><td><strong>Project Instructions</strong></td><td>Всегда активен, не нужно копировать</td><td>5-10 главных шаблонов для проекта</td></tr>
<tr><td><strong>Obsidian</strong></td><td>Теги, поиск, [[wikilinks]]</td><td>Личная библиотека 30-100+ шаблонов</td></tr>
<tr><td><strong>Notion</strong></td><td>Командный доступ, комментарии</td><td>Общая библиотека команды</td></tr></table>
<div class="info-box"><strong>ℹ️ Few-shot в промптах:</strong> Добавь 2-3 примера желаемого результата прямо в промпт. Claude "учится" на них и точно воспроизводит паттерн. Это работает лучше длинных объяснений что нужно сделать — покажи, не рассказывай.</div>`,
   prompts:[{l:'Шаблон',p:`Ты — контент-стратег {{БРЕНД}}.\nАудитория: {{АУДИТОРИЯ}}.\n\nСоздай пост для {{ПЛАТФОРМА}} на тему "{{ТЕМА}}"\nТон: {{ТОН}}\nДлина: до {{ДЛИНА}} слов`},{l:'Метапромпт',p:`Напиши оптимальный промпт для:\n\nЗАДАЧА: [опиши]\nАУДИТОРИЯ: [кто читает результат]\nЦЕЛЬ: [желаемый результат]\nОГРАНИЧЕНИЯ: [что исключить]`}],
   steps:[{s:'Создай 5 шаблонов с {{переменными}}'},{s:'Скопируй метапромпт',copy:true},{s:'Попроси Claude написать промпт для задачи'},{s:'Загрузи лучшие в Project Instructions'}],
   tips:['Тестируй промпт 3-5 раз перед добавлением','Метапромпт часто лучше написанного вручную','Few-shot: дай 2-3 примера формата']}
]},
prompts:{id:'prompts',title:'Промпт-инжиниринг',icon:'🧠',color:'#6667AB',desc:'Мастерство запросов',diff:'easy',missions:[
  {t:'TCFR: профессиональная структура',xp:120,
   theory:`<h3>TCFR — почему этот фреймворк работает лучше интуитивного написания</h3>
<p>Большинство людей пишут промпты интуитивно — описывают что хотят, как пришло в голову. Результат непредсказуем. TCFR — это контрольный список, который гарантирует что ты передал Claude <strong>всё необходимое для точного ответа</strong>, ничего не упустив.</p>
<p>Каждый блок закрывает конкретный вопрос который Claude иначе вынужден угадывать:</p>
<table><tr><th>Блок</th><th>Что передаёт</th><th>Что происходит без него</th></tr>
<tr><td><strong>Task</strong></td><td>Что нужно сделать</td><td>Claude угадывает цель → промахивается</td></tr>
<tr><td><strong>Context</strong></td><td>Для кого, зачем, в каком окружении</td><td>Ответ слишком общий, не применимый</td></tr>
<tr><td><strong>Format</strong></td><td>Как оформить результат</td><td>Claude выбирает удобный ему формат</td></tr>
<tr><td><strong>Rules</strong></td><td>Что исключить, ограничить, запретить</td><td>Claude добавляет нежелательное</td></tr></table>
<h3>Почему Context — самый важный блок</h3>
<p>Исследование внутри Anthropic: добавление подробного контекста улучшает качество ответа сильнее чем любой другой элемент промпта. Контекст устраняет неопределённость — главного врага точных ответов. Что входит в хороший контекст:</p>
<ul><li><strong>Кто ты:</strong> роль, экспертиза, ограничения ("я не технический специалист")</li><li><strong>Для кого:</strong> аудитория с её особенностями</li><li><strong>Зачем:</strong> конечная цель (не "написать письмо", а "вернуть клиента который ушёл 90 дней назад")</li><li><strong>Что уже есть:</strong> что пробовал, что не сработало</li></ul>
<h3>Rules — блок который чаще всего забывают</h3>
<p>Rules убирают то, что Claude добавляет по умолчанию но тебе не нужно. Примеры: без длинных введений, без буллетов (только prose), без упоминания конкурентов, без агрессивных призывов к покупке, без звёздочек и эмодзи.</p>
<div class="warn-box"><strong>⚠️ Типичная ошибка:</strong> Писать Task + Context и останавливаться. Format и Rules кажутся необязательными — но именно они убирают 80% нежелательного в ответе. Не пропускай их.</div>
<div class="tip-box"><strong>💡 Ускоренная версия TCFR:</strong> Не обязательно писать заголовки "ЗАДАЧА:", "КОНТЕКСТ:". Просто убедись что в промпте есть: что сделать + для кого + как оформить + что исключить. Порядок не важен.</div>`,
   prompts:[{l:'Полный TCFR',p:`ЗАДАЧА: Напиши реактивационный email.\n\nКОНТЕКСТ:\n- SaaS для управления проектами\n- Клиент не активен 90+ дней\n- Ценность: 3+ ч/неделю, чек 5000₽/мес\n\nФОРМАТ:\n- Subject (55 символов)\n- Preview text (40 символов)\n- Тело: 130-150 слов от CEO\n\nПРАВИЛА:\n- Без скидок\n- 1 CTA максимум`},{l:'Шаблон',p:`T: [задача]\nC: [контекст]\nF: [формат]\nR: [ограничения]`}],
   steps:[{s:'Скопируй полный TCFR',copy:true},{s:'Адаптируй — заполни 4 блока'},{s:'Сравни с результатом без структуры'},{s:'Создай 3 TCFR шаблона'}],
   tips:['Context — самый важный блок','Rules убирают нежелательное','Сохраняй рабочие шаблоны']},
  {t:'1M токенов и управление контекстом',xp:120,
   theory:`<h3>1M токенов — что это значит на практике</h3>
<p>1 миллион токенов ≈ 750 000 слов ≈ весь роман "Война и мир" целиком. Или: полный кодовый репозиторий среднего приложения + вся документация + история изменений. Это GA (Generally Available) с марта 2026 для Sonnet 4.6 и Opus 4.7.</p>
<p>Что это меняет в работе: больше не нужно делить документы на части, суммаризировать и передавать по кускам. Всё помещается в один запрос.</p>
<h3>Как Claude на самом деле использует длинный контекст</h3>
<p>Важный нюанс который мало кто знает: Claude не читает контекст "равномерно". Механизм attention работает так, что <strong>недавнее (конец контекста) и явно выделенное (начало / XML-теги) обрабатывается точнее</strong> чем "середина". Это называется "lost in the middle" эффект.</p>
<p>Практический вывод:</p>
<ul><li>Самое важное пиши в начале или в конце, не в середине</li><li>Используй XML-теги для ключевых секций — они привлекают внимание модели</li><li>В очень длинных чатах явно напоминай ключевые факты: "Напомню: мы работаем над X для Y"</li></ul>
<h3>XML-теги — почему они помогают</h3>
<p>Claude обучался на огромном количестве XML/HTML-разметки. Теги создают структурные якоря — Claude лучше разграничивает части промпта. Практические теги:</p>
<ul><li><code>&lt;context&gt;</code> — фоновая информация</li><li><code>&lt;task&gt;</code> — что нужно сделать</li><li><code>&lt;example&gt;</code> — образец желаемого результата</li><li><code>&lt;output&gt;</code> — указания по формату</li><li><code>&lt;rules&gt;</code> — ограничения</li></ul>
<h3>Суммаризация в длинных чатах</h3>
<p>Даже при 1M контексте длинные чаты накапливают "шум". Каждые 30-50 сообщений делай суммаризацию: "Резюмируй ключевые решения и факты из нашего разговора в 200 словах." Это обновляет "фокус" Claude на важном, а не на деталях переписки.</p>
<div class="info-box"><strong>ℹ️ Практический тест 1M контекста:</strong> Загрузи в Project весь кодовой репозиторий своего приложения и спроси "Опиши архитектуру этого проекта, найди потенциальные проблемы и предложи улучшения." Это задача которую раньше занимала дни у команды.</div>`,
   prompts:[{l:'XML структура',p:`<context>\nЯ [кто]. Работаю над [проект]. ЦА: [аудитория].\nКонтекст: [факты]\n</context>\n\n<task>\n[Задача]\n</task>\n\n<format>\n[Формат ответа]\n</format>\n\n<rules>\n- [правило 1]\n</rules>`},{l:'Суммаризация',p:`Суммаризируй что обсудили:\n1. Ключевые решения\n2. Открытые вопросы\n3. Подтверди факт: [ключевой факт]\n\nПотом продолжим.`}],
   steps:[{s:'Скопируй XML-структуру',copy:true},{s:'Адаптируй под свой контекст'},{s:'Используй суммаризацию каждые ~50 сообщений'},{s:'Загрузи весь репозиторий как контекст'}],
   tips:['1M контекст: весь репозиторий в одном запросе!','XML-теги = разделители для Claude','Явно напоминай ключевые факты']},
  {t:'Few-shot и Extended Thinking',xp:150,
   theory:`<h3>Few-shot обучение — почему примеры работают лучше инструкций</h3>
<p>Это контринтуитивно, но правда: <strong>показать 2-3 примера обычно эффективнее чем объяснять что нужно делать</strong>. Механизм называется in-context learning — Claude видит паттерн в примерах и воспроизводит его для новых данных.</p>
<p>Почему это работает: инструкции описывают правило абстрактно. Примеры показывают конкретное применение. Для паттернов (стиль письма, структура, тон) примеры намного информативнее словесных описаний.</p>
<h3>Сколько примеров нужно</h3>
<ul><li><strong>1 пример</strong> — лучше чем ничего, но Claude может переобобщить</li><li><strong>2-3 примера</strong> — оптимум для большинства задач. Claude видит паттерн, не частный случай</li><li><strong>5+ примеров</strong> — для сложных паттернов с вариативностью. Убедись что примеры разнообразные, не повторяют друг друга</li></ul>
<h3>Extended Thinking — механика Opus 4.7</h3>
<p>Extended Thinking — это буквальное "думание вслух" до ответа. Внутренний монолог Claude который виден в интерфейсе как свёрнутый блок. Активируется автоматически для Opus 4.7 когда задача требует многошагового рассуждения.</p>
<p>Что происходит внутри: Claude генерирует промежуточные рассуждения, проверяет их, исправляет себя до того как дать финальный ответ. Аналог "черновика" у человека. Исследования Anthropic: Extended Thinking снижает количество ошибок в сложных задачах на 30-70% в зависимости от типа задачи.</p>
<h3>Tree-of-Thought — параллельное исследование</h3>
<p>Продвинутая версия CoT: Claude одновременно исследует несколько путей решения, оценивает каждый и выбирает лучший. Особенно эффективно для задач где нет очевидного единственного решения: архитектурные решения, стратегические выборы, оптимизация.</p>
<div class="tip-box"><strong>💡 Когда использовать какой подход:</strong><br>
Простая задача → обычный промпт<br>
Важное решение → Chain-of-Thought ("думай шаг за шагом")<br>
Сложная задача с несколькими вариантами → Tree-of-Thought (3 подхода → сравнение → выбор)<br>
Нестандартный формат → Few-shot (2-3 примера)<br>
Максимальная точность → Opus 4.7 с Extended Thinking</div>`,
   prompts:[{l:'Few-shot',p:`Создай [тип] по шаблону:\n\nПРИМЕР 1:\nВход: [пример]\nВыход: [пример]\n\nПРИМЕР 2:\nВход: [пример]\nВыход: [пример]\n\n---\nМои данные:\nВход: [данные]`},{l:'Tree-of-Thought',p:`Реши задачу методом Tree-of-Thought:\n\nЗАДАЧА: [опиши]\n\n1. Предложи 3 принципиально разных подхода\n2. Для каждого — 2-3 шага реализации\n3. Оцени лучший путь\n4. Детально разработай победивший`}],
   steps:[{s:'Скопируй Few-shot шаблон',copy:true},{s:'Добавь 2-3 примера своего формата'},{s:'Попробуй Tree-of-Thought для сложной задачи'},{s:'Сравни с обычным промптом'}],
   tips:['3 примера достаточно для большинства','Для Opus 4.7 — Extended Thinking включается автоматически','ToT особенно хорош для архитектурных решений']},
  {t:'Системные промпты и Advisor Tool',xp:120,
   theory:`<h3>Что такое системный промпт и как он работает</h3>
<p>Системный промпт — это невидимая инструкция которую Claude получает до начала разговора. В отличие от обычного сообщения, системный промпт имеет приоритет: Claude обучен следовать ему строже. Это как "должностная инструкция" — ты устанавливаешь правила поведения раз и они применяются к каждому чату.</p>
<p>В claude.ai это называется Project Instructions. В API — поле system. Одна и та же концепция, разные интерфейсы.</p>
<h3>Что системный промпт умеет делать</h3>
<ul><li><strong>Задать роль и экспертизу:</strong> "Ты — опытный маркетолог в B2B SaaS" — Claude активирует соответствующий стиль мышления</li><li><strong>Загрузить постоянный контекст:</strong> информация о компании, продукте, аудитории которая применяется автоматически</li><li><strong>Установить формат по умолчанию:</strong> "Всегда отвечай по-русски и структурируй с заголовками"</li><li><strong>Добавить ограничения:</strong> "Никогда не упоминай конкурентов по имени", "Не давай медицинских советов"</li></ul>
<h3>Как писать эффективный системный промпт</h3>
<ul><li><strong>Конкретность > длина:</strong> "Отвечай в 3-5 предложениях если не просят подробнее" работает лучше чем "Будь лаконичен"</li><li><strong>Примеры работают:</strong> добавь образец ответа в нужном стиле прямо в промпт</li><li><strong>Тестируй крайние случаи:</strong> задавай необычные вопросы — промпт должен держаться</li><li><strong>Обновляй регулярно:</strong> по мере развития бизнеса контекст меняется</li></ul>
<h3>Advisor Tool (бета март 2026) — Opus как стратег</h3>
<p>Advisor Tool решает экономическую задачу: Opus 4.7 значительно умнее Sonnet 4.6 для сложных рассуждений, но в 5+ раз дороже. Advisor Tool позволяет использовать Opus только для планирования и проверки (~10-15% стоимости запроса), пока Sonnet выполняет основную работу. Итог: качество близкое к Opus при стоимости близкой к Sonnet. Beta header: <code>anthropic-beta: advisor-tool-2026-03-01</code></p>
<div class="tip-box"><strong>💡 Лайфхак для Project Instructions:</strong> Добавь секцию "Примеры хорошего ответа" — 2-3 образца в нужном стиле. Claude учится на примерах лучше чем на абстрактных правилах. Это заметно повышает качество ответов сразу после настройки.</div>`,
   prompts:[{l:'Системный промпт',p:`Ты — AI-ассистент для [проект].\n\nКОНТЕКСТ: [описание]\nРОЛЬ: [кто я]\n\nСТИЛЬ:\n- Тон: экспертный, без снобизма\n- Язык: русский\n- Структурированно\n\nВСЕГДА:\n- [правило 1]\n- [правило 2]`},{l:'Персонализация',p:`Оцени системный промпт:\n\n[вставь промпт]\n\n1. Что работает хорошо?\n2. Чего не хватает?\n3. Противоречия?\n4. Предложи улучшение`}],
   steps:[{s:'Скопируй шаблон системного промпта',copy:true},{s:'Создай Project → вставь'},{s:'Протестируй 10 разных запросов'},{s:'Используй "Персонализацию" для улучшения'}],
   tips:['Обновляй раз в квартал','Advisor Tool Beta: Opus стратегически направляет Sonnet','Project Instructions = системный промпт без повторений']}
]},
marketing:{id:'marketing',title:'Маркетинг',icon:'📣',color:'#E05A2B',desc:'Digital marketing с Claude',diff:'easy',missions:[
  {t:'Brand Voice и системный промпт',xp:150,
   theory:`<h3>Что такое Brand Voice и почему без него Claude пишет "как все"</h3>
<p>Представь что ты нанял нового копирайтера. Без инструктажа он напишет профессионально, грамотно — но не "твоим голосом". Читатель не почувствует твою личность. То же самое с Claude: без Brand Voice он отвечает усреднённо — хорошо, но безлично.</p>
<p>Brand Voice — это документ-инструкция, который описывает: <em>кто ты, как говоришь, для кого пишешь и что никогда не делаешь</em>. Вставляешь его в начало маркетинговых запросов — и Claude мгновенно "переключается" в голос твоего бренда.</p>
<h3>Почему это критично для бизнеса</h3>
<p>Исследование Nielsen показало: последовательность бренда повышает выручку на 10–20%. Люди покупают у тех кого узнают. Когда твои посты в Instagram, письма и сайт звучат одинаково — ты строишь доверие. Когда каждый пост звучит по-разному — аудитория не запоминает тебя.</p>
<h3>Из чего состоит Brand Voice</h3>
<ul><li><strong>Суть бренда</strong> — 2-3 предложения: кто вы, кому помогаете, каким способом</li><li><strong>Personality traits</strong> — 3-5 прилагательных: "прямой", "экспертный", "человечный"</li><li><strong>Tone of Voice</strong> — как разговариваете с читателем: формально или на "ты", с юмором или строго</li><li><strong>Целевая аудитория</strong> — конкретный человек с его болями и словарём</li><li><strong>Taboo</strong> — что никогда не делаете: избыточные обещания, корпоративный язык, агрессивные продажи</li></ul>
<h3>Где хранить и как использовать</h3>
<p>Лучшее место — Project Instructions в Claude.ai. Создай отдельный Project "Маркетинг", вставь Brand Voice в инструкции — и он будет применяться автоматически к каждому чату в этом проекте. Не нужно копировать его вручную каждый раз.</p>
<div class="warn-box"><strong>⚠️ Типичная ошибка:</strong> Писать Brand Voice как список правил без примеров. Добавь 2-3 примера в стиле "Пишем ТАК: [пример] — Не пишем ТАК: [пример]". С примерами Claude следует стилю на 40% точнее.</div>`,
   prompts:[{l:'Brand Voice',p:`=== BRAND VOICE: [Название] ===\n\nСУТЬ: Мы — [описание]. Помогаем [аудитория] достичь [результат].\n\nПЕРСОНАЛЬНОСТЬ:\n- [черта 1]\n- [черта 2]\n\nТОН: [стиль]\nАУДИТОРИЯ: [портрет]\n\nMESSEGES:\n1. [ценность]\n\nTABOO:\n- [запрет 1]`},{l:'Тест',p:`Напиши пост ДВАЖДЫ:\n1. БЕЗ Brand Voice\n2. С Brand Voice: [вставь]\nОцени разницу.`}],
   steps:[{s:'Скопируй шаблон Brand Voice',copy:true},{s:'Заполни под бренд'},{s:'Тест: пост без/с промптом'},{s:'Сохрани в Project Instructions'}],
   tips:['Обновляй раз в квартал','Сохрани в Project Instructions — автоматический Brand Voice','Тест: знакомый должен узнать стиль']},
  {t:'Контент-машина: 1 тезис → 7 форматов',xp:180,
   theory:`<h3>Почему большинство предпринимателей тратят 80% времени на 20% результата</h3>
<p>Классическая ошибка в контент-маркетинге: создавать разный контент для каждого канала с нуля. Instagram пост отдельно, email отдельно, LinkedIn отдельно. Это огромные затраты времени при маленькой отдаче.</p>
<p>Профессиональные контент-стратеги работают иначе: один сильный тезис → адаптация под каждый канал. Один раз придумал идею — получил контент на неделю вперёд. Именно это и делает Claude за один запрос.</p>
<h3>Что такое "сильный тезис"</h3>
<p>Тезис — это не тема ("маркетинг") и не заголовок. Это конкретное утверждение которое можно оспорить, с которым люди согласятся или не согласятся. Примеры:</p>
<ul><li>Слабый: "Важность клиентского сервиса" → слишком общо</li><li>Сильный: "80% предпринимателей теряют клиентов не из-за цены, а из-за медленного ответа" → конкретно, вызывает реакцию</li></ul>
<h3>Пирамида контента — как это работает</h3>
<p>Один тезис превращается в контент разного объёма для разных платформ:</p>
<ul><li><strong>Длинный формат</strong> (YouTube видео или статья в блоге) — полное раскрытие темы</li><li><strong>Средний формат</strong> (пост LinkedIn, Telegram) — ключевые идеи из длинного</li><li><strong>Короткий формат</strong> (Instagram Stories, цитата) — один инсайт из среднего</li></ul>
<p>Claude делает эту пирамиду за один запрос — ты получаешь все уровни одновременно и выбираешь что публиковать.</p>
<h3>Где брать тезисы которые работают</h3>
<ul><li><strong>Вопросы клиентов</strong> — лучший источник. Что тебя спрашивают на встречах? Это готовый контент</li><li><strong>Собственные ошибки</strong> — "Что я делал неправильно 2 года" читают все</li><li><strong>Контринтуитивные выводы</strong> — когда ты думал что X, но оказалось Y</li><li><strong>Конкретные кейсы</strong> — результат клиента с цифрами</li></ul>
<div class="tip-box"><strong>💡 Ключевой принцип:</strong> Контент от Claude — это структура и слова. Данные и примеры — твои. Добавляй реальные числа из своего опыта — именно это делает AI-контент живым и доверенным.</div>`,
   prompts:[{l:'7 форматов',p:`[Brand Voice]\n\nТЕЗИС: "[инсайт]"\n\n1. INSTAGRAM: хук + раскрытие + CTA (150 слов)\n2. LINKEDIN: заголовок + лид + 3 раздела (400 слов)\n3. TELEGRAM: разговорный (100 слов)\n4. REELS: хук 3с + 27с + CTA\n5. EMAIL ТЕМЫ: 5 вариантов A/B\n6. КАРУСЕЛЬ: заголовок + 6 слайдов\n7. THREAD: 5-7 постов`},{l:'Контент-план',p:`[Brand Voice]\nКонтент-план 30 дней для [платформа].\n\nНИША: [ниша]\nЦЕЛЬ: [цель]\nЧАСТОТА: [X/неделю]\n\nДля каждой недели: фокус + 3 поста + тип каждого`}],
   steps:[{s:'Придумай 1 конкретный инсайт'},{s:'Скопируй "7 форматов"',copy:true},{s:'Запусти с Brand Voice'},{s:'Запланируй в Buffer'}],
   tips:['1 сильный тезис > 10 слабых','Добавляй реальные цифры из опыта','Планируй месяц вперёд — 3-4 часа/неделю']},
  {t:'A/B тестирование текстов',xp:200,
   theory:`<h3>Почему "мне кажется что это сработает" — худшая стратегия в маркетинге</h3>
<p>Каждый маркетолог уверен что знает что нравится своей аудитории. Исследования раз за разом показывают: интуиция ошибается в ~70% случаев. Subject line которую ты считаешь скучной — часто открывают в 2 раза чаще "яркой". Единственный способ узнать правду — тест.</p>
<p>A/B тестирование — это метод сравнения двух вариантов на реальной аудитории. Половина людей видит вариант A, половина — вариант B. Побеждает тот у которого лучше метрика (открытия, клики, конверсии). Никаких мнений — только данные.</p>
<h3>Что тестировать и в каком порядке</h3>
<p>Тестируй элементы которые влияют на самый верх воронки — там наибольший рычаг:</p>
<ul><li><strong>Subject line email</strong> → влияет на open rate (открытия). Даже 5% разница = сотни дополнительных читателей</li><li><strong>Хук поста</strong> → первые 2 строки решают будут ли читать дальше. В Instagram это особенно критично — люди скроллят за 0.3 секунды</li><li><strong>CTA (призыв к действию)</strong> → последний элемент который видит читатель. "Купить" vs "Попробовать бесплатно" может давать 30-40% разницы в кликах</li><li><strong>Заголовок лендинга</strong> → определяет останется ли посетитель на странице</li></ul>
<h3>Что Claude делает в A/B тестировании</h3>
<p>Claude генерирует варианты каждый из которых основан на разном психологическом триггере. Он не просто придумывает — он объясняет почему каждый вариант должен работать: любопытство, срочность, социальное доказательство, личная выгода. Это позволяет не просто выбрать победителя, но и понять паттерн что работает с твоей аудиторией.</p>
<div class="info-box"><strong>ℹ️ Минимальная статистика:</strong> Для значимого результата нужно минимум 100 показов каждого варианта. Тестируй один элемент за раз — иначе не поймёшь что именно сработало.</div>`,
   prompts:[{l:'A/B система',p:`5 вариантов subject line.\n\nКОНТЕКСТ: [описание]\n\nДля каждого:\n1. Subject (55 символов)\n2. Preview text (40 символов)\n3. Психологический триггер\n4. Прогноз OR\n5. Для какого сегмента\n\nКакие 2 тестировать первыми?`},{l:'Анализ текущего',p:`Проанализируй текст.\n\nТЕКСТ: [вставь]\nМЕТРИКИ: [OR%, CTR%]\nАУДИТОРИЯ: [описание]\n\n1. Главные проблемы\n2. Что работает\n3. 3 варианта улучшения`}],
   steps:[{s:'Скопируй "A/B система"',copy:true},{s:'Примени к актуальному элементу'},{s:'Запусти тест с реальной аудиторией'},{s:'Через 2 недели: анализ результатов'}],
   tips:['Тестируй 1 элемент за раз','Только с данными A/B осмысленно','Claude генерирует — ты оцениваешь аудиторию']},
  {t:'Email-маркетинг система',xp:180,
   theory:`<h3>Почему email — единственный канал который ты реально контролируешь</h3>
<p>Instagram может изменить алгоритм завтра — и твой охват упадёт с 30% до 2%. Telegram могут заблокировать. Google может убрать твой сайт из выдачи. Но список email-адресов твоих подписчиков — это твоя собственность. Никакая компания не может её забрать.</p>
<p>Именно поэтому ROI email-маркетинга — $42 на каждый вложенный $1 по данным Litmus (2026). Это в 4 раза выше социальных сетей. Ты разговариваешь с людьми которые уже подняли руку и сказали "я хочу слышать от тебя".</p>
<h3>Психология Welcome-серии — почему первые 7 дней решают всё</h3>
<p>Когда человек подписывается — он находится в точке максимального интереса. Это как первое свидание: он думает о тебе, ждёт. Mailchimp данные: письма отправленные в первые 24 часа открывают в 4 раза чаще среднего. Через неделю интерес падает вдвое. Через месяц подписчик уже не помнит почему подписался.</p>
<p>Welcome-серия использует этот пик: первые 7 дней ты выстраиваешь отношения, а не продаёшь. К моменту оффера на 7-й день человек уже знает тебя, доверяет, ждёт следующего письма.</p>
<h3>Анатомия каждого письма серии</h3>
<ul><li><strong>День 0 (сразу):</strong> выполни обещание (лид-магнит) + объясни что будет дальше. Не продавай.</li><li><strong>День 1:</strong> самая ценная информация которую знаешь. Докажи что подписка стоила того.</li><li><strong>День 3:</strong> история — твоя или клиента. Люди запоминают истории лучше фактов.</li><li><strong>День 5:</strong> сними главное возражение. Знаешь почему не покупают? Разберись с этим.</li><li><strong>День 7:</strong> оффер с причиной действовать сейчас. Дедлайн или бонус.</li></ul>
<h3>Ключевые метрики которые нужно знать</h3>
<ul><li><strong>Open Rate (OR)</strong> — % открытий. Средний по рынку 20-25%. Хороший 35-45%</li><li><strong>Click-Through Rate (CTR)</strong> — % кликов. Средний 2-5%. Хороший 8-12%</li><li><strong>Deliverability</strong> — попадает ли письмо в inbox или спам. Критично поддерживать чистый список</li></ul>
<div class="tip-box"><strong>💡 Один совет который меняет всё:</strong> Персонализация имени в subject line поднимает OR на 26% (данные Experian). Subject "Иван, это для вас" открывают чаще чем просто "Это для вас".</div>`,
   prompts:[{l:'Welcome-серия',p:`5 писем Welcome-серии.\n\nПРОДУКТ: [описание]\nАУДИТОРИЯ: [кто]\nЦЕЛЬ: конверсия в [действие] за 7 дней\nОФФЕР: [день 7]\n\nДля каждого: ДЕНЬ + ТЕМА (2 A/B) + PREVIEW + ТЕЛО + CTA`},{l:'Реактивация',p:`3 письма реактивации (90+ дней).\n\nПРОДУКТ: [описание]\n\n1. "Мы скучали"\n2. Ценный контент без продажи\n3. Финальный оффер или отписка`}],
   steps:[{s:'Скопируй Welcome-серию',copy:true},{s:'Заполни продукт и оффер'},{s:'Настрой в Unisender/Mailchimp'},{s:'Тест на 10% перед полным запуском'}],
   tips:['7 из 10 email-покупок в первые 7 дней','Персонализация имени +20-30% OR','Разные серии для разных источников']}
]},
brain:{id:'brain',title:'Second Brain',icon:'🗂',color:'#0EA884',desc:'Obsidian + Claude = база знаний',diff:'med',missions:[
  {t:'Архитектура PARA + Zettelkasten',xp:150,
   theory:`<h3>Почему большинство систем хранения информации не работают</h3>
<p>У тебя когда-нибудь было ощущение что ты всё записываешь, но ничего не находишь? Или что завёл идеальную систему папок, три дня наполнял её — и через месяц бросил? Это не твоя вина. Большинство систем требуют слишком много усилий на поддержание.</p>
<p>PARA — это минималистичная система придуманная Тьяго Форте. Её ключевое преимущество: <strong>любой файл или заметку можно разместить ровно в одно из четырёх мест без долгих размышлений</strong>. Нет сложных иерархий, нет тысячи тегов, нет папок внутри папок.</p>
<h3>Четыре категории и почему именно они</h3>
<ul><li><strong>Projects (Проекты)</strong> — всё что имеет дедлайн и конкретный результат. "Запустить сайт до 1 июня", "Написать книгу". У каждого проекта есть дата завершения — это принципиально.</li><li><strong>Areas (Области)</strong> — сферы жизни без дедлайна. "Здоровье", "Финансы", "Маркетинг". Области не завершаются — ты их поддерживаешь постоянно.</li><li><strong>Resources (Ресурсы)</strong> — темы которые тебя интересуют. "Prompt Engineering", "Инвестиции", "UX Design". Материалы для изучения и справки.</li><li><strong>Archive (Архив)</strong> — всё завершённое и неактуальное. Не удаляй — перемещай сюда. Вдруг понадобится.</li></ul>
<h3>Zettelkasten — метод карточек для идей</h3>
<p>Zettelkasten (нем. "ящик с карточками") — метод придуманный социологом Никласом Луманом который написал 70+ книг и 400 научных статей. Секрет: каждая заметка — одна идея, и каждая заметка связана с другими через ссылки.</p>
<p>В Obsidian это реализуется через [[wikilinks]]. Ты пишешь заметку об идее X, ссылаешься на заметку Y — и со временем появляется сеть связанных мыслей. Новые инсайты рождаются на пересечениях.</p>
<div class="tip-box"><strong>💡 Главный принцип:</strong> Начни с минимальной системы. Три папки: Projects, Areas, Archive — уже работает. Не трать неделю на "идеальную" архитектуру прежде чем начать.</div>`,
   prompts:[{l:'Проектирование',p:`Спроектируй Obsidian vault.\n\nДЕЯТЕЛЬНОСТЬ: [опиши]\nТИПЫ: [встречи/проекты/идеи]\nБОЛЬ: [что теряется]\n\n1. Структура папок PARA\n2. Система тегов (20-25)\n3. Шаблоны 4 типов заметок\n4. Naming convention\n5. Daily ritual (5 мин)\n6. Weekly ritual (30 мин)`},{l:'Шаблон проекта',p:`---\ntags: [projects, {{domain}}]\nstatus: active\ndeadline: {{дата}}\n---\n\n# {{Название}}\n## Цель\n## Решения\n## Следующие шаги\n- [ ] ...\n## Журнал`}],
   steps:[{s:'Скопируй промпт проектирования',copy:true},{s:'Создай структуру в Obsidian'},{s:'Создай шаблоны для 4 типов'},{s:'Создай первые 5 заметок'}],
   tips:['Daily Notes + PARA = достаточно для 80%','Начни с "достаточной" структуры, не идеальной','Obsidian Git + iCloud = синхронизация бесплатно']},
  {t:'Claude → Obsidian Markdown',xp:150,
   theory:`<h3>Что такое Markdown и почему он идеально подходит для заметок</h3>
<p>Markdown — это простой язык разметки текста. Вместо того чтобы нажимать кнопки Bold/Italic как в Word, ты пишешь символы: **жирный**, *курсив*, # Заголовок. Это выглядит понятно даже в plain text, и любая программа умеет его отображать.</p>
<p>Obsidian — приложение для заметок которое хранит всё как .md файлы на твоём компьютере. Не в облаке чужой компании — у тебя. Это означает: твои заметки никуда не исчезнут, их можно открыть в любом текстовом редакторе.</p>
<h3>Почему Claude и Obsidian — идеальная пара</h3>
<p>Claude умеет генерировать текст в формате Markdown с правильной разметкой. Добавляешь в промпт "отвечай в формате Obsidian Markdown" — и получаешь заметку которую можно скопировать напрямую в новый файл без редактирования. Это превращает Claude в генератор контента прямо для твоей базы знаний.</p>
<h3>Ключевые элементы синтаксиса Obsidian</h3>
<ul><li><code>[[Название заметки]]</code> — это "wikilink". Кликаешь — переходишь в другую заметку. Если заметки нет — Obsidian предложит создать. Именно через wikilinks строится сеть знаний.</li><li><code>#тег</code> — тег прямо в тексте. Можно использовать для категоризации: #идея, #проект, #важно</li><li><strong>YAML frontmatter</strong> — блок метаданных в начале файла между тремя дефисами ---. Содержит дату, теги, статус. Claude умеет генерировать его автоматически.</li></ul>
<h3>Рабочий процесс: прочитал → обработал → сохранил</h3>
<p>Самый продуктивный паттерн: прочитал статью или посмотрел видео → вставил транскрипт или ключевые цитаты в Claude → попросил создать структурированную заметку Obsidian → скопировал в vault. Это занимает 5 минут вместо 30 минут самостоятельного написания.</p>
<div class="info-box"><strong>ℹ️ Добавь в Project Instructions:</strong> "Все заметки создавай в формате Obsidian Markdown с YAML frontmatter (date, tags, related), используй [[wikilinks]] для концепций, #теги для категоризации." После этого Claude будет генерировать правильный формат автоматически.</div>`,
   prompts:[{l:'Обработка материала',p:`Обработай → заметки Obsidian.\n\nМАТЕРИАЛ: [вставь]\n\n1. ГЛАВНАЯ:\n---\ndate: {{ДАТА}}\ntags: [{{тег}}]\nrelated: [[{{тема}}]]\n---\n## Суть\n## Инсайты\n## Применение\n## Вопросы\n\n2. АТОМАРНЫЕ ЗАМЕТКИ (3-5)\n3. ACTION ITEMS`},{l:'Синтез',p:`3 заметки из разных областей:\n\nЗАМЕТКА 1: [вставь]\nЗАМЕТКА 2: [вставь]\nЗАМЕТКА 3: [вставь]\n\n1. Неочевидные связи\n2. 2-3 инсайта из пересечений\n3. Заметка-синтез в Obsidian`}],
   steps:[{s:'Скопируй обработку материала',copy:true},{s:'Вставь реальный материал'},{s:'Скопируй в .md файл напрямую'},{s:'Проверь wikilinks'}],
   tips:['Синтез = emergent knowledge — инсайты которых нет в исходниках','Daily Notes + обработка = рабочая система','Плагин Obsidian Git = автосинхронизация']},
  {t:'Claude Projects как база знаний',xp:150,
   theory:`<h3>Что такое "умная база знаний" и чем она отличается от папки с файлами</h3>
<p>Папка с файлами — это хранилище. Чтобы найти ответ, тебе нужно знать в каком файле он находится, открыть его, найти нужное место. Claude Projects — это другое: ты задаёшь вопрос на русском языке и получаешь точный ответ, даже если информация разбросана по десяти документам.</p>
<p>Техническое название этого подхода — RAG (Retrieval Augmented Generation), "поиск с дополненной генерацией". Но в Projects это работает из коробки, без настройки и без кода.</p>
<h3>Как это работает внутри</h3>
<p>Когда ты загружаешь документы в Project и задаёшь вопрос, Claude:</p>
<ol><li>Читает все загруженные документы (до 200K токенов — это около 150 000 слов)</li><li>Находит релевантные части</li><li>Формулирует ответ основанный только на твоих документах</li><li>Может цитировать источник если попросишь</li></ol>
<h3>Практические применения</h3>
<ul><li><strong>FAQ-бот для команды</strong> — загрузи все регламенты и процессы. Новый сотрудник задаёт вопросы и получает точные ответы из реальных документов компании.</li><li><strong>Консультант по продукту</strong> — загрузи всю документацию. Менеджер по продажам может быстро найти ответ на сложный технический вопрос клиента.</li><li><strong>Исследовательская база</strong> — загрузи статьи, отчёты, исследования по теме. Спрашивай "что разные источники говорят о X" — получишь синтез.</li></ul>
<h3>Ограничения которые нужно знать</h3>
<ul><li>200K токенов = примерно 150-200 стандартных страниц документов</li><li>Для больших баз знаний (1000+ страниц) нужен RAG с Chroma или Pinecone</li><li>Claude не "помнит" ответы — при каждом запросе заново читает документы</li></ul>
<div class="tip-box"><strong>💡 Лайфхак:</strong> Сделай один документ "Ключевые факты.md" с самой важной информацией в структурированном виде. Claude обращается к нему в первую очередь — это повышает точность ответов.</div>`,
   prompts:[{l:'Настройка Project',p:`Помоги настроить Project для [направление].\n\nЗАДАЧИ: [опиши]\nДОКУМЕНТЫ: [список]\nТИПОВЫЕ ВОПРОСЫ: [примеры]\n\nСоздай:\n1. Project Instructions\n2. Список документов\n3. Шаблон запросов`},{l:'Корп база знаний',p:`Создай базу знаний команды в Projects.\n\nКОМПАНИЯ: [описание]\nПРОЦЕССЫ: [список]\nВОПРОСЫ: [частые]\n\n1. Project Instructions\n2. Шаблон FAQ\n3. Структура документов\n4. Как обновлять`}],
   steps:[{s:'Скопируй настройку Project',copy:true},{s:'Создай новый Project'},{s:'Загрузи 3-5 документов'},{s:'Тест: вопросы на которые база должна знать ответ'}],
   tips:['Projects = корпоративный RAG без разработки','Обновляй документы раз в месяц','Для команды: Projects с общими гайдлайнами']},
  {t:'Система регулярных обзоров',xp:150,
   theory:`<h3>Почему база знаний без обзоров превращается в архив</h3>
<p>У большинства предпринимателей одна и та же история: завели красивую систему заметок, заполняли её две недели с энтузиазмом — и перестали. Потому что система требует усилий на поддержание, но не приносит видимой отдачи в моменте.</p>
<p>Регулярные обзоры — это механизм который превращает накопленную информацию в реальные инсайты и решения. Без обзоров заметки лежат мёртвым грузом. С обзорами — каждая запись работает на тебя.</p>
<h3>Три уровня обзоров и зачем каждый</h3>
<p><strong>Daily Review (5 минут):</strong> не анализ — просто захват. Три вопроса: что сделал? что узнал? что первое завтра? Ценность: ты не теряешь важные мелочи которые мозг забывает к утру. Делай вечером или перед сном.</p>
<p><strong>Weekly Review (30 минут):</strong> это ядро системы. Ты смотришь на неделю целиком, находишь паттерны которые не видны в ежедневном шуме, переносишь важное в Obsidian, избавляешься от устаревшего. Вопрос который меняет всё: "Что повторялось несколько раз — что это говорит мне?"</p>
<p><strong>Monthly Review (2 часа):</strong> стратегический уровень. Сверяешься с OKR, смотришь куда движешься в целом, обновляешь Areas и Resources. Здесь рождаются решения которые меняют направление.</p>
<h3>Как Claude помогает в обзорах</h3>
<p>Скопируй все заметки за неделю в один запрос и попроси Claude провести обзор. Он найдёт паттерны, выделит главное, задаст правильные вопросы. Это занимает 5 минут вместо 30 самостоятельного анализа.</p>
<div class="tip-box"><strong>💡 Главный секрет:</strong> Встрой обзор в уже существующий ритуал. Weekly Review — в пятницу в 17:00, перед тем как закрыть ноутбук. Не отдельное "найти время" — а якорь к существующему действию. Это единственный способ сделать обзоры привычкой.</div>`,
   prompts:[{l:'Weekly Review',p:`WEEKLY REVIEW — {{ДАТА}}\n\nСобытия недели: [всё что было]\n\n1. ИТОГИ (топ-5)\n2. ИНСАЙТЫ\n3. ПАТТЕРНЫ\n4. НЕЗАКРЫТЫЕ ПЕТЛИ\n5. ФОКУС следующей недели\n6. В OBSIDIAN (что создать)\n\nФормат: Obsidian Markdown.`},{l:'Monthly',p:`MONTHLY — {{МЕСЯЦ}}\n\nOKR: [вставь]\nПрогресс: [что произошло]\n\n1. % по каждому KR\n2. Что мешало\n3. Корректировки\n4. Топ-инсайт → Obsidian`}],
   steps:[{s:'Скопируй Weekly Review',copy:true},{s:'Проведи обзор за 7 дней'},{s:'Напоминание: пятница 17:00'},{s:'Сохрани в /Reviews/2026'}],
   tips:['Без поиска паттернов = просто список','Cowork (Pro+) автоматически готовит материал','Лучший момент: вечер пятницы']}
]},
social:{id:'social',title:'Соцсети',icon:'📱',color:'#0088CC',desc:'Telegram-боты и Instagram',diff:'med',missions:[
  {t:'Telegram-бот: от идеи до деплоя',xp:220,
   theory:`<h3>Что такое Telegram-бот и как он на самом деле работает</h3>
<p>Telegram-бот — это программа которая притворяется пользователем Telegram. Когда ты пишешь боту "@MyCoolBot помоги с вопросом" — сообщение уходит не человеку, а серверу который ты контролируешь. Сервер получает сообщение, обрабатывает его (или передаёт Claude) и отправляет ответ обратно в Telegram. Всё это происходит за 1-3 секунды.</p>
<p>До появления LLM боты были тупыми: они отвечали только на конкретные команды (/start, /help) и не понимали обычный язык. Claude меняет это — теперь бот понимает любое сообщение на человеческом языке и отвечает осмысленно.</p>
<h3>Из чего состоит Telegram-бот с Claude</h3>
<ul><li><strong>Telegram Bot API</strong> — интерфейс Telegram для ботов. Получает сообщения от пользователей и отправляет ответы. Бесплатный.</li><li><strong>Твой сервер (Railway, Render)</strong> — посредник который принимает сообщения от Telegram и передаёт Claude. Стоит $5/мес.</li><li><strong>Claude API</strong> — "мозг" бота. Понимает вопрос пользователя, формирует ответ. Стоит по использованию (~$3-15/мес для небольшого бота).</li><li><strong>Системный промпт</strong> — инструкция которую видит только Claude: кто он, как отвечать, чего не делать. Самый важный файл в системе.</li></ul>
<h3>Два пути создания: с кодом и без</h3>
<p><strong>Без кода (Make/n8n):</strong> визуальный конструктор. Ты соединяешь блоки мышью: Telegram → Claude → Telegram. Занимает 2-3 часа, подходит для простых FAQ-ботов. Стоит: $0-10/мес за Make + Claude API.</p>
<p><strong>С кодом (Python aiogram 3):</strong> полный контроль. Можно хранить историю диалогов, подключать базы данных, делать сложную логику. Занимает больше времени но даёт неограниченные возможности.</p>
<h3>Типичные применения которые реально работают</h3>
<ul><li>FAQ-бот для клиентов — отвечает на 80% вопросов без участия команды</li><li>Квалификатор лидов — задаёт вопросы и собирает информацию о потенциальных клиентах</li><li>Генератор контента — пишешь тему, получаешь готовый пост</li><li>Внутренний ассистент команды — отвечает на вопросы по регламентам</li></ul>
<div class="warn-box"><strong>⚠️ Главное о стоимости:</strong> Claude API тарифицируется по токенам. 1 диалог ≈ 500-2000 токенов. При 100 диалогах в день = 50-200K токенов = $0.15-0.60/день. Считай заранее.</div>`,
   prompts:[{l:'Проектирование',p:`Telegram-бот на Claude.\n\nЦЕЛЬ: [что делает]\nАУДИТОРИЯ: [кто]\nПЛАТФОРМА: [Python/Make/n8n]\n\n1. Системный промпт (роль, ограничения)\n2. Команды: /start, /help\n3. 5 диалогов\n4. Обработка вне темы\n5. Структура файлов`},{l:'Python код',p:`Telegram-бот с Claude API.\n\nСТЕК: aiogram 3 + anthropic\nМОДЕЛЬ: claude-sonnet-4-6-20250514\n\nФУНКЦИОНАЛ:\n- /start, /help\n- Сообщение → Claude\n- История 10 сообщений\n- Rate limit: 1/2с\n\nСИСТЕМНЫЙ ПРОМПТ: [опиши]\n\nСоздай: main.py, claude_client.py, .env.example, requirements.txt, README`}],
   steps:[{s:'Напиши системный промпт'},{s:'Скопируй проектирование',copy:true},{s:'@BotFather → токен'},{s:'Деплой на Railway'}],
   tips:['Начни с FAQ-бота','Webhook быстрее polling','Логируй все диалоги с первого дня']},
  {t:'Instagram контент-система 2026',xp:200,
   theory:`<h3>Как Instagram на самом деле решает кому показывать твой контент</h3>
<p>Instagram — это не хронологическая лента. Это система рекомендаций которая постоянно отвечает на один вопрос: "Будет ли этот контент удерживать пользователя в приложении?" Понимая это, ты понимаешь всю стратегию.</p>
<p>Алгоритм в первые 60 минут после публикации показывает контент небольшой аудитории (5-10% подписчиков) и смотрит на реакцию. Если реакция высокая — расширяет показ на похожих пользователей вне твоей аудитории. Если низкая — останавливает распространение. Всё решается в первый час.</p>
<h3>Что алгоритм измеряет (в порядке важности)</h3>
<ul><li><strong>Saves (сохранения)</strong> — главная метрика 2026. Означает: "хочу вернуться к этому". Instagram считает что если сохраняют — контент максимально ценный.</li><li><strong>Shares (репосты в сторис/DM)</strong> — вирусный потенциал. Каждый репост = бесплатная реклама твоего аккаунта.</li><li><strong>Comments</strong> — вовлечённость и дискуссия. Особенно ценны содержательные комментарии (длиннее 4 слов).</li><li><strong>Likes</strong> — наименее важная метрика. Люди лайкают не думая, алгоритм это знает.</li></ul>
<h3>Анатомия Reels которые смотрят до конца</h3>
<p><strong>Хук (0-3 секунды):</strong> единственная задача — остановить скролл. Работают: неожиданное утверждение ("Я потерял 300 000₽ из-за одной ошибки"), вопрос ("Ты знаешь зачем твой конкурент делает это?"), обещание ("Покажу как сделать X за 30 секунд").</p>
<p><strong>Контент (3-27 секунд):</strong> выполни обещание хука. Не растягивай — каждая секунда должна давать что-то новое. Люди уходят как только чувствуют что теряют время.</p>
<p><strong>CTA (27-30 секунд):</strong> одно конкретное действие. Лучшее что просить — сохранить ("Сохрани чтобы вернуться") или задать вопрос в комментариях. Не "подпишись" — это слишком общо.</p>
<div class="tip-box"><strong>💡 Секрет высоких сохранений:</strong> Контент который спасает от "я это знал но забывал" — сохраняют в разы чаще. Чек-листы, пошаговые инструкции, формулы — идеальные форматы для сохранений.</div>`,
   prompts:[{l:'Контент-пакет',p:`[Brand Voice]\n\nКонтент-пакет на неделю.\n\nНИША: [ниша]\nАУДИТОРИЯ: [описание]\n\n1. REELS СКРИПТ: хук 3с + 27с + CTA\n2. КАРУСЕЛЬ: заголовок + 7 слайдов + CTA\n3. STORIES: 5 с вовлечением\n4. ПОДПИСИ: 3 варианта\n5. BIO: 150 символов`},{l:'Анализ конкурента',p:`Анализ Instagram аккаунта.\n\nАКАУНТ: [ник]\nДАННЫЕ: [топ-посты, форматы]\n\n1. Что работает\n2. Жалобы в комментариях\n3. Незанятые темы\n4. Как выделиться`}],
   steps:[{s:'Скопируй контент-пакет',copy:true},{s:'Добавь реальные детали из опыта'},{s:'Запланируй в Later'},{s:'3-5 Reels/неделю = органический охват'}],
   tips:['Сохранения — главная метрика 2026','Reels с хуком-вопросом = 2-3x просмотров','Публикуй 9-11 и 18-20 часов']},
  {t:'Telegram-воронка и монетизация',xp:220,
   theory:`<h3>Почему одно сообщение с оффером почти никогда не работает</h3>
<p>Представь: незнакомый человек подходит на улице и сразу предлагает купить что-то. Даже если предложение хорошее — ты откажешь. Нет доверия, нет отношений, нет понимания что это за человек.</p>
<p>В Telegram происходит то же самое. Человек только подписался — он ещё не знает тебя. Немедленный оффер в первом сообщении воспринимается как спам. Статистика SendPulse: воронка из 5 сообщений конвертирует в 3-5 раз лучше чем одно сообщение с предложением.</p>
<h3>Психология 7 касаний</h3>
<p>Классическое маркетинговое правило: человек покупает после примерно 7 контактов с брендом. Это не значит 7 продающих сообщений — это 7 моментов когда он видит твою ценность. Воронка из 5 писем + 2 поста в канале = 7 касаний за неделю.</p>
<h3>Структура каждого письма воронки</h3>
<ul><li><strong>Письмо 1 (сразу после подписки):</strong> Тёплое приветствие + конкретное обещание что получит. Никакой продажи. Цель: подтвердить что подписка была правильным решением.</li><li><strong>Письмо 2 (через 24 часа):</strong> Самый ценный совет который у тебя есть. Без рекламы. Докажи экспертизу действием.</li><li><strong>Письмо 3 (через 3 дня):</strong> История — твоя или клиента. Люди запоминают истории лучше фактов и советов. Покажи трансформацию.</li><li><strong>Письмо 4 (через 5 дней):</strong> Квалификация. Задай вопросы чтобы понять болит ли у человека то что ты решаешь. Ответы помогают персонализировать оффер.</li><li><strong>Письмо 5 (через 7 дней):</strong> Оффер с дедлайном. К этому моменту у тебя уже есть доверие и понимание их проблем. Конверсия будет намного выше.</li></ul>
<h3>Технически: как настроить без программирования</h3>
<p>SendPulse и похожие сервисы позволяют создать всю воронку визуально: перетаскиваешь блоки, пишешь тексты, настраиваешь временные задержки. Бот в Telegram подключается через API-ключ. Вся настройка занимает 2-4 часа.</p>
<div class="info-box"><strong>ℹ️ A/B тест воронки:</strong> Создай 2 варианта письма 5 (разные офферы или разные дедлайны) и отправь 50/50. Через неделю смотри конверсию. Постепенно оптимизируй каждое письмо — это называется split-testing воронки.</div>`,
   prompts:[{l:'Воронка 5 писем',p:`Telegram-воронка для [продукт].\n\nЦЕЛЬ: [конверсия]\nАУДИТОРИЯ: [описание]\nОФФЕР: [что и почём]\n[Brand Voice]\n\nПисьмо 1 (сразу): приветствие\nПисьмо 2 (24ч): ценность\nПисьмо 3 (3 дня): история\nПисьмо 4 (5 дней): квалификация\nПисьмо 5 (7 дней): оффер`},{l:'Возражения',p:`Ответы на возражения [продукт]:\n\n1. "Дорого"\n2. "Подумаю"\n3. "Уже пробовал"\n4. "Нет времени"\n5. "Не уверен"\n\nДля каждого: эмпатия → переосмысление → доказательство → CTA`}],
   steps:[{s:'Скопируй воронку',copy:true},{s:'Заполни продукт и оффер'},{s:'SendPulse — бесплатно до 500 подписчиков'},{s:'Тест на 10 людях'}],
   tips:['Персонализация в 4-м письме = лучший результат','Тестируй 50 слов vs 150 слов','Воронка 5 касаний > одного оффера в 3-5x']},
  {t:'SMM-автоматизация с Make + Claude',xp:200,
   theory:`<h3>Чем автоматизация с AI отличается от простого автопостинга</h3>
<p>Обычный автопостинг — это когда ты пишешь 30 постов за раз и ставишь их в очередь. Claude-автоматизация — это другое: система сама генерирует новый уникальный контент каждый раз по теме и Brand Voice. Ты не пишешь посты — ты задаёшь правила.</p>
<p>Аналогия: автопостинг = холодильник с едой (приготовил сам, потом просто достаёшь). Claude-автоматизация = шеф-повар который знает твои предпочтения и готовит каждый день свежее.</p>
<h3>Как работает архитектура шаг за шагом</h3>
<p>Make или n8n (инструменты визуальной автоматизации) запускают сценарий по расписанию. Например: каждый понедельник в 9:00 система берёт тему из списка в Google Sheets, передаёт её Claude API вместе с Brand Voice, получает готовый пост и публикует в канал. Ты при этом занят другим — утром просто видишь готовый пост.</p>
<h3>Инструменты которые нужны</h3>
<ul><li><strong>Make.com или n8n</strong> — платформа автоматизации. Make удобнее для новичков, n8n дешевле (можно запустить у себя)</li><li><strong>Claude API</strong> — генерация текста. API ключ получаешь на console.anthropic.com</li><li><strong>Google Sheets</strong> — список тем и лог публикаций. Бесплатно.</li><li><strong>Telegram Bot API или Instagram Graph API</strong> — публикация. Telegram бесплатный и проще.</li></ul>
<h3>Важные ограничения</h3>
<ul><li>Instagram Graph API разрешает автопостинг только для бизнес-аккаунтов через одобренное приложение</li><li>Автоматический контент нужно периодически проверять — AI иногда ошибается</li><li>Рекомендуется добавить шаг "одобрение перед публикацией" на первые несколько недель</li></ul>
<div class="tip-box"><strong>💡 Рекомендуемый старт:</strong> Сначала настрой так чтобы пост генерировался и отправлялся тебе на проверку в Telegram-личку. После месяца без проблем — включи автопубликацию. Это страховка от неловких постов.</div>`,
   prompts:[{l:'Make сценарий',p:`Спроектируй Make-сценарий автопостинга.\n\nПЛАТФОРМА: [Telegram/Instagram]\nЧАСТОТА: [X/неделю]\nТИП: [советы/кейсы]\n[Brand Voice]\n\nАрхитектура:\n1. Schedule module\n2. HTTP Request → Claude API (напиши промпт)\n3. Публикация module\n4. Sheets лог\n5. Error handling`},{l:'Промпт для генерации',p:`Создай промпт для автогенерации постов.\n\nКАНАЛ: [тема]\nАУДИТОРИЯ: [описание]\n[Brand Voice]\n\nПромпт должен генерировать [тип], включать [элементы], длина [X слов].`}],
   steps:[{s:'Скопируй архитектуру Make',copy:true},{s:'Создай аккаунт make.com'},{s:'5 тестов вручную → потом расписание'},{s:'Human-in-loop для важного контента'}],
   tips:['5-10 тестов вручную перед автоматизацией','Храни все посты в Sheets — аналитика','Human-in-loop обязателен']}
]},
content:{id:'content',title:'Контент & Сайты',icon:'🌐',color:'#10B981',desc:'Сайты, SEO, email, презентации',diff:'med',missions:[
  {t:'Landing Page за один промпт',xp:200,
   theory:`<h3>Что такое лендинг и зачем он нужен вместо обычного сайта</h3>
<p>Лендинг (landing page) — это страница с одной-единственной целью. Не сайт с разделами "О нас", "Услуги", "Блог", "Контакты". Одна страница — одно действие: купить, подписаться, оставить заявку.</p>
<p>Исследования показывают: чем меньше выборов предлагаешь посетителю — тем выше конверсия. Сайт с 5 разделами "распыляет" внимание. Лендинг фокусирует его на одном решении.</p>
<h3>Анатомия конвертирующего лендинга</h3>
<p><strong>Hero-блок (то что видно сразу):</strong> у тебя есть 5 секунд чтобы ответить на вопрос "что это и зачем мне?" Заголовок должен называть результат который получает человек, а не твой продукт. "Автоматизируй SMM за 2 часа в неделю" лучше чем "Наш инструмент контент-маркетинга".</p>
<p><strong>Боль → решение:</strong> покажи что понимаешь проблему клиента. Люди покупают не продукты — они покупают решение боли. Назови боль своими словами — читатель подумает "они меня понимают".</p>
<p><strong>Как работает (3 шага):</strong> убери страх сложности. Простая визуализация процесса: шаг 1 → шаг 2 → результат. Чем проще выглядит — тем меньше барьер для покупки.</p>
<p><strong>Social proof:</strong> отзывы, цифры, логотипы клиентов. Мозг ищет социальное доказательство. "500 предпринимателей уже используют" работает лучше любых описаний преимуществ.</p>
<p><strong>FAQ:</strong> возражения которые у человека уже есть, только он не решается задать вслух. Отвечай на них проактивно — это снимает барьеры к покупке.</p>
<h3>Почему Claude может написать работающий HTML</h3>
<p>HTML — это язык разметки веб-страниц. Claude обучен на миллионах HTML-файлов и умеет генерировать чистый, рабочий код. Ты получаешь один .html файл который открывается в браузере прямо с компьютера и который можно опубликовать в интернет за 30 секунд.</p>
<div class="tip-box"><strong>💡 Нет навыков разработки? Отлично.</strong> Так и должно быть. Ты описываешь бизнес и аудиторию — Claude пишет код. Если что-то не нравится визуально — говоришь "сделай кнопку зелёной" или "убери этот блок" — он правит. Итерируй пока не получишь нужный результат.</div>`,
   prompts:[{l:'Полный лендинг',p:`HTML-лендинг (один файл, Google Fonts).\n\nПРОДУКТ: [описание]\nАУДИТОРИЯ: [кто]\nРЕЗУЛЬТАТ: [что получает]\nCTA: [действие]\n\nСТРУКТУРА:\n1. Hero + CTA\n2. Боль → решение\n3. Как работает (3 шага)\n4. Цифры\n5. FAQ (5)\n6. Финальный CTA\n\nДИЗАЙН: минималистичный, mobile-first CSS`},{l:'CRO',p:`Улучши лендинг.\n\nТЕКУЩАЯ СТРУКТУРА: [опиши]\nМЕТРИКИ: CR [X]%\nАУДИТОРИЯ: [описание]\n\n1. Главные проблемы\n2. Новый hero\n3. 3 варианта CTA\n4. FAQ для возражений`}],
   steps:[{s:'Скопируй промпт лендинга',copy:true},{s:'Заполни параметры'},{s:'Скопируй HTML → index.html'},{s:'netlify.com/drop → перетащи → ссылка'}],
   tips:['Netlify Drop = 30 секунд без аккаунта','Попроси CSS-анимации при скролле','Свой домен: Netlify Free + reg.ru']},
  {t:'SEO-контент: E-E-A-T 2026',xp:180,
   theory:`<h3>Как Google решает какие страницы показывать первыми</h3>
<p>Google — это машина которая пытается дать пользователю самый полезный ответ. Она оценивает тысячи сигналов, но в 2024-2026 главным стал принцип E-E-A-T: Experience (опыт автора), Expertise (экспертиза), Authoritativeness (авторитетность в теме), Trustworthiness (надёжность источника).</p>
<p>Простыми словами: Google хочет показывать контент написанный реальными людьми с реальным опытом, а не автоматически сгенерированный шаблон. Именно поэтому AI-статья без личного опыта и реальных данных — проигрывает статье живого эксперта.</p>
<h3>Что Claude делает хорошо — и что только ты можешь добавить</h3>
<p>Claude помогает со структурой, семантикой и написанием каркаса. Это ускоряет работу в 3-5 раз. Но есть то что только ты можешь добавить:</p>
<ul><li><strong>Личный опыт:</strong> "Когда я внедрял это в своём бизнесе, столкнулся с..." — именно это Google ценит как сигнал E-E-A-T</li><li><strong>Реальные цифры:</strong> "Конверсия выросла с 2.3% до 4.1%" — конкретные числа из практики</li><li><strong>Актуальные кейсы:</strong> примеры из твоей работы с реальными клиентами</li></ul>
<h3>Что такое ключевые слова и почему важна семантика</h3>
<p>Ключевые слова — это что люди вводят в Google. Статья должна содержать эти слова естественно. LSI-ключевые слова (латентно-семантические) — синонимы и связанные понятия. Например для статьи о "контент-маркетинге" LSI будут: "редакционный календарь", "контент-план", "целевая аудитория". Это сигналы для Google что статья действительно раскрывает тему глубоко.</p>
<h3>Schema markup — невидимый код который даёт видимые результаты</h3>
<p>Schema markup — специальный код (JSON-LD) который добавляется в страницу и говорит Google: "это FAQ-раздел" или "это рецепт" или "это инструкция". В ответ Google может показать твой контент расширенным сниппетом прямо на странице результатов — без клика на сайт. Это даёт трафик даже с позиции #4-5.</p>
<div class="warn-box"><strong>⚠️ Честно о времени:</strong> SEO-результаты приходят через 3-6 месяцев после публикации. Это долгосрочная инвестиция, не быстрый канал. Если нужен трафик сегодня — используй платную рекламу или соцсети, параллельно строй SEO.</div>`,
   prompts:[{l:'SEO статья',p:`Статья под "[ключевое слово]".\n\nАУДИТОРИЯ: [кто читает]\nДЛИНА: 1800-2200 слов\n\nСтруктура:\n1. H1 с ключевым словом\n2. Введение 120 слов\n3. 5-6 H2 разделов\n4. FAQ 5 вопросов (PAA)\n5. Заключение + CTA\n6. Meta title (60 символов)\n7. Meta description (155)`},{l:'Контент-кластер',p:`Кластер для "[тема]".\n\n1. PILLAR PAGE: тема + ключевое слово\n2. CLUSTER (8-10): тема, слово, интент\n3. Internal linking\n4. Порядок публикации`}],
   steps:[{s:'Скопируй промпт статьи',copy:true},{s:'ОБЯЗАТЕЛЬНО: добавь 3-5 реальных примеров'},{s:'Опубликуй + Search Console'},{s:'Обновляй через 6 месяцев'}],
   tips:['AI без опыта = штраф Google 2026','1800-2200 слов оптимум','Schema markup FAQ/How-to — попроси Claude добавить']},
  {t:'Презентации и видео-скрипты',xp:180,
   theory:`<h3>Почему большинство презентаций не убеждают и как это исправить</h3>
<p>Типичная ошибка: создатель презентации знает тему лучше всех в зале и хочет передать всё что знает. Получается 40 слайдов с текстом. Аудитория перестаёт слушать после 10-го.</p>
<p>Хорошая презентация — это нарратив, а не энциклопедия. Одна идея → доказательство → следующая идея → итог. Структура важнее красоты слайдов.</p>
<h3>Универсальная структура убеждающей презентации</h3>
<ul><li><strong>Проблема (1-2 слайда):</strong> начни с боли аудитории. Не своей истории — их ситуации. "Вы тратите X часов в неделю на Y" — сразу фокус.</li><li><strong>Почему это важно сейчас (1 слайд):</strong> контекст и срочность. Что меняется на рынке/в мире что делает проблему актуальнее.</li><li><strong>Решение (2-3 слайда):</strong> твой ответ. Просто и конкретно.</li><li><strong>Доказательства (2-3 слайда):</strong> кейсы, цифры, отзывы. Не рассказывай — показывай.</li><li><strong>Как это работает (1-2 слайда):</strong> 3 шага. Не больше. Люди боятся сложного.</li><li><strong>Призыв к действию (1 слайд):</strong> одно конкретное действие. Куда пойти, что нажать, с кем поговорить.</li></ul>
<h3>Правило 10-20-30 Гая Кавасаки</h3>
<p>Гай Кавасаки — венчурный инвестор Apple — сформулировал правило для питчей: не больше 10 слайдов, не больше 20 минут, шрифт не меньше 30 пунктов. Принцип за этим: если не можешь объяснить за 10 слайдов — ты сам не понимаешь своею тему.</p>
<h3>YouTube скрипты — другая задача</h3>
<p>Видео-скрипт отличается от презентации: здесь ты говоришь, а не показываешь. Первые 30 секунд критичны — если не зацепил, человек закроет вкладку. Структура: хук (что получишь?) → обещание (почему стоит смотреть до конца?) → контент (по частям, каждая несёт ценность) → CTA (одно действие).</p>
<div class="tip-box"><strong>💡 Про MARP и Canva:</strong> MARP позволяет создать презентацию из текста в формате Markdown — быстро и без дизайнерских навыков. Canva даёт красивые шаблоны без дизайнера. Claude создаёт структуру и тексты — ты выбираешь визуальный инструмент.</div>`,
   prompts:[{l:'Презентация',p:`Презентация для [цель].\n\nТЕМА: [тема]\nАУДИТОРИЯ: [кому]\nДЛИТЕЛЬНОСТЬ: [X мин] → [X слайдов]\n\nДля каждого слайда:\n1. Тип (Title/Content/Visual)\n2. Заголовок\n3. Тезисы (3-4)\n4. Рекомендация визуала\n5. Скрипт спикера`},{l:'YouTube скрипт',p:`YouTube скрипт.\n\nТЕМА: [тема]\nДЛИТЕЛЬНОСТЬ: [X мин]\nТОН: [стиль]\n\n- ХУК (0-30с)\n- ОБЕЩАНИЕ (30-60с)\n- КОНТЕНТ: [X разделов]\n- CTA\n\nДобавь timestamps.`}],
   steps:[{s:'Скопируй презентацию',copy:true},{s:'Перенеси в Canva или Pitch'},{s:'Для PowerPoint: используй pptx Skill'},{s:'Хук видео = 70% успеха — инвестируй'}],
   tips:['10-12 слайдов для питча (правило Kawasaki)','Shorts отдельно из основного','Хук важнее всего контента']},
  {t:'Копирайтинг: PAS, AIDA, 4U',xp:180,
   theory:`<h3>Что такое копирайтинг и почему структура важнее таланта</h3>
<p>Копирайтинг — это текст который заставляет читателя совершить действие: купить, подписаться, позвонить. В отличие от обычного текста, копирайтинг следует психологическим паттернам которые работают независимо от того кто пишет.</p>
<p>Профессиональные копирайтеры за 70 лет индустрии собрали эти паттерны в фреймворки. Ты не придумываешь структуру — ты берёшь проверенный шаблон и наполняешь его своим контентом. Claude знает все основные фреймворки и применяет их по команде.</p>
<h3>Четыре главных фреймворка</h3>
<p><strong>PAS (Problem → Agitation → Solution):</strong> называешь проблему → усиливаешь боль (агитируешь) → предлагаешь решение. Самый мощный фреймворк для email и лендингов. Работает потому что люди действуют чтобы избежать боли сильнее чем ради получения удовольствия.</p>
<p><strong>AIDA (Attention → Interest → Desire → Action):</strong> захватываешь внимание → вызываешь интерес → формируешь желание → призываешь к действию. Классика рекламы существует с 1898 года. Используй для рекламных объявлений и sales-страниц.</p>
<p><strong>BAB (Before → After → Bridge):</strong> описываешь ситуацию до твоего решения → рисуешь жизнь после → объясняешь как перейти от одного к другому. Идеален для отзывов, кейсов и историй трансформации.</p>
<p><strong>4U (Useful, Urgent, Unique, Ultra-specific):</strong> фреймворк для заголовков. Хороший заголовок должен быть полезным, срочным, уникальным и ультра-конкретным. Проверь каждый заголовок по четырём критериям — и он станет сильнее.</p>
<h3>Психологические триггеры которые работают всегда</h3>
<ul><li><strong>Конкретные цифры</strong> — "47 клиентов" убеждает сильнее чем "многие клиенты"</li><li><strong>Социальное доказательство</strong> — люди делают то что делают другие похожие на них</li><li><strong>Дефицит и срочность</strong> — "осталось 3 места" или "только до пятницы" создают импульс к действию</li><li><strong>Результат, не процесс</strong> — "похудей на 5 кг" продаёт лучше чем "здоровое питание"</li></ul>
<div class="tip-box"><strong>💡 Как использовать с Claude:</strong> Назови фреймворк явно ("напиши по PAS") и добавь конкретные данные о своём продукте и аудитории. Claude создаёт структуру — ты добавляешь реальные истории и конкретные цифры из практики.</div>`,
   prompts:[{l:'PAS email',p:`Email по PAS.\n\nПРОДУКТ: [описание]\nКЛИЕНТ: [описание]\n\nP: [боль конкретно]\nA: [как влияет]\nS: [как решает]\n\nSubject (2 A/B) + тело 150 слов + CTA`},{l:'4U заголовки',p:`10 заголовков по 4U.\n\nПРОДУКТ: [описание]\nАУДИТОРИЯ: [описание]\n\nДля каждого:\n1. Заголовок\n2. Оценка 4U\n3. Для какого канала`}],
   steps:[{s:'Скопируй PAS email',copy:true},{s:'Добавь реальную цифру или историю'},{s:'Тест через A/B с AIDA-версией'},{s:'"Какой триггер слабее?" → улучши'}],
   tips:['PAS лучше для email, AIDA для лендингов','Структура от Claude + детали от тебя','После написания: проси улучшить слабое место']}
]},
research:{id:'research',title:'Бизнес-ресёрч',icon:'🔬',color:'#7C3AED',desc:'JTBD, конкуренты, рынок',diff:'hard',missions:[
  {t:'JTBD: что покупает клиент',xp:200,
   theory:`<h3>Революционная идея которая меняет понимание бизнеса</h3>
<p>В 1960-х американский консультант Теодор Левитт сказал: "Люди не хотят дрель — они хотят дырку в стене". Кажется очевидным, но большинство компаний по-прежнему продают дрель (продукт), а не дырку (результат).</p>
<p>Jobs-to-be-Done (JTBD) — это методология которая смотрит на продукт через задачи которые "нанимает" клиент. Клиент не покупает CRM — он нанимает CRM чтобы не терять важные контакты и закрывать больше сделок. Не покупает абонемент в зал — нанимает его чтобы чувствовать себя здоровым и уверенным.</p>
<h3>Три уровня Jobs — почему все три важны</h3>
<p><strong>Functional Jobs (функциональные):</strong> практическая задача которую нужно выполнить. "Отправлять письма клиентам", "Отслеживать расходы". Это то о чём клиенты говорят вслух на интервью.</p>
<p><strong>Emotional Jobs (эмоциональные):</strong> как клиент хочет себя чувствовать после использования продукта. "Чувствовать контроль над бизнесом", "Не волноваться что что-то упущу". Это то о чём клиенты не говорят но что реально движет покупкой.</p>
<p><strong>Social Jobs (социальные):</strong> как клиент хочет выглядеть в глазах других. "Казаться современным руководителем", "Показать команде что использую лучшие инструменты". Часто самый скрытый уровень — но иногда самый важный.</p>
<h3>Кто твои настоящие конкуренты</h3>
<p>Это самый взрывной инсайт JTBD: твои конкуренты — это не только похожие продукты. Это все способы выполнить ту же работу. Для CRM конкурент — это не только другая CRM. Это Excel. Это просто помнить в голове. Это нанять ассистента. Это вообще не вести базу клиентов.</p>
<p>Понимание реальных конкурентов меняет позиционирование: ты продаёшь не против другой CRM, а против хаоса и забытых клиентов.</p>
<div class="tip-box"><strong>💡 Как использовать с Claude:</strong> Опиши свой продукт и целевой сегмент. Попроси провести полный JTBD-анализ. Самый важный раздел — "Все альтернативы". Именно там ты найдёшь неожиданных конкурентов и незанятые ниши.</div>`,
   prompts:[{l:'JTBD анализ',p:`JTBD-анализ.\n\nПРОДУКТ: [описание]\nСЕГМЕНТ: [кто]\n\n1. FUNCTIONAL JOBS (7-10)\n2. EMOTIONAL JOBS\n3. SOCIAL JOBS\n4. ВСЕ АЛЬТЕРНАТИВЫ\n5. НЕЗАКРЫТЫЕ JOBS\n6. ИНСАЙТ ПОЗИЦИОНИРОВАНИЯ`},{l:'JTBD интервью',p:`Скрипт JTBD интервью.\n\nПРОДУКТ: [описание]\nКЛИЕНТ: [кто]\n\n1. Screener (3 вопроса)\n2. 10 вопросов хронологически\n3. Вопросы для F/E/S Jobs\n4. Красные флаги\n5. Зелёные флаги PMF`}],
   steps:[{s:'Скопируй JTBD анализ',copy:true},{s:'Опиши конкретно'},{s:'Изучи "ВСЕ АЛЬТЕРНАТИВЫ" — главные инсайты'},{s:'5-7 реальных интервью'}],
   tips:['Интервью важнее AI-анализа','Что делали ДО твоего продукта — ключевой вопрос','Повторяй раз в 6 месяцев']},
  {t:'Competitive Intelligence',xp:220,
   theory:`<h3>Почему изучение конкурентов — это не копирование, а стратегия</h3>
<p>Многие предприниматели избегают изучения конкурентов из страха "скопировать" или потому что считают это неэтичным. Это ошибка. Конкурентный анализ — это разведка рынка: ты изучаешь что работает, что не работает и где есть незанятое пространство.</p>
<p>Цель не "делать то же самое" — цель найти где ты можешь быть лучшим выбором для конкретного сегмента клиентов. А это невозможно не зная что уже есть на рынке.</p>
<h3>Источники данных которые дают реальные инсайты</h3>
<p><strong>Отзывы клиентов (G2, Trustpilot, App Store):</strong> это золото. Люди пишут что им реально нравится и что бесит. Паттерн жалоб конкурента = твоя возможность. Если в 20 отзывах пишут "поддержка отвечает через 3 дня" — у тебя есть дифференциатор: быстрая поддержка.</p>
<p><strong>Вакансии конкурента:</strong> нестандартный но очень ценный источник. Если они активно нанимают Data Scientists — значит делают ставку на аналитику. Нанимают Enterprise Sales — идут в крупный бизнес. Вакансии показывают приоритеты на 6-12 месяцев вперёд.</p>
<p><strong>Сайт и ценообразование:</strong> как позиционируют, кому продают, какую боль называют. Изменения в pricing часто сигнализируют о смене стратегии.</p>
<p><strong>Контент и SEO:</strong> на какие темы пишут статьи — это их SEO-стратегия. Какие темы не закрывают — это твои возможности для органического трафика.</p>
<h3>Что искать в анализе</h3>
<ul><li><strong>Сильные стороны конкурента</strong> — честно признай что они делают хорошо. Это поможет фокусироваться на другом.</li><li><strong>Незакрытые потребности</strong> — о чём жалуются их клиенты? Что не хватает?</li><li><strong>Незанятые сегменты</strong> — для кого конкурент НЕ делает продукт? Это твоя аудитория.</li></ul>
<div class="warn-box"><strong>⚠️ Важное предупреждение:</strong> Claude анализирует данные которые ты ему предоставляешь — он не может самостоятельно зайти на сайты и собрать информацию (если только не подключен MCP playwright). Готовь данные заранее: скопируй описания, отзывы, цены.</div>`,

  {t:'Customer Development',xp:200,
   theory:`<h3>Почему 90% стартапов строят то что никому не нужно</h3>
<p>CB Insights проанализировал тысячи провалившихся стартапов. Причина #1 в 42% случаев: "нет потребности в рынке". Люди построили продукт — и оказалось что никто не хочет его покупать. Customer Development (custdev) — методология которая позволяет узнать это ДО того как потратить год на разработку.</p>
<p>Смысл прост: не строй то что считаешь нужным — сначала поговори с потенциальными клиентами и узнай что нужно им.</p>
<h3>Четыре этапа Customer Development</h3>
<p><strong>Problem Discovery:</strong> ты ещё не знаешь что именно строишь. Задача — понять: существует ли проблема которую ты хочешь решить? Насколько она болезненна? Кто страдает от неё больше всего? На этом этапе нельзя рассказывать о своём решении — только задавать вопросы.</p>
<p><strong>Solution Validation:</strong> у тебя есть гипотеза решения (прототип, mockup, описание). Задача — проверить: решает ли это реальную проблему? Понятно ли людям как это работает? Готовы ли платить?</p>
<p><strong>Product-Market Fit:</strong> у тебя есть работающий продукт и первые клиенты. Задача — понять: достаточно ли они довольны чтобы рекомендовать другим? Метрика Шона Эллиса: если 40%+ пользователей говорят что было бы "очень разочарованы" если продукт исчезнет — PMF найден.</p>
<p><strong>Scale Readiness:</strong> проверка что процессы работают при увеличении в 10x.</p>
<h3>"Мамин тест" — как задавать правильные вопросы</h3>
<p>Роб Фицпатрик в книге "The Mom Test" описал главную ловушку интервью: люди вежливы и говорят то что хотите услышать. Твоя мама скажет "отличная идея!" потому что любит тебя. Правильные вопросы спрашивают о прошлом поведении, не о гипотетическом будущем.</p>
<ul><li>❌ "Ты бы купил?" → любой ответ бесполезен</li><li>✅ "Как ты решаешь эту проблему сейчас?" → реальные данные</li><li>❌ "Тебе нравится наша идея?" → люди вежливы</li><li>✅ "Сколько ты потратил на решение этой проблемы в прошлом году?" → реальные данные</li></ul>
<div class="tip-box"><strong>💡 Минимум для выводов:</strong> 5-7 интервью показывают первые паттерны. 15-20 — достаточно для уверенных выводов. Claude помогает создать скрипт, провести анализ ответов и выявить паттерны которые не видны в одном разговоре.</div>`,
   prompts:[{l:'Скрипт интервью',p:`Custdev скрипт.\n\nЭТАП: [Problem/Solution]\nГИПОТЕЗА: [что создаём]\nКЛИЕНТ: [описание]\n\n1. Скрипт 15-20 вопросов\n2. Запрещённые вопросы (bias)\n3. Шаблон заметок\n4. Красные флаги\n5. PMF сигналы`},{l:'Анализ',p:`Анализ custdev.\n\nПРОВЕДЕНО: [N]\nОТВЕТЫ: [цитаты]\n\n1. БОЛИ: топ-3 с частотой\n2. ТЕКУЩИЕ РЕШЕНИЯ\n3. ГОТОВНОСТЬ ПЛАТИТЬ\n4. PMF СИГНАЛЫ\n5. ПИВОТ ГИПОТЕЗЫ`}],
   steps:[{s:'Скопируй скрипт интервью',copy:true},{s:'Проведи 5 интервью'},{s:'Анализ паттернов'},{s:'Скорректируй гипотезу → повтори'}],
   tips:['5-7 интервью = первые выводы','Запись с согласия → Claude транскрибирует','Прошлое поведение > будущие намерения']},
  {t:'Research Digest и мониторинг рынка',xp:200,
   theory:`<h3>Почему "следить за рынком" — это не читать всё подряд</h3>
<p>У большинства предпринимателей один из двух крайностей: либо они совсем не следят за рынком и пропускают важные изменения, либо подписались на 50 каналов и тонут в информационном шуме. Ни то ни другое не работает.</p>
<p>Система мониторинга рынка — это регулярный процесс сбора именно нужной информации из правильных источников, её фильтрации и превращения в конкретные действия. Claude превращает сырой поток информации в структурированные инсайты.</p>
<h3>Четыре уровня мониторинга</h3>
<p><strong>Прямые конкуренты:</strong> что они делают, что запускают, как меняют цены. Источник: их сайты, email-рассылки (подпишись!), социальные сети. Google Alerts на название компании.</p>
<p><strong>Рыночные тренды:</strong> что происходит в индустрии в целом. Источник: LinkedIn эксперты, отраслевые издания, конференции. Не нужно читать всё — достаточно 5-10 качественных источников.</p>
<p><strong>Голос клиента:</strong> о чём говорят и жалуются твои потенциальные клиенты. Источник: Reddit (r/вашаниша), Facebook-группы, отзывы на продукты конкурентов. Здесь рождаются лучшие идеи для контента и улучшений продукта.</p>
<p><strong>Смежные рынки:</strong> что работает в других нишах и может перейти в твою. Самые инновационные компании часто переносят модели из других индустрий.</p>
<h3>Как превратить информацию в действия</h3>
<p>Собрать информацию — только половина работы. Каждый раз после дайджеста должен быть список конкретных действий: протестировать эту механику, обновить позиционирование, поговорить с клиентом об этой боли.</p>
<p>Claude превращает список ссылок и заголовков в структурированный дайджест с выводами. Это занимает 5 минут вместо часа ручного анализа.</p>
<div class="info-box"><strong>ℹ️ Инструменты:</strong> Google Alerts — бесплатный, настрой на: название бренда, имена конкурентов, ключевые слова ниши. Feedly — агрегатор RSS для отраслевых блогов. Telegram-каналы по нише — часто лучший источник трендов на русскоязычном рынке.</div>`,

  {t:'Три уровня памяти (май 2026)',xp:150,
   theory:`<h3>Почему "память" у Claude — это не одна вещь, а несколько разных систем</h3>
<p>Когда люди говорят "Claude не помнит наш разговор" — они правы и неправы одновременно. По умолчанию каждый новый чат начинается с чистого листа. Но в 2026 появилось несколько способов дать Claude долгосрочную память — и каждый работает по-разному.</p>
<p>Аналогия с людьми: у нас есть рабочая память (что мы держим в голове прямо сейчас), долгосрочная память (что помним из прошлого) и записная книжка (внешняя память). У Claude — то же самое, только называется иначе.</p>
<h3>Четыре типа памяти и когда использовать каждый</h3>
<p><strong>Контекстное окно (рабочая память):</strong> всё что написано в текущем чате. Claude видит весь разговор от начала до конца. Ограничение: чат закрыл — память исчезла. Для чего: задачи в рамках одной сессии.</p>
<p><strong>Chat History Memory (автоматическая):</strong> Claude.ai с 2026 доступна всем бесплатно. Claude наблюдает за разговорами и сохраняет важные факты: твоё имя, бизнес, предпочтения. Ты видишь и редактируешь список в Settings → Memory. Для чего: личный контекст который должен сохраняться между сессиями.</p>
<p><strong>MCP Knowledge Graph (структурированная память):</strong> внешний сервер который хранит информацию как граф сущностей и связей. Локальный файл на твоём компьютере. Для чего: корпоративные знания, клиентская база, проекты.</p>
<p><strong>Agent Memory в Managed Agents:</strong> нативная память для агентных систем. Агент помнит что делал в предыдущих сессиях. Публичная бета с апреля 2026. Для чего: автономные агенты которые работают повторно.</p>
<h3>Простое правило выбора</h3>
<ul><li>Личные предпочтения и контекст о себе → Chat History Memory (claude.ai)</li><li>Информация о бизнесе и клиентах → MCP Knowledge Graph (Desktop)</li><li>Документы для справки → Claude Projects (загрузи файлы)</li><li>Автономный агент → Agent Memory (API)</li></ul>
<div class="tip-box"><strong>💡 Первый шаг:</strong> Включи Chat History Memory прямо сейчас. Settings → Memory → включить. Затем в новом чате напиши о своём бизнесе — Claude запомнит. В следующей сессии он уже будет знать контекст без повторного объяснения.</div>`,
   prompts:[{l:'Настройка',p:`Запомни контекст:\n\nИМЯ: [имя]\nБИЗНЕС: [описание]\nАУДИТОРИЯ: [ЦА]\nЦЕЛИ: [на год]\nСТИЛЬ РАБОТЫ: [как работать]\n\nЧТО ПОМНИТЬ:\n- [факт 1]\n- [факт 2]`},{l:'Проверка',p:`Что ты знаешь обо мне?\n\n1. Факты\n2. Контекст работы\n3. Предпочтения\n\nЧто обновить?`}],
   steps:[{s:'Settings → Memory → включить (все планы)'},{s:'Скопируй "Настройка"',copy:true},{s:'Расскажи о бизнесе'},{s:'Новый чат → "Что ты знаешь обо мне?"'}],
