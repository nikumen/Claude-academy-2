<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="description" content="Claude Academy — интерактивный курс по освоению Claude AI от основ до экспертного уровня">
<meta name="theme-color" content="#6667AB">
<meta property="og:title" content="Claude Academy 🎓">
<meta property="og:description" content="12 треков · 46 миссий · от основ до AI-архитектора">
<meta property="og:type" content="website">
<title>Claude Academy 🎓</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* PANTONE 2020-2025 Color System */
:root{
  --bg:#FDF6EE;--white:#FFF;--border:#E8D5C5;--shadow:0 2px 12px rgba(150,114,89,.1);--shadow-lg:0 8px 32px rgba(150,114,89,.18);
  --mocha:#967259;--mocha-l:#F5EDE6;--mocha-d:#7A5544;
  --peach:#FF9C6B;--peach-l:#FFF3EC;
  --peri:#6667AB;--peri-l:#EDEDF7;--peri-d:#4F50A0;
  --magenta:#BB2649;--magenta-l:#FDF0F3;
  --gold:#C8960C;--gold-l:#FEF5D9;
  --green:#3DA876;--green-l:#EBF8F3;
  --blue:#3B82C4;--blue-l:#EBF3FC;
  --t1:#2C1A0E;--t2:#7A5C4A;--t3:#B8A498;
  --r:14px;--rs:10px;--rf:99px;
  --easy:#3DA876;--med:#F59E0B;--hard:#E05A2B;--exp:#BB2649;
  --fh:'Nunito',system-ui,sans-serif;--fb:'DM Sans',system-ui,sans-serif;--fm:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--fb);background:var(--bg);color:var(--t1);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:var(--fh)}
button{font-family:var(--fb);cursor:pointer;border:none;outline:none;transition:all .18s}
a{color:var(--peri)}a:hover{text-decoration:underline}
/* Layout */
.app-pc{display:grid;grid-template-columns:268px 1fr;min-height:100vh}
.app-mobile{display:flex;flex-direction:column;min-height:100vh}
.sidebar{background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.main{overflow-y:auto;min-height:100vh;background:var(--bg)}
.mob-header{background:var(--white);border-bottom:1px solid var(--border);padding:10px 16px;position:sticky;top:0;z-index:50}
.mob-nav{background:var(--white);border-top:1px solid var(--border);display:flex;position:sticky;bottom:0;z-index:50}
.mob-nav-btn{flex:1;padding:10px 4px 12px;background:none;color:var(--t2);font-size:10px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:var(--fh);transition:color .15s}
.mob-nav-btn.on{color:var(--peri)}.mob-nav-btn .ni{font-size:22px;line-height:1}
.container{max-width:800px;margin:0 auto;padding:24px 20px}
/* Sidebar */
.sb-logo{padding:20px 22px 14px;border-bottom:1px solid var(--border)}
.logo-txt{font-family:var(--fh);font-size:19px;font-weight:900}.logo-txt span{color:var(--peri)}
.sb-prof{padding:14px 22px;border-bottom:1px solid var(--border)}
.lvl-ring{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--peri),var(--mocha));display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:18px;font-weight:900;color:#fff;flex-shrink:0;box-shadow:var(--shadow)}
.xp-bar{height:7px;background:var(--border);border-radius:var(--rf);overflow:hidden;margin:6px 0}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--peach));border-radius:var(--rf);transition:width .6s ease}
.sb-nav{padding:10px 8px;flex:1;overflow-y:auto}
.nav-btn{display:flex;align-items:center;gap:9px;padding:9px 14px;border-radius:var(--rs);width:100%;background:none;color:var(--t2);font-size:13px;font-weight:700;font-family:var(--fh);text-align:left;margin-bottom:1px}
.nav-btn:hover{background:var(--bg);color:var(--t1)}.nav-btn.on{background:var(--peri-l);color:var(--peri)}.nav-btn .ni2{font-size:16px;width:22px;text-align:center}
.sb-foot{padding:14px 22px;border-top:1px solid var(--border);margin-top:auto}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 20px;border-radius:var(--rs);font-size:13px;font-weight:700;font-family:var(--fh);cursor:pointer;border:none;transition:all .18s}
.btn-p{background:var(--peri);color:#fff}.btn-p:hover{background:var(--peri-d);transform:translateY(-1px);box-shadow:var(--shadow)}
.btn-g{background:var(--white);color:var(--t1);border:1.5px solid var(--border)}.btn-g:hover{border-color:var(--mocha);color:var(--mocha)}
.btn-ok{background:var(--green);color:#fff}.btn-ok:hover{filter:brightness(1.08)}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:8px}
.btn-full{width:100%;padding:13px;font-size:15px}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
.btn-copy{background:var(--peri-l);color:var(--peri);border:none;padding:6px 13px;border-radius:7px;font-size:11px;font-weight:700;font-family:var(--fh);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.btn-copy:hover{background:var(--peri);color:#fff}
.btn-open{background:var(--mocha-l);color:var(--mocha-d);border:none;padding:6px 13px;border-radius:7px;font-size:11px;font-weight:700;font-family:var(--fh);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.btn-open:hover{background:var(--mocha);color:#fff}
/* Cards */
.card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:var(--shadow)}
/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--rf);font-size:11px;font-weight:700;font-family:var(--fh)}
.b-xp{background:var(--gold-l);color:var(--gold)}.b-ok{background:var(--green-l);color:var(--green)}
.b-easy{background:#EBF8F3;color:#3DA876}.b-med{background:#FEF5D9;color:#C8960C}
.b-hard{background:#FFF0EB;color:#E05A2B}.b-exp{background:var(--magenta-l);color:var(--magenta)}
/* Chapter path */
.chapter{margin-bottom:28px}
.ch-hdr{display:flex;align-items:center;gap:12px;padding:14px 18px;border-radius:var(--r);margin-bottom:14px}
.ch-num{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:900;font-size:15px;color:#fff;flex-shrink:0}
.track-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:11px}
.track-node{background:var(--white);border:2px solid var(--border);border-radius:var(--r);padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.track-node:hover:not(.locked){transform:translateY(-3px);box-shadow:var(--shadow-lg)}.track-node.locked{opacity:.45;cursor:not-allowed}
.track-node.done{border-color:var(--green)}
.tn-icon{font-size:32px;margin-bottom:8px;display:block}.tn-prog{height:4px;background:var(--border);border-radius:var(--rf);overflow:hidden;margin-top:10px}.tn-fill{height:100%;border-radius:var(--rf)}
/* Mission path */
.mission-path{position:relative;padding-left:44px}
.mission-path::before{content:'';position:absolute;left:20px;top:0;bottom:0;width:2px;background:var(--border);border-radius:2px}
.mp-item{position:relative;margin-bottom:10px;cursor:pointer}
.mp-dot{position:absolute;left:-32px;width:24px;height:24px;border-radius:50%;border:2px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;font-family:var(--fh);top:10px;z-index:1;transition:all .2s}
.mp-dot.done{background:var(--green);border-color:var(--green);color:#fff}
.mp-dot.active{background:var(--peri);border-color:var(--peri);color:#fff;box-shadow:0 0 0 4px var(--peri-l)}
.mp-dot.locked{background:var(--border);color:var(--t3)}
.mp-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--rs);padding:13px 15px;transition:all .15s}
.mp-card:hover:not(.m-locked){border-color:var(--peri);background:var(--peri-l)}
.mp-card.m-active{border-color:var(--peri);background:var(--peri-l)}.mp-card.m-locked{opacity:.5;cursor:not-allowed}
/* Mission tabs */
.m-tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.m-tab{padding:8px 16px;border-radius:var(--rf);background:var(--white);border:1.5px solid var(--border);font-size:13px;font-weight:700;font-family:var(--fh);color:var(--t2);cursor:pointer;transition:all .15s}
.m-tab.on{background:var(--peri);border-color:var(--peri);color:#fff}
/* Theory */
.theory h3{font-family:var(--fh);font-size:15px;font-weight:800;color:var(--t1);margin:16px 0 7px}
.theory h3:first-child{margin-top:0}
.theory p{color:var(--t2);margin-bottom:10px;line-height:1.85}
.theory strong{color:var(--t1)}.theory ul,.theory ol{padding-left:20px;color:var(--t2);margin-bottom:10px}
.theory li{margin-bottom:5px;line-height:1.75}
.theory code{background:var(--bg);border:1px solid var(--border);padding:2px 7px;border-radius:5px;font-family:var(--fm);font-size:11px;color:var(--mocha)}
.theory .info-box{background:var(--blue-l);border-left:3px solid var(--blue);padding:12px 14px;border-radius:0 var(--rs) var(--rs) 0;margin:12px 0}
.theory .tip-box{background:var(--green-l);border-left:3px solid var(--green);padding:12px 14px;border-radius:0 var(--rs) var(--rs) 0;margin:12px 0}
.theory .warn-box{background:var(--gold-l);border-left:3px solid var(--gold);padding:12px 14px;border-radius:0 var(--rs) var(--rs) 0;margin:12px 0}
.theory table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}
.theory th{background:var(--bg);padding:8px 12px;text-align:left;font-family:var(--fh);font-weight:700;border-bottom:2px solid var(--border)}
.theory td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--t2)}
/* Prompts */
.prompt-box{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--rs);overflow:hidden;margin:10px 0}
.pb-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:var(--white);border-bottom:1px solid var(--border)}
.pb-label{font-family:var(--fh);font-size:10px;font-weight:800;color:var(--t2);text-transform:uppercase;letter-spacing:.06em}
.pb-actions{display:flex;gap:6px;align-items:center}
.pb-text{padding:13px;font-family:var(--fm);font-size:12px;color:var(--t1);white-space:pre-wrap;word-break:break-word;line-height:1.7;max-height:280px;overflow-y:auto}
.pb-text::-webkit-scrollbar{width:4px}.pb-text::-webkit-scrollbar-thumb{background:var(--border)}
.prompt-tabs{display:flex;gap:4px;margin-bottom:8px}
.p-tab{padding:5px 12px;border-radius:var(--rf);background:var(--border);font-size:11px;font-weight:700;font-family:var(--fh);color:var(--t2);cursor:pointer;border:none;transition:all .15s}
.p-tab.on{background:var(--peri);color:#fff}
/* Practice */
.practice-steps{display:flex;flex-direction:column;gap:9px}
.ps-item{display:flex;align-items:flex-start;gap:13px;padding:13px;background:var(--white);border:1px solid var(--border);border-radius:var(--rs)}
.ps-num{width:26px;height:26px;border-radius:50%;background:var(--peri-l);color:var(--peri);display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:800;font-size:12px;flex-shrink:0}
.ps-title{font-weight:600;font-size:13px;color:var(--t1);margin-bottom:4px}
.ps-desc{font-size:12px;color:var(--t2)}
/* Quick prompts */
.qp-section{background:linear-gradient(135deg,var(--peri-l),var(--mocha-l));border:1.5px solid var(--peri);border-radius:var(--r);padding:16px;margin-bottom:16px}
.qp-title{font-family:var(--fh);font-weight:800;font-size:14px;color:var(--peri-d);margin-bottom:12px}
.qp-item{background:var(--white);border-radius:var(--rs);padding:10px 12px;margin-bottom:8px;border:1px solid var(--border)}
.qp-name{font-family:var(--fh);font-weight:700;font-size:12px;color:var(--t1);margin-bottom:4px}
.qp-prompt{font-family:var(--fm);font-size:11px;color:var(--t2);margin-bottom:8px;white-space:pre-wrap;max-height:120px;overflow:auto}
/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat{background:var(--white);border:1px solid var(--border);border-radius:var(--rs);padding:14px;text-align:center;box-shadow:var(--shadow)}
.sv{font-family:var(--fh);font-size:24px;font-weight:900;line-height:1}.sl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-top:3px}
/* Skills/Plugins */
.lib-tabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.lib-tab{padding:8px 16px;border-radius:var(--rf);background:var(--white);border:1.5px solid var(--border);font-size:13px;font-weight:700;font-family:var(--fh);color:var(--t2);cursor:pointer;transition:all .15s}
.lib-tab.on{background:var(--peri);border-color:var(--peri);color:#fff}
.skill-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:11px}
.skill-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:15px;transition:all .18s;display:flex;flex-direction:column;gap:9px}
.skill-card:hover{border-color:var(--peri);box-shadow:var(--shadow)}
.sc-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.sc-name{font-family:var(--fh);font-weight:800;font-size:14px;color:var(--t1)}
.sc-desc{font-size:12px;color:var(--t2);line-height:1.5}
.sc-cmd{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-family:var(--fm);font-size:10px;color:var(--mocha);word-break:break-all;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s}
.sc-cmd:hover{background:var(--mocha-l);border-color:var(--mocha)}
/* Deploy guide */
.deploy-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:14px}
.deploy-step{display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:1px solid var(--border)}
.deploy-step:last-child{border-bottom:none}
.deploy-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:900;font-size:14px;flex-shrink:0;color:#fff}
/* Share & Profile */
.achievements-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:9px}
.ach-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--rs);padding:13px;text-align:center}
.ach-card.earned{border-color:var(--gold);background:var(--gold-l)}
.ach-icon{font-size:28px;margin-bottom:5px}.ach-name{font-family:var(--fh);font-weight:700;font-size:11px}.ach-desc{font-size:10px;color:var(--t2);margin-top:2px}
/* Toast & XP */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--t1);color:#fff;padding:10px 20px;border-radius:var(--rf);font-family:var(--fh);font-weight:700;font-size:13px;z-index:9999;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow-lg);animation:tin .3s ease,tout .3s 2.4s ease forwards;white-space:nowrap;max-width:90vw}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes tout{to{opacity:0;transform:translateX(-50%) translateY(20px)}}
.xpf{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);font-family:var(--fh);font-size:30px;font-weight:900;color:var(--gold);pointer-events:none;animation:xup 1.4s ease forwards;z-index:9999;text-shadow:0 2px 10px rgba(0,0,0,.15)}
@keyframes xup{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}60%{transform:translate(-50%,-90%) scale(1.4)}100%{opacity:0;transform:translate(-50%,-130%) scale(1.1)}}
/* Input */
input[type=text]{padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--rs);font-family:var(--fh);font-size:14px;font-weight:600;outline:none;background:var(--bg);color:var(--t1);transition:border-color .15s;width:100%}
input[type=text]:focus{border-color:var(--peri)}
/* Shared profile page */
.shared-wrap{min-height:100vh;background:linear-gradient(135deg,var(--peri-l) 0%,var(--bg) 50%,var(--peach-l) 100%);display:flex;align-items:center;justify-content:center;padding:20px}
.sec-title{font-family:var(--fh);font-size:20px;font-weight:900;margin-bottom:4px}
.sec-sub{color:var(--t2);font-size:13px;margin-bottom:18px}
/* Responsive */
@media(max-width:640px){.track-grid{grid-template-columns:1fr 1fr}.skill-grid{grid-template-columns:1fr}.container{padding:16px 14px}.stats-row{gap:7px}.achievements-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:380px){.track-grid{grid-template-columns:1fr}.stats-row{grid-template-columns:repeat(3,1fr)}}

/* ===== GLOSSARY ===== */
.gl-term{border-bottom:1.5px dashed var(--peri);cursor:pointer;transition:color .12s;font-weight:inherit}
.gl-term:hover{color:var(--peri)}
.gl-popup-bg{position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:99990;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
.gl-popup{background:var(--white);border-radius:20px;padding:24px 26px;max-width:440px;width:100%;box-shadow:0 16px 48px rgba(0,0,0,.22);position:relative;animation:popIn .25s cubic-bezier(.34,1.56,.64,1);max-height:85vh;overflow-y:auto}
.gl-pop-name{font-family:var(--fh);font-size:21px;font-weight:900;margin-bottom:2px}
.gl-pop-full{font-size:12px;color:var(--peri);font-weight:700;margin-bottom:10px}
.gl-pop-def{font-size:13px;color:var(--t1);line-height:1.8;margin-bottom:12px}
.gl-pop-ex{background:var(--peri-l);border-left:3px solid var(--peri);border-radius:0 var(--rs) var(--rs) 0;padding:10px 12px;font-size:12px;color:var(--t1);margin-bottom:12px;line-height:1.7}
.gl-pop-ex strong{color:var(--peri-d)}
.gl-pop-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.gl-pop-tag{font-size:11px;padding:3px 9px;border-radius:99px;background:var(--bg);border:1px solid var(--border);cursor:pointer;color:var(--t2);font-family:var(--fh);font-weight:700;transition:all .12s}
.gl-pop-tag:hover{background:var(--peri-l);border-color:var(--peri);color:var(--peri)}
.gl-close{position:absolute;top:16px;right:16px;width:28px;height:28px;border-radius:50%;background:var(--bg);border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--t2);transition:all .12s}
.gl-close:hover{background:var(--border);color:var(--t1)}
.gl-search{width:100%;padding:10px 14px 10px 38px;border:1.5px solid var(--border);border-radius:var(--rs);font-family:var(--fb);font-size:14px;outline:none;background:var(--bg);color:var(--t1);transition:border-color .15s}
.gl-search:focus{border-color:var(--peri)}
.gl-search-wrap{position:relative;margin-bottom:14px}
.gl-search-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:18px}
.gl-filter{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.gl-ftag{padding:5px 12px;border-radius:var(--rf);font-size:11px;font-weight:700;font-family:var(--fh);cursor:pointer;border:1.5px solid var(--border);background:var(--white);color:var(--t2);transition:all .12s}
.gl-ftag.on{border-width:2px}
.gl-alpha{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px}
.gl-a{padding:4px 9px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--t2);font-family:var(--fh);transition:all .12s}
.gl-a:hover,.gl-a.on{background:var(--peri);color:#fff;border-color:var(--peri)}
.gl-section-hdr{font-size:12px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;padding:8px 0 4px;font-family:var(--fh);border-bottom:1px solid var(--border);margin-bottom:8px;margin-top:14px}
.gl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:8px}
.gl-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:12px 14px;cursor:pointer;transition:all .15s}
.gl-card:hover{border-color:var(--peri);transform:translateY(-1px);box-shadow:var(--shadow)}
.gl-card-name{font-family:var(--fh);font-size:14px;font-weight:800;display:flex;align-items:center;gap:5px;margin-bottom:3px}

  {t:'Экосистема Claude май 2026',xp:100,
   theory:`<h3>Что такое Claude на самом деле — взгляд изнутри</h3>
<p>Claude — это не поисковик и не база данных. Это языковая модель обученная на принципах <strong>Constitutional AI</strong>: системы ценностей встроены в саму архитектуру, а не добавлены как фильтр поверх. Это объясняет почему Claude рассуждает иначе чем другие LLM — он не просто генерирует вероятный текст, он взвешивает полезность, безопасность и честность одновременно.</p>
<h3>Актуальные модели — как выбирать (май 2026)</h3>

<tr><td><strong>Claude Sonnet 4.6</strong></td><td>90% задач бизнеса. <em>#1 на Finance Agent benchmark (63.3%)</em>. Оптимум скорость/качество/цена</td><td>1M токенов</td><td>$3/$15 MTok</td></tr>
<tr><td><strong>Claude Haiku 4.5</strong></td><td>Классификация, быстрые ответы, sentiment анализ в pipeline где важна скорость</td><td>200K токенов</td><td>$0.25/$1.25 MTok</td></tr></table>
<div class="warn-box">⚠️ <strong>Депрекация:</strong> Sonnet 4 (claude-sonnet-4-20250514) и Opus 4 выводятся 15 июня 2026. Если используешь их в API или коде — мигрируй на 4.6/4.7 прямо сейчас.</div>
<h3>Почему Sonnet 4.6 занял 1-е место на Finance Agent</h3>
<p>Это не случайность. Sonnet 4.6 обучался на расширенном наборе финансовых рассуждений и демонстрирует особенно высокое качество в задачах где нужны: многошаговые выводы, работа с числами, взвешивание неопределённости. 63.3% на Finance Agent v1.1 — это на 12+ процентных пунктов выше ближайшего конкурента среди всех LLM.</p>

   prompts:[{l:'Старт',p:`Я изучаю Claude в мае 2026.\n\nОбъясни:\n1. Чем Opus 4.7, Sonnet 4.6 и Haiku 4.5 отличаются — когда использовать?\n2. Что такое Cowork и Dispatch?\n3. Как Memory работает на Free плане?\n4. Что такое Managed Agents и Advisor Tool?\n\nДай практичный ответ.`},{l:'Для бизнеса',p:`Я [опиши себя и бизнес].\n\nПомоги выбрать экосистему Claude:\n1. Какой план?\n2. Какие продукты (Chat/Code/Cowork/API)?\n3. Топ-5 use cases для моего бизнеса\n4. Первые 3 конкретных шага\n\nБудь честен про стоимость.`}],

  {t:'Claude Desktop + MCP 2026',xp:150,
   theory:`<h3>Что такое Claude Desktop и зачем нужен отдельный десктопный клиент</h3>
<p>Claude.ai работает в браузере — это удобно, но ограничено. Claude Desktop — отдельное приложение для Mac и Windows которое открывает принципиально новые возможности через подключение внешних инструментов (MCP).</p>
<p>Главное отличие: в браузере Claude знает только то что ты ему написал. В Desktop с MCP — Claude может читать твои файлы, делать веб-поиск, управлять репозиториями GitHub, работать с базами данных — всё это в рамках одного разговора.</p>
<h3>Model Context Protocol (MCP) — что это такое</h3>
<p>MCP — открытый стандарт придуманный Anthropic для подключения внешних инструментов к Claude. Аналогия: USB-C для устройств. До USB-C каждый производитель делал свой разъём. MCP стандартизировал подключение AI к инструментам — теперь любой MCP-сервер работает с любым MCP-совместимым клиентом.</p>
<p>В 2026 существует 500+ MCP-серверов. Часть официальные (от Anthropic), часть созданы сообществом. Desktop Extensions (.mcpb) позволяют устанавливать серверы двойным кликом — Node.js не нужен.</p>
<h3>Как Claude использует MCP-инструменты</h3>
<p>Claude не "знает" содержимое твоих файлов заранее. Когда ты спрашиваешь "прочитай мой файл проекта" — Claude вызывает инструмент filesystem.read, получает содержимое файла в контекст и только тогда отвечает. Ты контролируешь какие папки доступны.</p>
<h3>Конфигурация и топ серверов для старта</h3>
<ul><li><strong>Mac:</strong> <code>~/Library/Application Support/Claude/claude_desktop_config.json</code></li><li><strong>Windows:</strong> <code>%APPDATA%\Claude\claude_desktop_config.json</code></li></ul>
<p>Начни с двух серверов: <strong>filesystem</strong> (доступ к файлам) и <strong>memory</strong> (Knowledge Graph). Они дают 80% пользы без сложной настройки. GitHub, playwright, postgres — добавляй по мере конкретной необходимости.</p>
<div class="tip-box"><strong>💡 После каждого изменения конфига:</strong> обязательно перезапускай Claude Desktop — новые серверы не подключаются автоматически. Проверка: спроси Claude "Какие инструменты у тебя есть?" — он перечислит всё доступное.</div>`,
   prompts:[{l:'Конфиг',p:`// claude_desktop_config.json\n{\n  "mcpServers": {\n    "filesystem": {\n      "command": "npx",\n      "args": ["-y", "@modelcontextprotocol/server-filesystem", "/Users/ИМЯ/Projects"]\n    },\n    "memory": {\n      "command": "npx",\n      "args": ["-y", "@modelcontextprotocol/server-memory", "--memory-path", "/Users/ИМЯ/.claude-memory"]\n    },\n    "github": {\n      "command": "npx",\n      "args": ["-y", "@modelcontextprotocol/server-github"],\n      "env": {"GITHUB_PERSONAL_ACCESS_TOKEN": "ghp_ТОКЕН"}\n    }\n  }\n}`},{l:'Подбор MCP',p:`Подбери MCP для Claude Desktop.\n\nЗадачи: [опиши]\nОС: [Mac/Win/Linux]\n\n1. Топ-5 MCP для задач\n2. Готовый config.json\n3. Команды установки\n4. Как проверить работу`}],
   steps:[{s:'Скачай Claude Desktop: claude.com/download'},{s:'Скопируй конфиг',copy:true},{s:'Вставь в config файл → перезапусти Desktop'},{s:'Settings → Customize — маркетплейс плагинов'}],
   tips:['filesystem + memory = минимальный рабочий набор','Перезапуск Desktop после каждого изменения конфига','Desktop Extensions (.mcpb) — двойной клик, npm не нужен']},
  {t:'Projects и Memory',xp:120,
   theory:`<h3>Projects — почему изоляция контекста важна</h3>
<p>Без Projects Claude знает только то что ты написал в текущем чате. Projects решают это: у каждого проекта своя история разговоров, загруженные документы и постоянные инструкции (Project Instructions). Это как дать Клоду отдельный "мозг" для каждой роли.</p>
<p>Практически: Projects с Project Instructions экономит в среднем 10-15 минут на каждой сессии — не нужно заново объяснять контекст. При 3 сессиях в день это <strong>30-45 минут в день, 150+ часов в год</strong>.</p>
<h3>Как работает контекстное окно в Projects</h3>
<p>Projects хранят до 200K токенов контекста. Это ~150 000 слов — весь средний роман. В этот объём входят: Project Instructions + загруженные файлы + история текущей беседы. Совет: загружай документы которые нужны постоянно (гайдлайны, FAQ, спецификации), а не разовые.</p>
<h3>Memory — три уровня понимания</h3>
<p><strong>Что это:</strong> Claude наблюдает за разговорами и автоматически сохраняет важные факты — твоё имя, бизнес, предпочтения, цели. Ты видишь список в Settings → Memory и можешь редактировать.</p>
<p><strong>Как хранится:</strong> Структурированные текстовые записи в облаке Anthropic. Не векторная БД — это важно: Memory хороша для фактов ("пользователь работает в e-commerce"), не для поиска по документам (для этого Projects).</p>
<p><strong>Ограничения которые нужно знать:</strong> Memory работает только в claude.ai, не в API. В API нужен MCP memory сервер. Memory не заменяет Project Instructions — она дополняет их личным контекстом.</p>
<table><tr><th>Инструмент</th><th>Для чего</th><th>Объём</th></tr>

<tr><td><strong>Загруженные файлы</strong></td><td>Документы для ответов на вопросы</td><td>200K токенов суммарно</td></tr>
<tr><td><strong>Memory</strong></td><td>Долгосрочный личный контекст</td><td>~100 фактов</td></tr>
<tr><td><strong>Chat History</strong></td><td>История конкретного разговора</td><td>200K токенов</td></tr></table>
<div class="tip-box"><strong>💡 Лучшая стратегия:</strong> Project Instructions = роль и контекст бизнеса. Memory = личные факты о тебе. Файлы = документы для справки. Это три разных слоя — не дублируй одно в другом.</div>`,
   prompts:[{l:'Project Instructions',p:`Ты — AI-ассистент для [бизнес].\n\nКОНТЕКСТ: [описание]\nРОЛЬ: [кто я]\n\nСТИЛЬ:\n- Тон: [экспертный/дружеский]\n- Язык: русский\n- Формат: структурированно\n\nВАЖНО:\n- [факт 1]\n- [факт 2]`},{l:'Настройка Memory',p:`Запомни контекст работы:\n\nИМЯ: [имя]\nБИЗНЕС: [описание]\nАУДИТОРИЯ: [ЦА]\nЦЕЛИ: [на год]\nСТИЛЬ: [как работать]\n\nЧТО ПОМНИТЬ:\n- [факт 1]\n- [факт 2]`}],
   steps:[{s:'Создай Project: Claude.ai → New Project'},{s:'Скопируй Project Instructions',copy:true},{s:'Настрой Memory — скопируй "Настройка Memory"'},{s:'Создай 3 Projects: Маркетинг / Разработка / Личное'}],

  {t:'Cowork, Dispatch и автономная работа',xp:180,
   theory:`<h3>Агентный режим — принципиально другое использование Claude</h3>
<p>Обычный Claude = диалог: ты пишешь → он отвечает → ты снова пишешь. Агентный режим (Cowork) = задание: ты ставишь цель → Claude сам планирует шаги → выполняет последовательно → сообщает результат. Ты не участвуешь в процессе.</p>
<p>Принципиальное отличие: в агентном режиме Claude получает доступ к твоим инструментам (файлы, почта, календарь) и использует их по цепочке. Это как нанять ассистента который работает пока ты на встрече.</p>

<tr><td>Собрать данные из 5 источников</td><td>Придётся вручную</td><td>✅ Лучше</td></tr>
<tr><td>Ежедневный брифинг</td><td>Нужно запускать каждый раз</td><td>✅ Автоматически</td></tr>

start:{id:'start',title:'Первые шаги',icon:'🌱',color:'#3DA876',desc:'Основы работы с Claude',diff:'easy',missions:[
  {t:'Принципы эффективного общения',xp:80,
   theory:`<h3>Почему Claude отвечает именно так — механика изнутри</h3>
<p>Claude не "ищет ответ" — он генерирует наиболее вероятное продолжение текста, опираясь на всё что было в его обучении и в текущем контексте. Это означает: <strong>чем точнее ты описываешь ситуацию, тем меньше пространства для "угадывания"</strong> у модели, и тем точнее результат.</p>
<p>Представь: тебе нужно написать письмо. Если тебе говорят только "напиши письмо" — ты пишешь что-то нейтральное и общее. Если говорят "напиши письмо клиенту который не платил 90 дней, тон дружелюбный но настойчивый, одна страница, без угроз" — ты пишешь точно нужное. Claude работает так же.</p>
<h3>Три уровня промптов — с примерами</h3>

<tr><td>Средний</td><td>"Напиши пост о кофе"</td><td>⭐⭐⭐ Лучше</td><td>Есть тема, нет аудитории и цели</td></tr>
<tr><td>Сильный</td><td>"Пост для кофейни в Москве, аудитория 25-40 лет, цель — привлечь в 14-17ч, хук+ценность+CTA, 150 слов"</td><td>⭐⭐⭐⭐⭐ Точно</td><td>Контекст + аудитория + цель + формат</td></tr></table>

<p>Многие пытаются написать идеальный промпт с первого раза — это ошибка. Профессиональные пользователи Claude думают иначе: <strong>первый ответ = черновик для уточнений</strong>. Итерация даёт лучший результат чем долгое написание промпта заранее.</p>

<div class="tip-box"><strong>💡 Секрет продвинутых пользователей:</strong> Попроси Claude задать тебе уточняющие вопросы прежде чем отвечать: "Прежде чем выполнять — задай мне 3-5 вопросов для точного результата." Это работает лучше любого промпт-фреймворка.</div>`,
   prompts:[{l:'Итерация',p:`Шаг 1: "Помоги написать [задача]"\nШаг 2: "Сделай профессиональнее, добавь цифры"\nШаг 3: "Укороти до 3 предложений, добавь CTA"\nШаг 4: "Дай 3 варианта: экспертный / дружеский / срочный"`},{l:'Уточнения',p:`Прежде чем отвечать — задай 3-5 уточняющих вопроса для точного ответа.\n\nПосле ответов — выполни задачу.\n\nЗадача: [опиши]`}],
   steps:[{s:'Скопируй промпт с уточнениями',copy:true},{s:'Попробуй задачу в 3-4 итерации'},{s:'Сравни первый и финальный результат'},{s:'Запомни: каждое уточнение = лучше'}],
   tips:['Shift+Enter = новая строка без отправки','Длинный контекст помогает — давай детали','Claude — собеседник, не поисковик']},
  {t:'Форматы ответов и JSON',xp:80,
   theory:`<h3>Почему явное указание формата — это не каприз, а необходимость</h3>
<p>Claude по умолчанию выбирает формат который считает "наиболее подходящим" для твоего вопроса. Обычно это prose (связный текст). Для чтения — нормально. Для автоматизации — катастрофа: парсить произвольный текст невозможно.</p>
<p>Явное указание формата гарантирует что результат будет применим без редактирования. Это основа любой интеграции с Make, n8n, Python или другими инструментами.</p>

<h3>Управление длиной</h3>

<div class="warn-box"><strong>⚠️ Главная ошибка с JSON:</strong> Без фразы "ТОЛЬКО JSON без пояснений" Claude часто добавляет текст до или после JSON. Это ломает автоматический парсинг. Всегда добавляй это требование явно при работе с автоматизацией.</div>`,
   prompts:[{l:'JSON анализ',p:`Верни ТОЛЬКО JSON:\n{\n  "product_name": "string",\n  "value_props": ["string"],\n  "weaknesses": ["string"],\n  "score": 1-10,\n  "recommendation": "string"\n}\nПродукт: [опиши]`},{l:'Структурированный',p:`Проанализируй [тему]:\n## Ключевые выводы\n[3-5 пунктов]\n## Возможности\n[таблица]\n## Риски\n[список]\n## Следующий шаг\n[1 действие]`}],
