 rel:['Polling','API']},

{id:'polling',name:'Polling',full:'Polling (опрос)',cat:'dev',catN:'Разработка',tags:['боты','интеграции'],
 def:'Механизм при котором твоё приложение регулярно спрашивает сервер "есть что-то новое?" Проще настроить чем Webhook, но создаёт лишнюю нагрузку и задержки. В Telegram-ботах: не рекомендуется для production.',
 ex:'getUpdates каждые 2 секунды → 30 запросов в минуту → большинство пустые. Webhook: 0 запросов в спокойное время, мгновенная реакция на событие.',
 rel:['Webhook','API']},

{id:'chunking',name:'Чанкинг',full:'Chunking (разбивка на части)',cat:'dev',catN:'Разработка',tags:['RAG','документы'],
 def:'Процесс разбивки длинных документов на меньшие части (чанки) для векторизации в RAG-системах. Размер чанка критически влияет на качество поиска: маленькие (200 токенов) — точный поиск но теряется контекст, большие (1500+) — больше контекста но менее точный поиск.',
 ex:'Оптимум для большинства задач: 500-800 токенов с перекрытием 100 токенов между соседними чанками.',
 rel:['RAG','Embedding','ChromaDB']},

{id:'langchain',name:'LangChain',full:'LangChain (AI-фреймворк)',cat:'dev',catN:'Разработка',tags:['разработка','RAG'],
 def:'Python-фреймворк для создания LLM-приложений. Готовые компоненты: история диалогов, RAG с документами, агенты с инструментами, structured output. Упрощает создание AI-приложений — не нужно писать типовой код с нуля.',
 ex:'Conversational RAG (чат с документами с памятью) — сложно без фреймворка, 3 строки с LangChain: llm + retriever + ConversationalRetrievalChain.',
 rel:['LlamaIndex','API','RAG']},

{id:'llamaindex',name:'LlamaIndex',full:'LlamaIndex (Data Framework для LLM)',cat:'dev',catN:'Разработка',tags:['RAG','документы'],
 def:'Python-фреймворк специализированный на работе с данными для LLM. Особенно хорош для RAG: загрузка документов, чанкинг, индексация, поиск. Часто предпочтительнее LangChain для data-heavy задач.',
 ex:'from llama_index import VectorStoreIndex, SimpleDirectoryReader — две строки для создания RAG из папки документов.',
 rel:['LangChain','ChromaDB','RAG']},

{id:'chroma',name:'ChromaDB',full:'ChromaDB (векторная база данных)',cat:'dev',catN:'Разработка',tags:['RAG','база данных'],
 def:'Открытая векторная база данных для локального хранения эмбеддингов. Устанавливается как Python-библиотека, хранит данные локально (приватность), персистентна (не переиндексирует при перезапуске). Стандарт для RAG-прототипов.',
 ex:'pip install chromadb → хранит векторы локально в папке ./chroma_db → при перезапуске не нужно заново индексировать документы.',
 rel:['RAG','Embedding','LlamaIndex']},

{id:'routine',name:'Routine',full:'Claude Code Routine',cat:'dev',catN:'Разработка',tags:['автоматизация','agentic'],
 def:'Агентная задача в Claude Code которая выполняется автоматически по cron-расписанию без внешней инфраструктуры. Описывается в Markdown файле (.claude/routines/) с frontmatter: schedule, model, allowed-tools.',
 ex:'schedule: "0 9 * * 1-5" = каждый будний день в 9:00. Claude Code запускает агента, тот проверяет новые PR, оставляет code review комментарии.',
 rel:['Claude Code','Agent']},

{id:'progressive_disclosure',name:'Progressive Disclosure',full:'Прогрессивное раскрытие',cat:'dev',catN:'Разработка',tags:['UX','Skills'],
 def:'UX-паттерн и архитектурный принцип: показывай только необходимый минимум, детали загружай по запросу. В Claude Code Skills: метаданные (~100 токенов) загружаются всегда, полный контент Skill — только когда нужен для текущей задачи.',
 ex:'10 Skills в проекте = 10 × 100 токенов метаданных = 1000 токенов накладных расходов. Без progressive disclosure было бы 10 × 1000 = 10 000.',
 rel:['Claude Code']},

{id:'semantic_search',name:'Семантический поиск',full:'Semantic Search',cat:'dev',catN:'Разработка',tags:['RAG','поиск'],
 def:'Поиск по смыслу а не по точному совпадению слов. Использует векторные эмбеддинги: запрос и документы превращаются в векторы, ищутся ближайшие по расстоянию. Находит синонимы и связанные понятия.',
 ex:'"Как вернуть товар" → найдёт документ где написано "процедура рекламации" или "оформление возврата" — без точного совпадения слов.',
 rel:['RAG','Embedding','ChromaDB']},

{id:'ai_os',name:'AI-OS',full:'AI Operating System',cat:'dev',catN:'Разработка',tags:['система','интеграция'],
 def:'Персональная AI-операционная система — не программа для скачивания, а система организации работы вокруг AI-инструментов. Как они связаны, что автоматизировано, как AI встроен в ежедневный процесс.',
 ex:'Утро: Cowork автоматически готовит брифинг. День: Brand Voice в каждом маркетинговом промпте. Вечер: Weekly Review через Claude. Это AI-OS.',
 rel:['Cowork','Dispatch','Claude Code']},

{id:'marp',name:'MARP',full:'Markdown Presentation Ecosystem',cat:'dev',catN:'Разработка',tags:['презентации','инструменты'],
 def:'Инструмент создания презентаций из Markdown-файлов. Пишешь текст в .md формате с разделителями слайдов (---) → получаешь PDF или HTML-презентацию. Идеально когда нужно быстро оформить структуру от Claude в слайды.',
 ex:'# Заголовок слайда\nТекст слайда\n---\n# Следующий слайд → MARP превращает это в готовую презентацию.',
 rel:['Schema Markup']},

{id:'schema_markup',name:'Schema Markup',full:'Schema.org Structured Data',cat:'dev',catN:'Разработка',tags:['SEO','разработка'],
 def:'JSON-LD код добавляемый на веб-страницу который объясняет Google структуру контента: FAQ, рецепт, статья, продукт, событие. Google может показать расширенный сниппет в поиске — кликабельность выше в 3-5 раз.',
 ex:'FAQ Schema → Google показывает вопросы-ответы прямо под ссылкой. HowTo Schema → Google показывает шаги в поиске. Без клика на сайт.',
 rel:['E-E-A-T']},

{id:'knowledge_graph',name:'Knowledge Graph',full:'Knowledge Graph (граф знаний)',cat:'dev',catN:'Разработка',tags:['память','MCP'],
 def:'Структура данных хранящая информацию как сеть сущностей (entities) и связей (relations) между ними. В MCP Memory Server: бизнес → обслуживает → клиент → участвует в → проекте. Позволяет Claude находить связанную информацию по цепочке.',
 ex:'Спрашиваешь о клиенте → Claude находит его entity → по relations находит связанный проект → по нему находит ключевые решения. Всё из одного запроса.',
 rel:['MCP','Embedding']},

/* Маркетинг */
{id:'brand_voice',name:'Brand Voice',full:'Голос бренда',cat:'mkt',catN:'Маркетинг',tags:['контент','стиль'],
 def:'Документ описывающий уникальный стиль коммуникации бренда: personality traits (прямой, экспертный), tone of voice, целевая аудитория и taboo. Вставляется в начало маркетинговых промптов — Claude генерирует контент в твоём стиле а не усреднённом.',
 ex:'Без Brand Voice: "Попробуйте наш инновационный продукт!". С Brand Voice "прямой, без клише": "Вот что реально изменится в вашей работе за первую неделю."',
 rel:['Content Repurposing','CTA']},

{id:'content_repurposing',name:'Content Repurposing',full:'Переиспользование контента',cat:'mkt',catN:'Маркетинг',tags:['контент','стратегия'],
 def:'Адаптация одного тезиса или контента для разных каналов и форматов. Один инсайт → Instagram Reels + LinkedIn статья + Telegram пост + email рассылка + X-thread. Claude делает все адаптации за один запрос.',
 ex:'Тезис: "Большинство предпринимателей теряют клиентов не из-за цены" → 7 форматов за один промпт: пост, статья, скрипт, карусель, email темы, thread, stories.',
 rel:['Brand Voice','CTA','Funnel']},

{id:'ab_test',name:'A/B тест',full:'A/B Testing',cat:'mkt',catN:'Маркетинг',tags:['оптимизация','данные'],
 def:'Метод сравнения двух вариантов (A и B) на реальной аудитории. 50% видят вариант A, 50% — вариант B. Победитель определяется по метрике (open rate, CTR, конверсия). Единственный способ узнать что работает без гадания.',
 ex:'Subject line A: "5 ошибок в email-маркетинге" vs B: "Почему ваши письма не открывают" → запустил на 200 подписчиках → A открыли 34%, B — 41% → B победил.',
 rel:['CTR','Open Rate','CTA']},

{id:'ctr',name:'CTR',full:'Click-Through Rate',cat:'mkt',catN:'Маркетинг',tags:['метрики','email'],
 def:'Процент людей кликнувших по ссылке от числа увидевших. CTR email = клики / открытия × 100%. Средний CTR email: 2-5%. Хороший: 8-12%. CTR рекламы обычно ниже: 0.5-2%.',
 ex:'Послал email 1000 человек. Открыли 250 (OR=25%). Из них кликнули 30 (CTR=30/250=12%). 30 человек перешли на сайт.',
 rel:['Open Rate','A/B тест','Funnel']},

{id:'open_rate',name:'Open Rate',full:'Open Rate (процент открытий)',cat:'mkt',catN:'Маркетинг',tags:['email','метрики'],
 def:'Процент получателей открывших email. Определяется почти исключительно темой письма (subject line) и именем отправителя. Средний OR: 20-25%. Хороший: 35-45%. Персонализация имени в теме поднимает OR на 26%.',
 ex:'Отправил 1000 писем → открыли 280 → OR = 28%. Плохой subject line → 15%. Отличный personalized → 45%.',
 rel:['CTR','A/B тест','Welcome-серия']},

{id:'cta',name:'CTA',full:'Call to Action',cat:'mkt',catN:'Маркетинг',tags:['конверсия','контент'],
 def:'Призыв к действию — элемент контента побуждающий совершить конкретное действие: купить, подписаться, перейти по ссылке, написать в комментариях. Один CTA в материале работает лучше нескольких.',
 ex:'"Подпишись", "Купить за 990₽", "Сохрани этот пост", "Напиши в комментариях свой вопрос" — все это CTA разной силы и цели.',
 rel:['Funnel','CTR','Content Repurposing']},

{id:'funnel',name:'Воронка',full:'Marketing/Sales Funnel',cat:'mkt',catN:'Маркетинг',tags:['продажи','стратегия'],
 def:'Последовательность шагов ведущих потенциального клиента от первого контакта до покупки. Называется воронкой потому что на каждом этапе часть людей уходит. Telegram-воронка: подписка → 5 сообщений → оффер.',
 ex:'1000 подписок → 600 открыли 1е письмо → 300 читали все → 150 кликнули оффер → 45 купили. Конверсия воронки: 4.5%.',
 rel:['CTA','Open Rate','CTR','Welcome-серия']},

{id:'pas',name:'PAS',full:'Problem → Agitation → Solution',cat:'mkt',catN:'Маркетинг',tags:['копирайтинг','фреймворки'],
 def:'Фреймворк копирайтинга: называешь боль (Problem), усиливаешь её эмоционально (Agitation), предлагаешь решение (Solution). Самый эффективный фреймворк для email и sales-страниц — люди сильнее реагируют на избегание боли.',
 ex:'P: "Тратишь часы на рутину". A: "Пока конкуренты автоматизировали и работают в 3 раза быстрее". S: "Claude + Make закрывают это за 2 часа настройки."',
 rel:['AIDA','BAB','4U','CTA']},

{id:'aida',name:'AIDA',full:'Attention → Interest → Desire → Action',cat:'mkt',catN:'Маркетинг',tags:['копирайтинг','фреймворки'],
 def:'Классический фреймворк копирайтинга с 1898 года: Attention (привлечь внимание), Interest (вызвать интерес), Desire (создать желание), Action (призвать к действию). Используется для рекламных объявлений и лендингов.',
 ex:'A: "87% предпринимателей теряют на этом деньги". I: "Исследование 500 компаний показало...". D: "Те кто исправил это получили...". A: "Начни бесплатно".',
 rel:['PAS','BAB','CTA']},

{id:'bab',name:'BAB',full:'Before → After → Bridge',cat:'mkt',catN:'Маркетинг',tags:['копирайтинг','истории'],
 def:'Фреймворк для историй и кейсов: описываешь ситуацию до (Before), рисуешь картину после трансформации (After), объясняешь как перейти от одного к другому (Bridge = твой продукт/метод).',
 ex:'B: "Тратил 4 часа в неделю на контент". A: "Теперь 40 минут". Bridge: "Библиотека промптов + Claude Code Routines".',
 rel:['PAS','AIDA','Content Repurposing']},

{id:'4u',name:'4U',full:'Useful · Urgent · Unique · Ultra-specific',cat:'mkt',catN:'Маркетинг',tags:['заголовки','копирайтинг'],
 def:'Фреймворк оценки и создания заголовков. Хороший заголовок должен быть: полезным (Useful), срочным (Urgent), уникальным (Unique) и ультра-конкретным (Ultra-specific). Проверяй каждый заголовок по всем четырём критериям.',
 ex:'"Как написать письмо" — 1/4U. "5 конкретных subject line которые подняли OR с 18% до 41% за месяц для B2B SaaS" — 4/4U.',
 rel:['PAS','AIDA','A/B тест']},

{id:'lsi',name:'LSI Keywords',full:'Latent Semantic Indexing Keywords',cat:'mkt',catN:'Маркетинг',tags:['SEO','контент'],
 def:'Семантически связанные слова и синонимы ключевого слова. Google использует LSI чтобы понять глубину раскрытия темы. Статья о "контент-маркетинге" должна содержать: редакционный календарь, целевая аудитория, воронка контента.',
 ex:'LSI для "Claude": промпт-инжиниринг, языковая модель, Anthropic, API, Projects — их присутствие сигнализирует Google что статья реально раскрывает тему.',
 rel:['E-E-A-T','Schema Markup']},

{id:'eeat',name:'E-E-A-T',full:'Experience · Expertise · Authoritativeness · Trustworthiness',cat:'mkt',catN:'Маркетинг',tags:['SEO','качество'],
 def:'Критерии оценки контента Google с 2023. Experience — личный опыт автора. Expertise — экспертность в теме. Authoritativeness — авторитетность источника. Trustworthiness — надёжность. AI-контент без личного опыта проигрывает.',
 ex:'Статья "Как я потерял $50 000 на trading ботах и что исправил" — высокий E-E-A-T. "Топ советов по трейдингу" без автора — низкий E-E-A-T.',
 rel:['LSI Keywords','Schema Markup']},

{id:'welcome',name:'Welcome-серия',full:'Email Welcome Series',cat:'mkt',catN:'Маркетинг',tags:['email','воронка'],
 def:'Автоматическая серия писем отправляемых новому подписчику в первые 7 дней. Критичный период: интерес максимален в момент подписки. Структура: выполни обещание → ценность → история → снятие возражения → оффер.',
 ex:'Mailchimp данные: письма в первые 24 часа открывают в 4x чаще среднего. Welcome-серия из 5 писем конвертирует в 3-5x лучше одного оффера.',
 rel:['Funnel','Open Rate','CTA']},

/* Операции */
{id:'okr',name:'OKR',full:'Objectives and Key Results',cat:'ops',catN:'Операции',tags:['планирование','цели'],
 def:'Система постановки целей: Objective (вдохновляющая качественная цель) + Key Results (3-5 измеримых результатов доказывающих достижение цели). 70% вероятность достижения KR — правильная амбиция. Использовалась Intel, Google, стартапами.',
 ex:'O: "Стать любимым сервисом для малого бизнеса". KR1: NPS с 42 до 67. KR2: Churn с 8% до 4%. KR3: 200 новых клиентов из referral.',
 rel:['KPI','SOP']},

{id:'kpi',name:'KPI',full:'Key Performance Indicator',cat:'ops',catN:'Операции',tags:['метрики','управление'],
 def:'Ключевой показатель эффективности — измеримая метрика отражающая успех в достижении бизнес-целей. Отличие от OKR: KPI — постоянные метрики которые мониторишь, OKR — временные цели на квартал.',
 ex:'KPI отдела продаж: ежемесячная выручка, конверсия лидов, средний чек. KPI маркетинга: CAC, LTV, органический трафик. Мониторятся постоянно.',
 rel:['OKR','SOP']},

{id:'sop',name:'SOP',full:'Standard Operating Procedure',cat:'ops',catN:'Операции',tags:['документация','процессы'],
 def:'Стандартная операционная процедура — пошаговая инструкция выполнения конкретного процесса. Позволяет любому сотруднику выполнить задачу качественно без дополнительного объяснения. Переносит знания из голов в документы.',
 ex:'SOP онбординга клиента: 1) создать папку 2) заполнить шаблон 3) отправить письмо 4) назначить звонок 5) поставить напоминание через 7 дней.',
 rel:['OKR','KPI']},

{id:'jtbd',name:'JTBD',full:'Jobs-to-be-Done',cat:'ops',catN:'Операции',tags:['стратегия','продукт'],
 def:'Методология: клиенты "нанимают" продукты чтобы выполнить определённую работу. Три уровня: Functional (задача), Emotional (как хотят себя чувствовать), Social (как хотят выглядеть). Меняет понимание конкурентов и позиционирования.',
 ex:'"Купить дрель" → реальный Job: "иметь дырку в стене". Конкуренты: другие дрели, болгарка, нанять мастера, попросить соседа.',
 rel:['Customer Development','SOP']},

{id:'para',name:'PARA',full:'Projects · Areas · Resources · Archive',cat:'ops',catN:'Операции',tags:['база знаний','организация'],
 def:'Система организации информации Тьяго Форте: Projects (активные с дедлайном), Areas (сферы без дедлайна), Resources (интересные темы), Archive (завершённое). Любой файл помещается в одну из четырёх категорий без долгих размышлений.',
 ex:'Проект "Запуск MVP" → Projects. "Здоровье" → Areas. "Prompt Engineering" → Resources. "Проект 2024" → Archive.',
 rel:['Zettelkasten','Knowledge Graph']},

{id:'zettelkasten',name:'Zettelkasten',full:'Zettelkasten (картотека)',cat:'ops',catN:'Операции',tags:['база знаний','заметки'],
 def:'Система заметок: одна заметка = одна идея, каждая связана с другими через ссылки ([[wikilinks]]). Создана социологом Никласом Луманом (70+ книг, 400 статей). В Obsidian реализуется через wikilinks — со временем возникает сеть знаний.',
 ex:'Заметка "Chain-of-Thought" → [[Промпт-инжиниринг]] → [[Few-shot]] → [[Extended Thinking]]. Новые инсайты появляются на пересечениях.',
 rel:['PARA','Knowledge Graph']},

{id:'custdev',name:'Custdev',full:'Customer Development',cat:'ops',catN:'Операции',tags:['валидация','стартап'],
 def:'Методология валидации продуктовых гипотез через интервью с потенциальными клиентами до написания кода. Цель: убедиться что проблема реально существует и люди готовы платить за решение. Придумана Стивом Бланком.',
 ex:'"Мамин тест": спрашивай о прошлом поведении, не о гипотетическом будущем. Не "купил бы?" а "как решаешь это сейчас? сколько тратишь?"',
 rel:['JTBD','SOP']},

{id:'tcfr',name:'TCFR',full:'Task · Context · Format · Rules',cat:'ops',catN:'Операции',tags:['промпты','фреймворки'],
 def:'Фреймворк структурированного промпта: Task (задача), Context (контекст: для кого, зачем), Format (длина, структура, стиль), Rules (ограничения и запреты). Четыре блока устраняют необходимость Claude угадывать что тебе нужно.',

/* ===== HELPERS ===== */
const LVL_IDX=xp=>{let l=0;for(let i=LVL.length-1;i>=0;i--){if(xp>=LVL[i].min){l=i;break;}}return l;};
const getLvl=()=>({idx:LVL_IDX(S.xp)+1,...LVL[LVL_IDX(S.xp)]});
const isDone=(t,i)=>(S.done[t]||[]).includes(i);
const tDone=t=>(S.done[t]||[]).length;
const totDone=()=>Object.values(TRACKS).reduce((a,t)=>a+tDone(t.id),0);
const totM=()=>Object.values(TRACKS).reduce((a,t)=>a+t.missions.length,0);
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const gT=()=>TRACKS[S.trackId];
const gM=()=>gT()?.missions[S.mIdx];
const lvlPct=()=>{const l=getLvl();const next=LVL[Math.min(l.idx,LVL.length-1)]?.min||S.xp;const prev=LVL[l.idx-1]?.min||0;return Math.min(100,((S.xp-prev)/Math.max(1,next-prev)*100)).toFixed(1);};
async function copyText(t){try{await navigator.clipboard.writeText(t);}catch(e){const a=document.createElement('textarea');a.value=t;document.body.appendChild(a);a.select();document.execCommand('copy');a.remove();}}
function toast(ico,msg,col='#3DA876'){document.querySelectorAll('.toast').forEach(e=>e.remove());const el=document.createElement('div');el.className='toast';el.innerHTML=`${ico}<span>${msg}</span>`;el.style.background=col;document.body.appendChild(el);setTimeout(()=>el?.remove(),3000);}
function floatXP(n){const el=document.createElement('div');el.className='xpf';el.textContent=`+${n} XP! 🎉`;document.body.appendChild(el);setTimeout(()=>el?.remove(),1500);}
function shareURL(){try{var json=JSON.stringify({xp:S.xp,done:S.done,badges:S.badges,name:S.name});var bytes=new TextEncoder().encode(json);var bin=String.fromCharCode.apply(null,bytes);var b64=btoa(bin);return location.href.split('#')[0]+'#p='+b64;}catch(e){return location.href;}}
function doComplete(tid,i){
  if(!S.done[tid])S.done[tid]=[];
  if(!S.done[tid].includes(i)){
    var oldLvlIdx=LVL_IDX(S.xp);
    S.done[tid].push(i);
    var m=TRACKS[tid]&&TRACKS[tid].missions[i];
    var g=(m&&m.xp)||100;
    S.xp+=g;
    save();
    var newLvlIdx=LVL_IDX(S.xp);
    checkBadges(tid);
    floatXP(g);
    toast('🎉','+'+g+' XP заработано!');
    // Level-up notification
    if(newLvlIdx>oldLvlIdx){
      var lvl=LVL[newLvlIdx];
      setTimeout(function(){showLevelUp({idx:newLvlIdx+1,n:lvl.n});},600);
    }
    return g;
  }
  return 0;
}
function checkBadges(tid){
  var newBadges=[];
  if(!S.badges.includes('f1')&&totDone()>=1){S.badges.push('f1');newBadges.push('f1');}
  var tr=TRACKS[tid];
  if(tr&&tDone(tid)>=tr.missions.length&&!S.badges.includes(tid)){
    S.badges.push(tid);
    newBadges.push(tid);
  }
  if(totDone()>=totM()&&!S.badges.includes('boss')){
    S.badges.push('boss');
    newBadges.push('boss');
  }
  save();
  // Show badge popups with delay
  newBadges.forEach(function(bid,idx){
    var b=BADGES.find(function(x){return x.id===bid;});
    if(b){
      setTimeout(function(){showBadge(b);},1200+(idx*400));
    }
  });
}

function setGlCat(btn){
  document.querySelectorAll('.gl-ftag').forEach(function(b){
    b.classList.remove('on');
    b.style.cssText='';
  });
  var catColors={'ai':'background:#EEEDFE;color:#534AB7','dev':'background:#EBF3FC;color:#185FA5',
    'mkt':'background:#FAECE7;color:#993C1D','ops':'background:#EBF8F3;color:#0F6E56','fin':'background:#FAEEDA;color:#854F0B'};
  btn.classList.add('on');
  if(btn.dataset.gcat==='all'){btn.style.cssText='background:var(--peri);color:#fff;border-color:var(--peri)';}
  else{btn.style.cssText=(catColors[btn.dataset.gcat]||'');}

function filterGlossary(){
  var q=(document.getElementById('glSearch').value||'').toLowerCase();
  var cat=(document.querySelector('.gl-ftag.on')||{dataset:{gcat:'all'}}).dataset.gcat;
  var filtered=GLOSSARY.filter(function(t){
    var matchCat=cat==='all'||t.cat===cat;
    var matchQ=!q||t.name.toLowerCase().includes(q)||t.full.toLowerCase().includes(q)||t.def.toLowerCase().includes(q);
    return matchCat&&matchQ;
  });
  var byLetter={};
  filtered.forEach(function(t){
    var l=t.name[0].toUpperCase();
    if(!byLetter[l])byLetter[l]=[];
    byLetter[l].push(t);
  });
  var keys=Object.keys(byLetter).sort();
  var out='';
  if(filtered.length===0){
    out='<div class="gl-empty">Ничего не найдено. Попробуй другой запрос.</div>';
  } else {
    keys.forEach(function(l){
      out+='<div class="gl-section-hdr">'+l+'</div><div class="gl-grid">';
      byLetter[l].forEach(function(t){
        var hasAbbr=(t.name!==t.full&&t.full);
        out+='<div class="gl-card" onclick="showGlossaryTerm(\''+t.id+'\')">' +
          '<div class="gl-card-name">'+t.name+
          (hasAbbr?'<span class="gl-card-abbr">акроним</span>':'')+
          '<span class="gl-card-cat '+gCatColor(t.cat)+'">'+t.catN+'</span></div>'+
          '<div class="gl-card-prev">'+t.def.substring(0,120)+'...</div></div>';
      });
      out+='</div>';
    });
  }
  var el=document.getElementById('glTerms');
  if(el)el.innerHTML=out;
}

function showGlossaryTerm(id){
  var t=GLOSSARY_MAP[id];
  if(!t)return;
  var existing=document.querySelector('.gl-popup-bg');
  if(existing)existing.remove();
  var bg=document.createElement('div');
  bg.className='gl-popup-bg';
  var box=document.createElement('div');
  box.className='gl-popup';
  var relHtml='';
  if(t.rel&&t.rel.length){
    relHtml='<div style="margin-top:12px"><div style="font-size:11px;color:var(--t3);margin-bottom:5px;font-weight:700;font-family:var(--fh)">СВЯЗАННЫЕ ТЕРМИНЫ</div>'+
      '<div class="gl-pop-tags">'+
      t.rel.map(function(r){
        var rid=TERM_ALIASES[r]||(r.toLowerCase().replace(/[^a-zа-я0-9]/g,'_'));
        return '<span class="gl-pop-tag" onclick="showGlossaryTerm(\''+rid+'\')">'+r+'</span>';
      }).join('')+'</div></div>';
  }
  box.innerHTML='<button class="gl-close" onclick="this.closest(\'.gl-popup-bg\').remove()">✕</button>'+
    '<div class="gl-pop-name">'+t.name+'</div>'+
    (t.full&&t.full!==t.name?'<div class="gl-pop-full">'+t.full+'</div>':'')+
    '<div style="margin-bottom:12px"><span class="gl-card-cat '+gCatColor(t.cat)+'" style="margin:0">'+t.catN+'</span></div>'+
    '<div class="gl-pop-def">'+t.def+'</div>'+
    '<div class="gl-pop-ex"><strong>Пример:</strong> '+t.ex+'</div>'+
    relHtml;
  bg.appendChild(box);
  document.body.appendChild(bg);
  bg.addEventListener('click',function(e){if(e.target===bg)bg.remove();});
}

function wrapGlossaryTerms(container){
  if(!container)return;
  var terms=Object.keys(TERM_ALIASES).sort(function(a,b){return b.length-a.length;});
  var walker=document.createTreeWalker(container,NodeFilter.SHOW_TEXT,null,false);
  var nodes=[];
  var n;
  while((n=walker.nextNode()))nodes.push(n);
  nodes.forEach(function(node){
    var p=node.parentNode;
    if(!p||p.classList&&(p.classList.contains('gl-term')||p.tagName==='CODE'||p.tagName==='PRE'))return;
    var text=node.textContent;
    var found=null;
    var foundTerm=null;
    var foundIdx=-1;
    terms.forEach(function(t){
      var idx=text.indexOf(t);
      if(idx>=0&&(foundIdx<0||idx<foundIdx||(idx===foundIdx&&t.length>foundTerm.length))){
        found=t; foundIdx=idx; foundTerm=t;
      }
    });
    if(!found)return;
    var id=TERM_ALIASES[found];
    var frag=document.createDocumentFragment();
    var before=text.substring(0,foundIdx);
    var after=text.substring(foundIdx+found.length);
    if(before)frag.appendChild(document.createTextNode(before));
    var sp=document.createElement('span');
    sp.className='gl-term';
    sp.textContent=found;
    sp.onclick=function(){showGlossaryTerm(id);};
    frag.appendChild(sp);
    if(after)frag.appendChild(document.createTextNode(after));
    p.replaceChild(frag,node);
  });
}

    t.addEventListener('click', function(){ S.promptTab=parseInt(t.dataset.pi); render(); });
  });

  // Copy main/step prompt buttons
  var cpyMain=document.getElementById('cpyMain');
  if(cpyMain) cpyMain.addEventListener('click', async function(){
    var m=gM();
    var p=((m&&m.prompts)||[])[S.promptTab];
    await copyText((p&&p.p)||(m&&m.ex)||'');
    toast('📋','Промпт скопирован!');
  });
  var cpyStep=document.getElementById('cpyStep');
  if(cpyStep) cpyStep.addEventListener('click', async function(){
    var m=gM();
    var p=((m&&m.prompts)||[])[S.promptTab];
    await copyText((p&&p.p)||(m&&m.ex)||'');
    toast('📋','Промпт скопирован!');
  });

  // Complete mission
  var doneBtn=document.getElementById('doneBtn');
  if(doneBtn) doneBtn.addEventListener('click',function(){ doComplete(S.trackId,S.mIdx); render(); });

  // Next mission
  var nxtM=document.getElementById('nxtM');
  if(nxtM) nxtM.addEventListener('click',function(){ S.mIdx++; S.tab='theory'; S.promptTab=0; render(); });

  // Library tabs
  document.querySelectorAll('.lib-tab[data-st]').forEach(function(t){
    t.addEventListener('click', function(){ S.skillTab=t.dataset.st; render(); });
  });
  document.querySelectorAll('.lib-tab[data-pt]').forEach(function(t){
    t.addEventListener('click', function(){ S.pluginTab=t.dataset.pt; render(); });
  });

  // Copy skill/plugin install commands
  document.querySelectorAll('.sc-cmd[data-cmd], .btn-copy[data-cmd]').forEach(function(el){
    el.addEventListener('click', async function(){
      await copyText(el.dataset.cmd);
      toast('📋','Скопировано!');
    });
  });

  // Quick prompts (setup/memory tracks) — FIXED: was missing closing paren for forEach
  document.querySelectorAll('.btn-copy[data-qp]').forEach(function(b){
    b.addEventListener('click', async function(){
      var tr=gT();
      var idx=parseInt(b.dataset.qp);
      if(tr && tr.setupPrompts && tr.setupPrompts[idx]){
        await copyText(tr.setupPrompts[idx].prompt);
        toast('📋','Промпт скопирован!');
      }
    });
  });

  // Profile — save name
  var saveNameBtn=document.getElementById('saveNameBtn');
  if(saveNameBtn) saveNameBtn.addEventListener('click', function(){
    var inp=document.getElementById('nameIn');
    var v=inp && inp.value && inp.value.trim();
    if(v){ S.name=v; save(); toast('\u2705','Имя "'+v+'" сохранено','#3DA876'); render(); }
  });

  // Share buttons
  ['shareBtn','shareMapBtn'].forEach(function(id){
    var el=document.getElementById(id);
    if(el) el.addEventListener('click', async function(){
      await copyText(shareURL());
      toast('\uD83D\uDD17','Ссылка скопирована! Открывается на любом устройстве.','#6667AB');
    });
  });
  var csd=document.getElementById('copyShareDeploy');
  if(csd) csd.addEventListener('click', async function(){
    await copyText(shareURL());
    toast('\uD83D\uDD17','Ссылка скопирована!','#6667AB');
  });

  // Reset progress
  bindAll_post();
  var resetBtn=document.getElementById('resetBtn');
  if(resetBtn) resetBtn.addEventListener('click', function(){
    if(confirm('Сбросить весь прогресс? Это нельзя отменить.')){
      S.done={}; S.xp=0; S.badges=[];
      save();
      toast('\uD83D\uDDD1','Прогресс сброшен','#BB2649');
      render();
    }
  });
}

function bindAll_post(){
  if(S.view==='glossary'){
    setTimeout(function(){
      filterGlossary();
    },50);
  }
  if(S.view==='mission'&&S.tab==='theory'){
    setTimeout(function(){
      var t=document.querySelector('.theory');
      if(t)wrapGlossaryTerms(t);
    },80);
  }
}
function bindShared(){
  var startOwn=document.getElementById('startOwn');
  if(startOwn) startOwn.addEventListener('click', function(){
    S.viewingShared=false; S.sharedData=null;
    history.replaceState(null,'',location.pathname);
    render();
  });
}
/* ===== NOTIFICATIONS ===== */
function spawnConfetti(){
  var colors=['#6667AB','#FF9C6B','#3DA876','#BB2649','#C8960C','#3B82C4'];
  for(var i=0;i<60;i++){
    var el=document.createElement('div');
    el.className='confetti-piece';
    el.style.left=Math.random()*100+'vw';
    el.style.background=colors[Math.floor(Math.random()*colors.length)];
    el.style.borderRadius=Math.random()>0.5?'50%':'2px';
    el.style.width=(8+Math.random()*8)+'px';
    el.style.height=(8+Math.random()*8)+'px';
    el.style.animationDelay=(Math.random()*0.8)+'s';
    el.style.animationDuration=(1.5+Math.random()*1)+'s';
    document.body.appendChild(el);
    setTimeout(function(e){e.remove();},3000,el);
  }
}

function showLevelUp(lvlData){
  spawnConfetti();
  var overlay=document.createElement('div');
  overlay.className='notif-overlay';
  var box=document.createElement('div');
  box.className='notif-box';
  var inner=document.createElement('div');
  inner.innerHTML='<span class="notif-icon">'+String.fromCodePoint(0x1F393)+'</span>'+
    '<div class="notif-title" style="background:linear-gradient(135deg,var(--peri),var(--mocha));-webkit-background-clip:text;-webkit-text-fill-color:transparent">'+'Новый уровень!'+'</div>'+
    '<div style="display:inline-flex;align-items:center;gap:8px;background:var(--peri-l);border-radius:99px;padding:8px 20px;margin:8px 0 12px">'+
      '<div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--peri),var(--mocha));color:#fff;font-family:var(--fh);font-weight:900;font-size:16px;display:flex;align-items:center;justify-content:center">'+lvlData.idx+'</div>'+
      '<span style="font-family:var(--fh);font-weight:800;font-size:16px;color:var(--peri)">'+lvlData.n+'</span>'+
    '</div>'+
    '<div class="notif-sub">'+S.xp.toLocaleString()+' XP '+'накоплено!'+'</div>';
  box.appendChild(inner);
  var btn=document.createElement('button');
  btn.className='notif-btn';
  btn.textContent=String.fromCodePoint(0x1F680)+' '+'Продолжить';
  btn.onclick=function(){overlay.remove();};
  box.appendChild(btn);
  overlay.appendChild(box);
  document.body.appendChild(overlay);
  overlay.addEventListener('click',function(e){if(e.target===overlay)overlay.remove();});
}

function showBadge(badge){
  var overlay=document.createElement('div');
  overlay.className='notif-overlay';
  var box=document.createElement('div');
  box.className='notif-box';
  var inner=document.createElement('div');
  inner.innerHTML='<span class="notif-icon">'+badge.i+'</span>'+
    '<div class="notif-title" style="color:var(--gold)">'+'Достижение получено!'+'</div>'+
    '<div style="font-family:var(--fh);font-weight:900;font-size:18px;margin-bottom:6px">'+badge.n+'</div>'+
    '<div class="notif-sub">'+badge.d+'</div>';
  box.appendChild(inner);
  var btn=document.createElement('button');
  btn.className='notif-btn';
  btn.style.background='var(--gold)';
  btn.textContent=String.fromCodePoint(0x1F3C6)+' '+'Отлично!';
  btn.onclick=function(){overlay.remove();};
  box.appendChild(btn);
  overlay.appendChild(box);
  document.body.appendChild(overlay);
  overlay.addEventListener('click',function(e){if(e.target===overlay)overlay.remove();});
}

/* ===== INIT ===== */
function init(){
  load();
  try{
    var hash=location.hash;
    if(hash && hash.indexOf('#p=')===0){
      // Decode base64 with proper UTF-8 handling (escape is deprecated)
      var b64=hash.slice(3);
      var bin=atob(b64);
      var bytes=new Uint8Array(bin.length);
      for(var i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
      var raw=new TextDecoder().decode(bytes);
      var d=JSON.parse(raw);
      // If URL has someone else's data (different from current saved state)
      var hasMeaningfulData=(d.xp>0)||Object.keys(d.done||{}).length>0;
      var isOwnData=(d.xp===S.xp && JSON.stringify(d.done)===JSON.stringify(S.done));
      if(hasMeaningfulData && !isOwnData && d.name && d.name!==S.name){
        // Viewing someone else's shared profile
        S.viewingShared=true; S.sharedData=d;
      } else {
        // Load own progress from URL (e.g. opening on new device)
        ['xp','done','badges','name'].forEach(function(k){ if(d[k]!==undefined) S[k]=d[k]; });
        save();
        toast('🔗','Прогресс загружен из ссылки','#6667AB');
      }
    }
  } catch(e){ /* ignore malformed hash */ }
  render();
}

init();
</script>
