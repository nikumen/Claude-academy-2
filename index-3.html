  {t:'MCP Memory: Knowledge Graph',xp:250,
   theory:`<h3>Что такое Knowledge Graph и чем он лучше обычных заметок</h3>
<p>Обычные заметки хранят информацию как текст в файлах: открываешь файл, читаешь. Knowledge Graph хранит информацию иначе: как сеть объектов (сущностей) и связей между ними. Это ближе к тому как работает человеческая память — не папки с документами, а ассоциативные связи.</p>
<p>Например: сущность "Клиент-Иванов" связана с "Компания-Альфа", которая связана с "Проект-Сайт", который связан с "Решение-2026-03" и "Контакт-Петров". Когда спрашиваешь "что было с Ивановым?" — Claude проходит по связям и собирает полную картину из разных источников.</p>
<h3>Три главных понятия</h3>
<p><strong>Entity (Сущность):</strong> любой объект о котором хранишь информацию. Это может быть: бизнес, клиент, проект, концепция, человек, продукт. У каждой сущности есть тип (organization, person, project) и набор фактов (observations).</p>
<p><strong>Observation (Факт):</strong> конкретный факт о сущности с контекстом. Не "Иванов хороший клиент" — а "Иванов оплатил проект 15 марта 2026, доволен результатом, готов к следующему проекту в Q3". Конкретно, с датой.</p>
<p><strong>Relation (Связь):</strong> как сущности связаны между собой. "Иванов работает в Альфа", "Альфа использует Продукт-Х", "Продукт-Х конкурирует с Продукт-Y". Связи делают граф умным — по ним Claude находит неочевидные соединения.</p>
<h3>Почему это хранится локально и почему это важно</h3>
<p>MCP Memory Server хранит данные в SQLite файле на твоём компьютере (~/.claude-memory). Это означает: никто другой не имеет доступа к твоим данным. Никакого облака, никакой передачи третьим лицам. Полная приватность для корпоративных данных.</p>
<div class="info-box"><strong>ℹ️ Naming convention важен:</strong> Используй предсказуемые имена сущностей: Business-НазваниеКомпании, Client-ФамилияКлиент, Project-НазваниеQ2-2026. Тогда Claude всегда найдёт нужную сущность даже если ты не помнишь точное название.</div>`,
   prompts:[{l:'Конфиг',p:`// claude_desktop_config.json\n{\n  "mcpServers": {\n    "memory": {\n      "command": "npx",\n      "args": ["-y", "@modelcontextprotocol/server-memory", "--memory-path", "/Users/ИМЯ/.claude-memory"]\n    }\n  }\n}\n// Windows: "C:\\\\Users\\\\ИМЯ\\\\.claude-memory"`}],
   steps:[{s:'Скопируй конфиг Memory MCP',copy:true},{s:'Добавь в claude_desktop_config.json'},{s:'Перезапусти Claude Desktop'},{s:'Запусти "Инициализация Memory Graph" из Quick Prompts'}],
   tips:['Backup ~/.claude-memory регулярно','Один сервер для Desktop и Code','Еженедельное обновление: 5 мин = 5 ч сэкономлено']},
  {t:'Agent Memory в Managed Agents (бета)',xp:250,
   theory:`<h3>Что такое "агент" и чем он отличается от обычного чата с Claude</h3>
<p>Обычный чат — это диалог. Ты спрашиваешь — Claude отвечает. Каждое сообщение — отдельный обмен. Агент — это принципиально другое: ты ставишь цель, агент сам планирует шаги, выполняет их по очереди, использует инструменты (файлы, браузер, API), принимает промежуточные решения и приходит к результату. Ты не участвуешь в каждом шаге — только задаёшь задачу и получаешь итог.</p>
<p>Agent Memory решает ключевую проблему агентов: без памяти каждый запуск начинается с нуля. Агент не помнит что делал вчера, что узнал на прошлой неделе. С Agent Memory (публичная бета с апреля 2026) — агент накапливает знания между сессиями.</p>
<h3>Практические применения Agent Memory</h3>
<ul><li><strong>Research agent:</strong> каждую неделю изучает рынок и накапливает знания. Со временем его анализ становится глубже — он уже знает историю, паттерны, ключевых игроков.</li><li><strong>Customer support agent:</strong> помнит историю каждого клиента. "Иванов писал 3 раза — вот его прошлые вопросы и ответы." Персонализированная поддержка без CRM.</li><li><strong>Sales agent:</strong> ведёт историю контактов, помнит о чём говорили, что обещали, когда договорились следующий раз связаться.</li></ul>
<h3>Advisor Tool — архитектура "думай дорого, делай дёшево"</h3>
<p>Advisor Tool (бета с марта 2026) — паттерн где Opus 4.7 (дорогой но умный) выступает советником для Sonnet 4.6 (быстрый и дешёвый). Opus планирует и проверяет — Sonnet выполняет. Аналогия: senior-архитектор ставит задачи и ревьюит — junior-разработчик пишет код. Ты платишь за senior только за 10-15% времени.</p>
<div class="warn-box"><strong>⚠️ Важно:</strong> Agent Memory и Managed Agents — публичная бета. API может меняться. Не строй на этом критические production-системы без отслеживания release notes на platform.claude.com/docs.</div>`,

   steps:[{s:'Изучи docs: platform.claude.com/docs/en/release-notes'},{s:'Скопируй промпт Agent с Memory',copy:true},{s:'Тест с beta-заголовком'},{s:'MCP Memory vs Agent Memory — для каких задач что'}],

  {t:'Chroma RAG: векторная память',xp:300,
   theory:`<h3>Что такое RAG — объяснение без технического жаргона</h3>
<p>Представь что у тебя 500 страниц документов: процессы компании, регламенты, историческая переписка с клиентами, технические инструкции. Хочешь спросить "какой протокол действий при возврате товара?" — но не помнишь в каком документе это написано.</p>
<p>RAG (Retrieval-Augmented Generation) решает это: система сначала ищет релевантные фрагменты из всех документов, потом передаёт их Claude вместе с вопросом, и Claude формулирует ответ основанный именно на твоих документах. Это как умный поиск + умный ответ одновременно.</p>
<h3>Как работает поиск внутри RAG</h3>
<p>Обычный поиск ищет точные слова. Если написано "возврат" а ты спрашиваешь "как вернуть товар" — может не найти. RAG использует векторный (семантический) поиск: документы превращаются в числовые векторы которые отражают смысл, а не слова. Похожие по смыслу тексты имеют похожие векторы. Поиск находит смысл, а не буквальное совпадение.</p>
<h3>Claude Projects vs RAG — когда что использовать</h3>
<p><strong>Claude Projects (без кода):</strong> загружаешь файлы в Projects — Claude отвечает на их основе. Ограничение: ~150-200 страниц. Для большинства задач этого достаточно. Начни с этого.</p>
<p><strong>RAG с ChromaDB:</strong> когда документов больше чем помещается в Projects, или нужен API-доступ, или система для команды/продукта. Требует Python, но Claude пишет весь код по описанию.</p>
<h3>Стек для RAG в 2026</h3>
<ul><li><strong>LlamaIndex</strong> — высокоуровневый фреймворк. Берёт на себя сложности: разбивку на части, создание векторов, поиск.</li><li><strong>ChromaDB</strong> — локальная векторная база данных. Хранит векторы на твоём компьютере или сервере. Бесплатная.</li><li><strong>Claude Sonnet 4.6</strong> — генерирует финальный ответ с цитированием источников.</li></ul>
<div class="tip-box"><strong>💡 Практический совет:</strong> Начни с Claude Projects — это встроенный RAG без единой строки кода. Когда упрёшься в лимит документов или нужно масштабировать — тогда переходи к LlamaIndex + Chroma.</div>`,
   prompts:[{l:'RAG система',p:`RAG-система.\n\nДОКУМЕНТЫ: [PDF/MD/TXT]\nМОДЕЛЬ: claude-sonnet-4-6-20250514\nСТЕК: LlamaIndex + ChromaDB\n\n1. ingest.py — загрузка, индексация\n2. query.py — поиск + ответ с источником\n3. app.py — Streamlit UI\n4. requirements.txt\n\nПерсистентность, error handling.`}],
   steps:[{s:'Сначала попробуй Claude Projects'},{s:'Скопируй RAG промпт',copy:true},{s:'Подготовь 5-10 документов'},{s:'Деплой на Streamlit Cloud'}],
   tips:['Claude Projects = RAG без кода для большинства','Chunk 500-1500 токенов — экспериментируй','Production: Pinecone вместо Chroma']}
]},
ops:{id:'ops',title:'Операции',icon:'⚙️',color:'#D97706',desc:'SOP, OKR, Cowork автоматизация',diff:'hard',missions:[
  {t:'Карта процессов и оптимизация',xp:200,
   theory:`<h3>Почему нельзя автоматизировать хаос</h3>
<p>Самая дорогостоящая ошибка в операционной автоматизации: пытаться автоматизировать процесс который никто толком не описал. Получается "автоматизированный хаос" — быстрее делаешь то что не нужно делать вообще.</p>
<p>Правильная последовательность неизменна: <strong>описать как есть → найти потери → улучшить логику → тогда автоматизировать</strong>. Пропуск любого шага приводит к тому что автоматизация закрепляет неэффективность вместо того чтобы её устранить.</p>
<h3>Семь видов потерь которые ищем в процессах</h3>
<p>Производственная концепция Lean (Toyota) описала 7 видов потерь. Все они применимы к бизнес-процессам:</p>
<ul><li><strong>Ожидание</strong> — один человек или шаг ждёт другого. "Жду пока дизайнер сделает макет чтобы начать верстать"</li><li><strong>Лишнее движение</strong> — переключение между инструментами. Скопировал из CRM в Excel в Slack в email</li><li><strong>Переработка</strong> — делаешь одно и то же дважды. Встреча → заметки → пересылка заметок → ещё раз пересказываешь на следующей встрече</li><li><strong>Избыточная обработка</strong> — делаешь больше чем нужно клиенту. Детальный отчёт который никто не читает</li><li><strong>Дефекты</strong> — ошибки которые нужно переделывать. Неправильно поставленная задача = потеря времени всей команды</li></ul>
<h3>Три вопроса для каждого шага процесса</h3>
<ol><li>Можно убрать этот шаг без потери качества результата?</li><li>Можно автоматизировать этот шаг через Claude, Make, n8n или Cowork?</li><li>Обязательно ли это делает именно человек или это можно делегировать AI?</li></ol>
<div class="tip-box"><strong>💡 Как использовать с Claude:</strong> Опиши процесс своими словами — даже неструктурированно, даже с пропусками. Claude задаст уточняющие вопросы, построит карту процесса, найдёт узкие места и предложит конкретный план автоматизации. Начни с процесса который делаешь чаще всего — там максимальный ROI.</div>`,
   prompts:[{l:'Анализ процесса',p:`Оптимизируй процесс.\n\nПРОЦЕСС: [название]\nЧАСТОТА: [как часто]\nВРЕМЯ: [мин]\n\nШАГИ: [перечисли]\nПРОБЛЕМЫ: [что не работает]\n\n1. Узкие места\n2. Что убрать\n3. Что автоматизировать (Claude/Make/Cowork)\n4. Что у человека`},{l:'ROI',p:`ROI автоматизации.\n\nПРОЦЕСС: [описание]\nЧАСТОТА: [X/неделю]\nВРЕМЯ: [X мин]\nСТОИМОСТЬ ЧАСА: [₽]\n\nАВТОМАТИЗАЦИЯ: разработка [₽] + поддержка [₽/мес]\n\nСрок окупаемости, годовой ROI`}],
   steps:[{s:'Выбери самый частый процесс'},{s:'Скопируй анализ',copy:true},{s:'Начни с одной простой автоматизации'},{s:'ROI перед разработкой'}],
   tips:['80/20: 20% процессов = 80% потерь','Документируй ДО автоматизации','Cowork (Pro+) закрывает многие задачи']},
  {t:'SOP: документация за минуты',xp:200,
   theory:`<h3>Что такое SOP и зачем он нужен даже в маленьком бизнесе</h3>
<p>SOP (Standard Operating Procedure) — стандартная операционная процедура. Простыми словами: инструкция как правильно выполнить конкретный процесс, написанная так чтобы любой новый человек мог выполнить его качественно без дополнительных объяснений.</p>
<p>Без SOP знания о процессах существуют только в голове конкретных людей. Ключевой сотрудник уходит — знания уходят с ним. SOP переносит знания из голов в документы. Компания начинает работать как система, а не как набор незаменимых людей.</p>
<h3>Почему SOP не пишут — и как Claude это решает</h3>
<p>Главная причина почему SOP не существует в большинстве компаний: их долго и скучно писать. Типичный SOP занимает 2-4 часа написания. Умножи на 10-20 процессов — и понятно почему откладывают.</p>
<p>С Claude это занимает 20-30 минут. Ты описываешь процесс своими словами (голосом через транскрипт, или просто текстом), Claude структурирует это в профессиональный SOP. Тебе остаётся проверить и дополнить реальными деталями.</p>
<h3>Анатомия работающего SOP</h3>
<ul><li><strong>Цель (1 предложение):</strong> зачем этот процесс существует. "Обеспечить единое качество онбординга каждого нового клиента"</li><li><strong>Триггер:</strong> что запускает процесс. "Когда клиент подписал договор"</li><li><strong>Ответственный:</strong> кто выполняет и кто отвечает за качество</li><li><strong>Шаги (нумерованные):</strong> конкретные действия с деталями. Не "свяжись с клиентом" — а "позвони клиенту в течение 2 часов, скрипт: ..."</li><li><strong>Чек-лист самопроверки:</strong> как исполнитель знает что сделал правильно</li><li><strong>Частые ошибки:</strong> что обычно идёт не так и как избежать</li></ul>
<h3>Живые SOP vs мёртвые документы</h3>
<p>SOP который написали и забыли — мёртвый документ. Живой SOP обновляется после каждого значимого изменения. Нумеруй версии: v1.0, v1.1, v2.0. Это показывает эволюцию процесса и помогает понять почему сделали именно так.</p>
<div class="info-box"><strong>ℹ️ Лайфхак:</strong> Запиши экран через Loom пока выполняешь процесс (с голосовым комментарием). Вставь транскрипт в Claude с запросом "создай SOP из этого описания". Получаешь профессиональную документацию за 20 минут.</div>`,
   prompts:[{l:'Создать SOP',p:`SOP для "[процесс]".\n\nКТО: [роль]\nЧАСТОТА: [как]\n\nОПИСАНИЕ: [опиши своими словами]\n\nСоздай:\n## Цель\n## Триггер\n## Ответственный\n## Шаги (детально)\n## Чек-лист\n## Ошибки → решения\n## Метрики\n## Версия 1.0 | Дата`},{l:'Обновить SOP',p:`Обнови SOP v1.0 после 2 недель.\n\nСТАРЫЙ: [вставь]\nЧТО НЕ РАБОТАЛО: [описание]\nЧТО ДОБАВИЛОСЬ: [новые шаги]\n\nСоздай v1.1.`}],
   steps:[{s:'Выбери повторяющийся процесс'},{s:'Скопируй шаблон SOP',copy:true},{s:'Опиши как угодно — Claude структурирует'},{s:'В Notion → обновляй через 2 недели'}],
   tips:['Loom + транскрипт = SOP за 20 мин','Нумеруй версии','Новый сотрудник должен выполнить с первого дня']},
  {t:'OKR-планирование с Claude',xp:200,
   theory:`<h3>Что такое OKR и чем он отличается от обычного планирования</h3>
<p>OKR (Objectives and Key Results) — система постановки целей придуманная в Intel, сделавшая Google успешным. Суть в разделении целей на два уровня: Objective (куда идём?) и Key Results (как измеряем что пришли?).</p>
<p>Главное отличие от обычного планирования: OKR разделяет вдохновение (Objective) и измерение (Key Results). Большинство компаний либо ставят вдохновляющие цели без измерения ("стать лидером рынка") либо измеримые задачи без амбиции ("сделать 5 проектов"). OKR объединяет оба уровня.</p>
<h3>Анатомия хорошего OKR</h3>
<p><strong>Objective:</strong> амбициозная качественная цель которая вдохновляет. Должна быть: понятной без объяснений, мотивирующей, достигаемой за квартал. Пример: "Превратить онбординг клиентов в наше конкурентное преимущество"</p>
<p><strong>Key Results:</strong> 3-5 измеримых результатов которые доказывают достижение Objective. Критерии хорошего KR:</p>
<ul><li>Конкретная цифра (не "улучшить" — а "увеличить с X до Y")</li><li>В твоём контроле (не зависит от удачи или внешних факторов)</li><li>70% вероятность достижения — если 100% уверен что выполнишь, цель недостаточно амбициозна</li><li>Связан с Objective — выполнение этого KR доказывает прогресс к цели</li></ul>
<h3>Типичные ошибки которые делают OKR неработающим</h3>
<ul><li><strong>KR = задача:</strong> "Провести 10 встреч с клиентами" — это задача, не результат. Результат: "NPS клиентов вырастет с 42 до 65"</li><li><strong>Слишком много Objectives:</strong> больше 3 за квартал = нет фокуса. Если всё важно — ничего не важно</li><li><strong>100% достижимые KR:</strong> если ты уверен что выполнишь все — это не OKR, это план задач</li><li><strong>Каскадирование без смысла:</strong> не нужно делать OKR для каждого процесса. OKR для приоритетов, не для операций</li></ul>
<div class="tip-box"><strong>💡 Как Claude помогает:</strong> Claude выступает как фасилитатор сессии: задаёт уточняющие вопросы, итерирует формулировки, проверяет каждый KR по критериям. Типичная OKR-сессия с Claude занимает 45-60 минут вместо нескольких часов самостоятельно или с коучем.</div>`,
   prompts:[{l:'OKR сессия',p:`OKR на [квартал].\n\nКОНТЕКСТ:\n- Бизнес: [описание]\n- Прошлый период: [результаты]\n- Вызовы: [описание]\n\nПомоги: 2-3 Objectives + 3-4 KR каждый.\nПроверь каждый KR.`},{l:'Ретроспектива',p:`OKR ретроспектива [квартал].\n\nOKR: [список]\nРЕЗУЛЬТАТЫ: [достигнуто %]\n\n1. Что достигли и почему\n2. Не достигли — причины\n3. Паттерны\n4. Что изменить`}],
   steps:[{s:'Скопируй OKR сессию',copy:true},{s:'Итерируй пока не "почувствуешь"'},{s:'Сохрани в Obsidian'},{s:'Еженедельная проверка 15 мин'}],
   tips:['Objective вдохновляет, KR измеряет','70% достижимость = правильная амбиция','OKR раз в квартал']},
  {t:'Cowork + Dispatch: автономные операции',xp:220,
   theory:`<h3>Разница между Claude-ассистентом и Claude-оператором</h3>
<p>Большинство людей используют Claude как ассистента: задаёшь вопрос — получаешь ответ — применяешь сам. Cowork переключает режим: Claude становится оператором который выполняет задачи самостоятельно, используя реальные инструменты на твоём компьютере.</p>
<p>Конкретный пример: "Напиши мне структуру еженедельного отчёта" — это ассистент. "Проверь мой Google Calendar на эту неделю, посмотри ключевые метрики в таблице, и создай готовый отчёт в нужном формате" — это оператор. Разница огромная.</p>
<h3>Scheduled Tasks — автоматизация без программирования</h3>
<p>Scheduled Tasks (появились в апреле 2026) позволяют создать повторяющуюся задачу которую Cowork выполняет автономно по расписанию. Ты настраиваешь один раз — задача работает без твоего участия.</p>
<p>Примеры которые реально работают:</p>
<ul><li>Каждый понедельник в 9:00 — собрать дайджест из Google Calendar, Gmail и ключевых метрик, прислать структурированный отчёт</li><li>Каждую пятницу в 17:00 — подготовить материал для Weekly Review: события недели, ключевые решения, незакрытые задачи</li><li>Каждый день — проверить входящие и расставить приоритеты по срочности</li></ul>
<h3>Dispatch — удалённое управление через телефон</h3>
<p>Dispatch решает конкретную проблему: ты в дороге, без ноутбука, но нужно поручить задачу. Раньше: ждать пока доберёшься до компьютера. Теперь: открыл телефон → написал задачу в Dispatch → Cowork выполнил на десктопе → когда вернулся, всё готово.</p>
<p>Настройка Dispatch занимает 60 секунд: Settings → Dispatch → сканируй QR-код со смартфона. После этого телефон и десктоп синхронизированы.</p>
<h3>Важные принципы безопасной работы с Cowork</h3>
<ul><li>Всегда используй шаг "покажи план до выполнения" — необратимые действия должны требовать подтверждения</li><li>Начинай с read-only задач (анализ, отчёты) прежде чем давать права на изменение файлов или отправку писем</li><li>Логируй что делает Cowork — это помогает отловить ошибки на раннем этапе</li></ul>
<div class="tip-box"><strong>💡 ROI Scheduled Tasks:</strong> Типичный ежедневный брифинг занимает 20 минут ручной работы. При 5 рабочих днях = 100 минут/неделю = 87 часов в год. Автоматизация через Cowork: настройка 1 час → экономия 87 часов/год. ROI очевиден.</div>`,
   prompts:[{l:'Отчёт',p:`Задача Cowork: еженедельный отчёт.\n\nДАННЫЕ:\n1. Google Sheets: [метрики]\n2. Gmail: [важное за неделю]\n\nШАБЛОН: KPI + события + проблемы + приоритеты\n\nСохрани как [Название]-Weekly-[ДАТА].docx`},{l:'Онбординг',p:`Задача Cowork: онбординг клиента.\n\nКЛИЕНТ: имя [имя], email [email], тариф [тариф]\n\n1. Создай папку Клиенты/[Имя]\n2. Скопируй шаблон онбординга\n3. Заполни данными\n4. Черновик приветствия (жди одобрения)\n5. Напоминание через 7 дней`}],
   steps:[{s:'Скопируй задачу для Cowork',copy:true},{s:'Открой Cowork в Desktop'},{s:'Смотри как планирует выполнение'},{s:'Pro+: добавь в Scheduled Tasks'}],
   tips:['Всегда одобряй план перед выполнением','Начни с небольших безопасных задач','Dispatch: "собери данные пока на встрече"']}
]},
trading:{id:'trading',title:'Аналитика рынка',icon:'📊',color:'#F59E0B',desc:'⚠️ Аналитика, не советы',diff:'exp',missions:[
  {t:'Структурированный анализ активов',xp:250,
   theory:`<h3>⚠️ Обязательный дисклеймер — прочитай прежде чем продолжить</h3>
<p style="background:#FDF0F3;color:#BB2649;padding:12px;border-radius:8px;margin-bottom:14px">Этот трек — об аналитических инструментах поддержки решений. Claude не предсказывает цены и не гарантирует доходность. Торговля финансовыми инструментами несёт реальный риск потери капитала. Никогда не торгуй деньгами которые не можешь потерять. Это не финансовый совет.</p>
<h3>Почему интуиция — враг трейдера</h3>
<p>Исследования в области поведенческой экономики (Канеман, Талеб) неоднократно доказывали: человеческий мозг плохо приспособлен для принятия финансовых решений. Мы переоцениваем недавние события, видим паттерны там где их нет, боимся убытков сильнее чем радуемся прибыли.</p>
<p>Структурированный анализ — это противоядие: вместо "мне кажется что это вырастет" ты следуешь заранее определённой аналитической процедуре. Claude помогает создать эту структуру и применять её последовательно.</p>

<p>Конкретно что умеет:</p>

  {t:'Чек-лист торговых решений',xp:250,
   theory:`<h3>Почему чек-листы используют хирурги, пилоты и лучшие трейдеры</h3>
<p>Атул Гаванде в книге "Чек-лист" описал революцию в медицине: введение простых чек-листов перед операциями снизило смертность в хирургии на 47%. Не новые технологии — простые списки. Потому что в стрессе даже эксперты пропускают очевидное.</p>
<p>Торговля — это стресс, эмоции, давление времени. Именно в такие моменты нарушается дисциплина. Чек-лист убирает необходимость помнить все критерии в момент принятия решения — ты просто идёшь по списку.</p>
<h3>Структура торгового чек-листа</h3>
<p><strong>Чек-лист входа в позицию</strong> отвечает на вопрос: достаточно ли условий выполнено чтобы войти? Минимум 5-7 критериев. Если хоть один не выполнен — не входишь. Примеры критериев:</p>
<ul><li>Технический: тренд подтверждён на нескольких таймфреймах</li><li>Уровень: цена у значимого уровня поддержки/сопротивления</li>
<li>Объём: объём выше среднего (подтверждение движения)</li>

<li>Макро: нет крупных событий (FOMC, отчётность) в ближайшие часы</li>
<li>Стоп: стоп-лосс определён заранее, не в момент входа</li></ul>
<p><strong>Чек-лист отмены сигнала</strong> — когда НЕ входить даже если кажется что всё хорошо. Например: если за последние 3 дня уже было 2 убытка — пропускаю следующий сигнал.</p>
<h3>Risk Management > Качество сигнала</h3>
<p>Данные реальных трейдеров показывают: правильный риск-менеджмент (ограничение убытка на сделку, максимальная просадка за день/неделю) влияет на итоговый результат в 3-5 раз сильнее чем качество точки входа. Можно иметь 40% выигрышных сделок и зарабатывать — если правильно управляешь размером позиции.</p>
<div class="warn-box"><strong>⚠️ Правило которое спасает капитал:</strong> Определи максимальный убыток в день (например 2% от депозита). Достиг его — закрыл компьютер. Никаких "отыграюсь". Это не слабость — это профессионализм.</div>`,

  {t:'Торговый журнал с AI-аналитикой',xp:250,
   theory:`<h3>Почему 95% трейдеров не учатся на своих ошибках</h3>
<p>Большинство трейдеров делают одни и те же ошибки снова и снова. Не потому что глупы — а потому что не анализируют свою торговлю системно. Каждая сделка — это данные. Без журнала эти данные теряются.</p>
<p>Торговый журнал — это инструмент обратной связи. Смотришь на 50 сделок и видишь паттерны которые невозможно заметить в одной: "я всегда теряю деньги по пятницам", "моя лучшая стратегия работает только в трендовом рынке", "я выхожу из выигрышных позиций слишком рано".</p>
<h3>Что записывать в журнал</h3>
<p>Два уровня данных — технические и психологические:</p>
<p><strong>Технические данные:</strong> дата и время входа/выхода, актив, направление (лонг/шорт), объём, цена входа и выхода, причина входа (какой сигнал или критерий чек-листа), P&L в деньгах и процентах, был ли это плановый выход или эмоциональный.</p>
<p><strong>Психологические данные:</strong> состояние перед сделкой (1-10), уверенность в сигнале, что чувствовал во время удержания позиции, почему вышел именно в этот момент. Эта часть кажется лишней — но именно она показывает поведенческие паттерны.</p>
<h3>Как Claude анализирует журнал</h3>
<p>Ты накапливаешь данные за 30 дней и передаёшь Claude. Он находит то что ты сам не замечаешь:</p>

<div class="tip-box"><strong>💡 Минимальный журнал который реально ведут:</strong> Дата, актив, лонг/шорт, P&L%, причина входа (одним словом), выход плановый/эмоциональный. Это 2 минуты после каждой сделки. Через месяц — готов для анализа. Идеальный журнал который не ведут — бесполезен.</div>`,
   prompts:[{l:'Анализ журнала',p:`Анализ журнала.\n\nСДЕЛКИ: [таблица: дата, актив, лонг/шорт, вход, выход, P&L%, сигнал, заметки]\n\n1. WIN RATE и R:R\n2. Лучшие паттерны\n3. Паттерны убытков\n4. Психологические ошибки\n5. ТОП-3 изменения процесса`}],

  {t:'Мониторинг рынка: автоматизация',xp:200,
   theory:`<h3>Что такое скринер и зачем он нужен трейдеру</h3>
<p>Скринер рынка — инструмент который автоматически проверяет список активов по заданным критериям и сигнализирует когда условия выполнены. Вместо того чтобы вручную открывать 50 графиков в поисках подходящей ситуации — получаешь алерт только по тем активам где что-то происходит.</p>
<p>До AI скринеры были чисто техническими: RSI пересёк 70, цена пробила уровень. Claude добавляет новое измерение: он может оценить контекст, новостной фон, качество паттерна — то что числа сами по себе не показывают.</p>
<h3>Архитектура системы мониторинга</h3>
<p>Python-скрипт по расписанию (каждые 30-60 минут) собирает рыночные данные через yfinance или другой источник. Рассчитывает технические индикаторы. Если актив соответствует предварительным критериям — передаёт данные Claude для качественной оценки. Если Claude подтверждает интересную ситуацию — отправляет алерт в Telegram.</p>
<p>Ты при этом занят другим — и получаешь уведомление только тогда когда есть что-то реально требующее внимания.</p>
<h3>Важнейший принцип: алерт ≠ торговый сигнал</h3>
<p>Алерт говорит: "здесь есть что-то интересное, посмотри". Он не говорит "покупай прямо сейчас". После получения алерта ты сам анализируешь ситуацию, применяешь чек-лист входа, принимаешь решение. AI автоматизирует мониторинг — решения остаются за человеком.</p>
<h3>Источники данных и их ограничения</h3>
<ul><li><strong>yfinance</strong> — бесплатно, задержка ~15 минут. Подходит для swing-трейдинга и позиционной торговли, не для интрадея</li><li><strong>Alpha Vantage</strong> — бесплатный план: 5 запросов/мин, 500/день. Для небольших портфелей достаточно</li><li><strong>Polygon.io</strong> — платный, реальное время. Для более серьёзного подхода</li></ul>
<div class="warn-box"><strong>⚠️ Техническое предупреждение:</strong> Claude Code Routines (новинка 2026) позволяют запускать такие скрипты по расписанию прямо в терминале. Но для production-систем с реальными деньгами нужен надёжный VPS, мониторинг ошибок и тестирование на исторических данных.</div>`,

code:{id:'code',title:'Claude Code',icon:'💻',color:'#06B6D4',desc:'AI-разработка в терминале',diff:'exp',missions:[
  {t:'Установка и возможности 2026',xp:200,
   theory:`<h3>Что такое Claude Code и чем он отличается от обычного чата</h3>
<p>Claude в браузере — это диалог: ты пишешь вопрос, получаешь ответ. Claude Code — это AI-агент в твоём терминале который видит твой проект целиком, запускает команды, читает и пишет файлы, устанавливает зависимости и итерирует пока задача не решена.</p>
<p>Аналогия: обычный Claude — это умный советник которому ты описываешь задачу и получаешь совет. Claude Code — это разработчик который садится рядом за твой компьютер, открывает все файлы проекта, пишет код, тестирует его, исправляет ошибки и докладывает результат.</p>
<h3>Что изменилось в 2026</h3>
<ul><li><strong>1M токенов контекста (GA):</strong> теперь Claude Code видит весь репозиторий сразу — не нужно указывать какие файлы смотреть. Он сам находит нужное.</li><li><strong>Включён в Team план:</strong> каждое место в Team-плане включает Claude Code. Не нужна отдельная подписка.</li><li><strong>Удвоенные лимиты:</strong> для Pro/Max/Enterprise — в 2 раза больше запросов в день.</li><li><strong>Code Routines:</strong> агентные задачи по расписанию прямо из терминала. Автоматический code review каждое утро.</li><li><strong>Channels (--channels):</strong> MCP-серверы могут отправлять сообщения в активную сессию Claude Code.</li></ul>
<h3>Что такое CLAUDE.md и почему он важен</h3>
<p>CLAUDE.md — файл в корне проекта который Claude Code читает автоматически при запуске. Это "инструкция к проекту": технический стек, стандарты кода, команды запуска и тестирования, правила которым нужно следовать.</p>
<p>Без CLAUDE.md Claude Code работает вслепую — угадывает контекст. С CLAUDE.md — сразу знает всё нужное и работает точнее. Это как разница между новым сотрудником без инструктажа и с хорошим онбордингом.</p>
<h3>Установка и первый запуск</h3>
<p>Требования: Node.js 18 или выше. Проверь версию: <code>node --version</code>. Установка: <code>npm install -g @anthropic-ai/claude-code</code>. Первый запуск: перейди в папку проекта (<code>cd my-project</code>) и запусти <code>claude</code>. Claude Code сам изучит структуру проекта и будет готов к работе.</p>
<div class="tip-box"><strong>💡 Первый запрос который стоит сделать:</strong> "Объясни архитектуру этого проекта и найди потенциальные проблемы." Claude Code прочитает все файлы и даст структурированный анализ. Это мгновенно дает контекст даже для чужого кода.</div>`,

   tips:['1M контекст GA — весь репозиторий в одном запросе','Claude Code в Team плане — настрой для команды','CLAUDE.md + Skills = мощный контекст']},
  {t:'Skills и специализация 2026',xp:250,
   theory:`<h3>Что такое Skills в Claude Code и почему они важны</h3>
<p>Skills — это специализированные инструкции (SKILL.md файлы) которые Claude Code автоматически находит и применяет. Если у тебя есть Skill "frontend-design" — Claude будет создавать UI по конкретным стандартам качества этого Skill. Если есть "project-conventions" — будет следовать стандартам именно твоего проекта.</p>
<p>Аналогия: обычный Claude Code — это универсальный разработчик с общими знаниями. Skills превращают его в специалиста с конкретной экспертизой и знанием твоих правил.</p>
<h3>Как работает "progressive disclosure" — почему Skills не замедляют работу</h3>
<p>Умная архитектура Skills: сначала загружаются только метаданные (~100 токенов) — название и описание когда использовать. Полное содержание Skill загружается только когда Claude Code определяет что этот Skill нужен для текущей задачи. Это означает: можно иметь 10+ Skills без снижения скорости ответа.</p>
<h3>Новинка 2026: effort frontmatter</h3>
<p>В frontmatter (заголовке) каждого SKILL.md теперь можно указать уровень усилий: <code>effort: low/normal/high/max</code>. Это управляет насколько тщательно Claude подходит к задаче:</p>
<ul><li><strong>low:</strong> для быстрых шаблонных задач — скорость важнее перфекционизма</li><li><strong>normal:</strong> стандартный баланс</li><li><strong>high:</strong> для code review и важных архитектурных решений — Claude проверяет дважды</li><li><strong>max:</strong> для критических компонентов где ошибка дорого стоит</li></ul>
<h3>Официальные Anthropic Skills — топ 2026</h3>
<ul><li><strong>frontend-design</strong> — создаёт UI высокого качества, избегает "AI-эстетики". 277K+ установок. Незаменим для всех кто делает интерфейсы.</li><li><strong>simplify</strong> — рефакторинг кода по принципам DRY и SOLID. Идеален для работы с legacy code.</li><li><strong>claude-api</strong> — встроен по умолчанию. Знает актуальную документацию Claude API для всех 8 поддерживаемых языков.</li></ul>
<div class="info-box"><strong>ℹ️ Создание своего Skill:</strong> Нет ничего сложного — это просто Markdown файл с frontmatter. Опиши когда использовать, что делать и чего избегать. Claude Code читает его как инструкцию. Свои Skills для специфики проекта часто ценнее официальных.</div>`,
   prompts:[{l:'Установка',p:`# Официальные\nnpx skills add anthropics/claude-code --skill frontend-design\nnpx skills add anthropics/claude-code --skill simplify\n\n# Свой Skill\n# ~/.claude/skills/my-skill/SKILL.md:\n---\nname: my-skill\ndescription: Когда использовать. Use when [задача].\neffort: normal\n---\n\n## Стандарты проекта\n[правила]`},{l:'Создать Skill',p:`Создай Skill для Claude Code.\n\nПРОЕКТ: [описание]\nЗАДАЧИ: [список]\nСТАНДАРТЫ: [правила]\n\nСоздай SKILL.md:\n1. Frontmatter (name, description, effort)\n2. Стандарты\n3. Паттерны\n4. Запреты\n5. Примеры кода`}],
   steps:[{s:'Скопируй установку Skills',copy:true},{s:'Установи frontend-design и simplify'},{s:'Создай свой Skill'},{s:'Проверь: Claude использует Skill?'}],
   tips:['effort: high для review, low для шаблонного','Skill + примеры = лучше учится','Skill + CLAUDE.md = полный контекст']},
  {t:'Routines: агенты по расписанию',xp:300,
   theory:`<h3>Что такое Routines и почему это новый уровень автоматизации</h3>
<p>Claude Code Routines — это агентные задачи которые выполняются автоматически по расписанию, прямо из терминала, без внешних cron-серверов или сложной инфраструктуры. Ты описываешь задачу в Markdown файле и указываешь расписание — Claude Code делает остальное.</p>
<p>Ключевое отличие от обычного cron: обычный cron запускает фиксированный скрипт. Routine — это агент который рассуждает о задаче, адаптируется к контексту и принимает решения. "Проверь PR за сегодня и прокомментируй потенциальные проблемы" — это невозможно закодировать в традиционном скрипте.</p>
<h3>Примеры Routines которые реально меняют рабочий процесс</h3>
<ul><li><strong>Ежедневный Code Review (каждый день 9:00):</strong> Claude Code проверяет все PR открытые за последние 24 часа, оставляет комментарии о потенциальных ошибках, проблемах безопасности и стилевых нарушениях.</li><li><strong>Мониторинг логов (каждый час):</strong> читает логи приложения, находит аномалии, создаёт Issue в GitHub если нашёл что-то критическое.</li><li><strong>Дайджест метрик (каждую пятницу):</strong> собирает данные из разных источников, создаёт отчёт в нужном формате, отправляет в Slack.</li><li><strong>Trading agent (3 раза в день):</strong> анализирует рыночные данные, проверяет по чек-листу, отправляет алерт если есть интересная ситуация.</li></ul>
<h3>Как создать Routine</h3>
<p>Создай файл в <code>.claude/routines/имя-задачи.md</code>. В frontmatter укажи расписание в формате cron (<code>schedule: "0 9 * * 1-5"</code> = каждый будний день в 9:00), модель и разрешённые инструменты. В теле файла — описание задачи на обычном языке.</p>
<div class="warn-box"><strong>⚠️ Принцип безопасности:</strong> Начинай с read-only Routines (только чтение и анализ). Потом добавляй write-операции. Всегда описывай что делать при ошибке — хороший Routine должен уметь обрабатывать нестандартные ситуации.</div>`,
   prompts:[{l:'Routine шаблон',p:`.claude/routines/[задача].md:\n\n---\nschedule: "0 9 * * 1-5"\nmodel: claude-sonnet-4-6-20250514\nallowed-tools: [Read, Write, Bash]\n---\n\n# [Название]\n\n## Что делать\n[инструкция]\n\n## Критерии\n[что проверить]\n\n## Лог\n[формат]`},{l:'Code review',p:`Routine code review.\n\nЗАПУСК: каждый день 9:00\nЧТО: новые PR за 24ч\n\nАНАЛИЗ: качество, баги, security, coverage\n\nРЕЗУЛЬТАТ:\n- Комментарий в PR\n- Slack если критическое\n\nСоздай конфигурацию.`}],
   steps:[{s:'Скопируй шаблон Routine',copy:true},{s:'Создай .claude/routines/ файл'},{s:'Запусти вручную → потом расписание'},{s:'Один Routine = одна чёткая задача'}],
   tips:['Routines = Claude Code без тебя — начни с read-only','Журнал Routine сохраняй всегда','Routines + Managed Agents = мощная автоматизация']},
  {t:'Managed Agents и мультиагентность',xp:300,
   theory:`<h3>Почему один агент — это только начало</h3>
<p>Один агент — это один поток работы. Мультиагентная система — это команда агентов которые работают параллельно или последовательно, каждый специализируясь на своей части задачи. Аналог из реального мира: вместо одного сотрудника который делает всё — команда специалистов каждый в своей области.</p>
<p>Managed Agents (публичная бета с апреля 2026) — это официальная платформа Anthropic для запуска агентных систем. Безопасный sandbox, встроенные инструменты, SSE streaming для отслеживания прогресса.</p>
<h3>Три новые функции которые изменили возможности (май 2026)</h3>
<p><strong>Multi-agent orchestration:</strong> один оркестратор-агент получает задачу и распределяет её между несколькими субагентами. Например: "Проанализируй 100 отзывов клиентов" → 10 агентов анализируют по 10 отзывов параллельно → оркестратор собирает результаты. Задача которая занимала бы час у одного агента — выполняется за 10 минут.</p>
<p><strong>Outcomes (Результаты):</strong> ты определяешь критерий успеха, а не шаги. "Добейся чтобы все тесты проходили" — агент сам решает как этого достичь, итерирует, пробует разные подходы пока не выполнит условие. Это принципиально отличается от пошагового выполнения инструкций.</p>
<p><strong>Dreaming (Рефлексия):</strong> агент анализирует свои прошлые сессии, выявляет паттерны ошибок и улучшает свой подход. Агент который "учится" на своём опыте.</p>
<h3>Advisor Tool — "старший разработчик" для Claude</h3>
<p>Advisor Tool решает экономическую задачу: Opus 4.7 умнее Sonnet 4.6 для стратегических решений, но в 5+ раз дороже. Решение: Opus используется только для планирования и проверки ("думает"), Sonnet выполняет ("делает"). Ты получаешь качество близкое к Opus при стоимости близкой к Sonnet.</p>
<div class="info-box"><strong>ℹ️ Beta header:</strong> Managed Agents требуют заголовок <code>anthropic-beta: managed-agents-2026-04-01</code> в API запросах. API может меняться — всегда проверяй актуальную документацию на platform.claude.com.</div>`,
   prompts:[{l:'Managed Agent',p:`Managed Agent.\n\nМОДЕЛЬ: claude-sonnet-4-6-20250514\nBETA: managed-agents-2026-04-01\nЦЕЛЬ: [описание]\n\n1. Системный промпт\n2. Инструменты\n3. Outcome критерий\n4. Python код запуска\n5. Парсинг SSE stream`},{l:'Advisor Tool',p:`Advisor + Executor.\n\nADVISOR: claude-opus-4-7-20250514-7-20250514\nEXECUTOR: claude-sonnet-4-6-20250514\nBETA: advisor-tool-2026-03-01\n\nКод + отслеживание токенов advisor vs executor.`}],
   steps:[{s:'Изучи docs: platform.claude.com'},{s:'Скопируй Managed Agent',copy:true},{s:'Тест с beta-заголовком'},{s:'Advisor Tool для самых сложных задач'}],
   tips:['Managed Agents в бете — API меняется','Advisor: 400-700 токенов Opus = качество близкое к полному Opus','Multi-agent для параллелизируемых задач']}
]},
ai:{id:'ai',title:'AI Stack',icon:'🤖',color:'#EC4899',desc:'RAG, мульти-AI, агенты',diff:'exp',missions:[
  {t:'RAG: Claude с твоими документами',xp:300,
   theory:`<h3>Задача которую решает RAG — объяснение без технического жаргона</h3>
<p>Представь: у тебя 500 страниц корпоративной документации. Сотрудник спрашивает: "Какова процедура возврата товара для B2B клиентов?". Без RAG: нужно самому найти нужный документ. С RAG: пишешь вопрос — получаешь точный ответ со ссылкой на источник.</p>
<p>RAG расшифровывается как Retrieval-Augmented Generation — "генерация с дополненным извлечением". Система сначала извлекает релевантные фрагменты из документов, потом передаёт их Claude который формулирует ответ. Без RAG Claude знает только то что в его обучении. С RAG — знает содержимое твоих документов.</p>
<h3>Как работает "умный поиск" внутри RAG</h3>
<p>Обычный поиск ищет совпадение слов. Если в документе написано "процедура рекламации", а ты спрашиваешь "как вернуть товар" — обычный поиск не найдёт совпадения. RAG использует векторный поиск: документы превращаются в числовые векторы (embedding) которые кодируют смысл, а не буквы. Похожие по смыслу тексты имеют похожие векторы. Запрос тоже превращается в вектор и система находит фрагменты с похожим смыслом независимо от конкретных слов.</p>
<h3>Когда Claude Projects достаточно, а когда нужен RAG</h3>
<table><tr><th>Claude Projects</th><th>RAG (LlamaIndex + Chroma)</th></tr>
<tr><td>До ~150-200 страниц</td><td>Любой объём</td></tr>
<tr><td>Без кода, 5 минут настройки</td><td>Нужен Python код</td></tr>
<tr><td>Для команды через claude.ai</td><td>API, собственный продукт</td></tr>
<tr><td>Бесплатно/Pro план</td><td>Расходы на API и хостинг</td></tr></table>
<p><strong>Рекомендация:</strong> начни с Claude Projects. Когда уткнёшься в лимит по объёму или нужен программный доступ — переходи к RAG.</p>
<div class="tip-box"><strong>💡 Качество чанкинга критично:</strong> "Чанкинг" — это как ты делишь документы на части для векторизации. Слишком маленькие части (200 токенов) — теряется контекст. Слишком большие (2000+ токенов) — поиск становится менее точным. Оптимум: 500-800 токенов с перекрытием 100 токенов между частями.</div>`,
   prompts:[{l:'RAG система',p:`RAG-система.\n\nДОКУМЕНТЫ: [типы]\nМОДЕЛЬ: claude-sonnet-4-6-20250514\n\n1. ingest.py — загрузка, индексация\n2. query.py — поиск + ответ с источником\n3. app.py — Streamlit UI\n4. requirements.txt\n\nПерсистентность, error handling.`}],
   steps:[{s:'Сначала попробуй Claude Projects'},{s:'Скопируй RAG промпт',copy:true},{s:'Подготовь 5-10 документов'},{s:'Деплой на Streamlit Cloud'}],
   tips:['Projects = RAG без кода для большинства','Chunk 500-1500 токенов — пробуй разные','Production: Pinecone вместо Chroma']},
  {t:'Мульти-AI архитектура',xp:300,
   theory:`<h3>Почему одна модель — не всегда лучший выбор</h3>
<p>Профессиональные AI-разработчики давно поняли: разные модели хороши в разных задачах. Использовать Opus 4.7 для классификации одним словом — это как ехать на Ferrari за хлебом. Дорого и нецелесообразно. Использовать Haiku 4.5 для сложного стратегического анализа — не доедешь.</p>
<p>Мульти-AI архитектура — это система где каждая задача направляется к оптимальной модели. Результат: лучшее качество при меньших затратах.</p>
<h3>Специализация моделей Claude в 2026</h3>
<ul><li><strong>Claude Opus 4.7 ($5/$25 MTok):</strong> стратегическое планирование, сложный многошаговый анализ, агентные задачи где нужна максимальная точность, роль Advisor в Advisor Tool. Используй только когда реально нужна максимальная мощь.</li><li><strong>Claude Sonnet 4.6 ($3/$15 MTok):</strong> 90% задач. Написание, анализ, код, ответы на вопросы. #1 на Finance Agent benchmark. Лучший баланс качества и стоимости.</li><li><strong>Claude Haiku 4.5 ($0.25/$1.25 MTok):</strong> классификация, sentiment анализ, быстрые ответы, batch-обработка больших объёмов. В 12-20 раз дешевле Sonnet — используй для задач где скорость важнее глубины.</li></ul>
<h3>Как строить роутер между моделями</h3>
<p>Простой роутер: определяешь правила — какой тип запроса идёт к какой модели. Например: запросы с ключевыми словами "стратегия", "анализ рынка", "архитектурное решение" → Opus. Всё остальное → Sonnet. Batch-классификация, sentiment → Haiku.</p>
<p>Продвинутый роутер: Sonnet сам классифицирует запрос и решает нужен ли Opus. Если задача сложная — эскалирует. Это снижает стоимость ещё на 30-40%.</p>
<h3>Advisor Tool — официальный паттерн Anthropic</h3>
<p>Advisor Tool (бета март 2026) — Opus получает задачу, анализирует её, даёт Sonnet план и критерии проверки. Sonnet выполняет, Opus проверяет результат. Итог: качество близкое к "чистому Opus" при стоимости в 3-4 раза ниже.</p>
<div class="info-box"><strong>ℹ️ Совет по мониторингу расходов:</strong> Всегда добавляй логирование количества токенов для каждого запроса с первого дня. Без этого сюрпризы в счёте гарантированы. Anthropic предоставляет Usage Dashboard на console.anthropic.com.</div>`,
   prompts:[{l:'Роутер',p:`Мульти-AI архитектура.\n\nЗАДАЧИ:\n- [задача 1]\n- [задача 2]\n\nДОСТУПНО: Opus 4.7, Sonnet 4.6, Haiku 4.5\n\n1. Маппинг задач → модель\n2. Логика роутинга\n3. Python код роутера\n4. Cost vs quality оценка\n5. Когда Advisor Tool`},{l:'Advisor Tool',p:`Advisor + Executor.\n\nЗАДАЧА: [сложная]\nADVISOR: claude-opus-4-7-20250514-7-20250514\nEXECUTOR: claude-sonnet-4-6-20250514\nBETA: advisor-tool-2026-03-01\n\nКод + отслеживание cost vs quality.`}],
   steps:[{s:'Скопируй роутер',copy:true},{s:'Определи маппинг для своей системы'},{s:'Измерь cost vs quality'},{s:'Advisor Tool для самых сложных задач'}],
   tips:['Advisor: ~5x дешевле чистого Opus','Haiku для классификации, Sonnet для генерации','Мониторь токены с первого дня']},
  {t:'LangChain + Claude 2026',xp:250,
   theory:`<h3>Что такое AI-фреймворк и зачем он нужен</h3>
<p>Когда ты используешь Claude API напрямую — ты пишешь код для каждой конкретной задачи: как передать запрос, как обработать ответ, как хранить историю диалога. При создании нескольких AI-приложений этот код начинает повторяться.</p>
<p>LangChain — фреймворк который решает типичные задачи AI-разработки один раз и правильно: история диалогов, работа с документами, агенты с инструментами, structured output. Вместо написания этого с нуля — используешь готовые компоненты.</p>
<h3>Три паттерна LangChain которые используют чаще всего</h3>
<p><strong>Conversational RAG:</strong> чат с твоими документами который помнит историю разговора. Пользователь задаёт уточняющие вопросы — система понимает контекст из предыдущих реплик. Намного сложнее реализовать без фреймворка, с LangChain — несколько строк кода.</p>
<p><strong>Agent с инструментами:</strong> Claude решает какой инструмент использовать для ответа на вопрос. Инструменты могут быть: веб-поиск, калькулятор, база данных, внешние API. Claude сам выбирает нужный и формулирует ответ на основе результата.</p>
<p><strong>Structured Output:</strong> принуждает Claude вернуть ответ в виде Python-объекта (Pydantic модели). Не нужно парсить JSON вручную — получаешь типизированный объект.</p>
<h3>LangChain + Claude Sonnet 4.6 в 2026</h3>
<p>С появлением 1M контекстного окна у Sonnet 4.6 некоторые задачи (загрузка документов, управление памятью) упростились — всё помещается в контекст. Тем не менее LangChain остаётся ценным для production-систем: абстракции упрощают переключение между моделями, добавление новых инструментов и тестирование.</p>
<div class="warn-box"><strong>⚠️ Предупреждение о скорости изменений:</strong> LangChain обновляется очень быстро. Код который написан 6 месяцев назад может использовать устаревший API. Всегда проверяй актуальную документацию на python.langchain.com перед началом проекта.</div>`,
   prompts:[{l:'LangChain агент',p:`LangChain агент.\n\nМОДЕЛЬ: claude-sonnet-4-6-20250514\nИНСТРУМЕНТЫ:\n- Web search (Tavily)\n- Calculator\n\n1. ChatAnthropic инициализация\n2. Инструменты\n3. Агент (Tool Calling)\n4. Примеры запросов\n5. requirements.txt`}],
   steps:[{s:'Скопируй LangChain агент',copy:true},{s:'pip install langchain-anthropic'},{s:'Добавь реальные инструменты'},{s:'Деплой: FastAPI + Docker'}],
   tips:['pip install langchain-anthropic langchain-community','LangChain обновляется быстро — проверяй доки','Tool Calling через LangChain проще нативного']},
  {t:'🏆 Финальный: AI-OS',xp:500,
   theory:`<h3>Что такое персональная AI-OS и почему это важно</h3>
<p>AI-OS (AI Operating System) — это не программное обеспечение которое можно скачать. Это система организации твоей работы вокруг AI-инструментов: как они связаны между собой, какие задачи автоматизированы, как AI встроен в твой ежедневный процесс.</p>
<p>У большинства людей AI-инструменты — это набор несвязанных приложений: иногда ChatGPT, иногда Claude, иногда что-то ещё, без системы. У пользователя с AI-OS каждый инструмент занимает своё место, задачи автоматизированы, система работает даже пока ты спишь.</p>
<h3>Семь компонентов AI-OS</h3>
<ul><li><strong>Утренний ритуал (Cowork + Dispatch):</strong> автоматический дайджест из календаря, почты и задач. Начинаешь день уже зная приоритеты.</li><li><strong>Маркетинг-машина:</strong> Brand Voice → автогенерация контента → планирование публикаций. Работает по расписанию.</li><li><strong>База знаний (Obsidian + Memory + Projects):</strong> всё что узнал — структурировано и доступно. Claude знает твой контекст.</li><li><strong>Рыночная разведка (Research Digest):</strong> автоматический мониторинг конкурентов и трендов каждую неделю.</li><li><strong>Операционная система (OKR + SOP + Cowork):</strong> цели измеримы, процессы задокументированы, рутина автоматизирована.</li><li><strong>AI Stack (роутинг моделей):</strong> правильная модель для каждой задачи. Оптимальное соотношение качества и стоимости.</li><li><strong>Аналитика и решения:</strong> структурированный подход к важным решениям с поддержкой Claude.</li></ul>
<h3>Эффект компаундирования</h3>
<p>Каждый компонент AI-OS усиливает другие. Хорошая база знаний делает маркетинговые тексты точнее — потому что Claude знает твою аудиторию. Автоматизированная аналитика рынка улучшает стратегические решения. Со временем система становится умнее вместе с тобой.</p>
<div class="tip-box"><strong>💡 Как начать прямо сейчас:</strong> Не пытайся построить всю AI-OS за выходные. Выбери два компонента которые дадут максимальный эффект прямо сейчас — и начни с них. Через месяц добавь ещё один. Через год будет полноценная система.</div>`,
   prompts:[{l:'AI-OS дизайн',p:`Спроектируй мою AI-OS.\n\nБИЗНЕС: [описание]\nИНСТРУМЕНТЫ: [список]\nТОП-5 ЗАДАЧ: [список]\n\n1. УТРЕННИЙ РИТУАЛ (Cowork + Dispatch)\n2. МАРКЕТИНГ-МАШИНА\n3. БАЗА ЗНАНИЙ (Obsidian + Memory + Projects)\n4. РЫНОЧНАЯ РАЗВЕДКА\n5. ОПЕРАЦИИ (OKR + SOP)\n6. АВТОМАТИЗАЦИИ\n7. AI STACK (модели → задачи)\n\nДля каждого: ключевой промпт + инструменты.`}],

tradingbot:{id:'tradingbot',title:'AI Trading Bot',icon:'📈',color:'#7C3AED',desc:'Создание AI trading бота',diff:'exp',missions:[
  {t:'Архитектура AI Trading бота',xp:300,
   theory:`<h3>⚠️ Обязательный дисклеймер — первое что нужно прочитать</h3>
<p style="background:#FDF0F3;color:#BB2649;padding:12px;border-radius:8px;margin-bottom:14px">Алгоритмическая торговля несёт реальный финансовый риск включая полную потерю капитала. Этот трек — образовательный материал о создании аналитических инструментов. Начинай ТОЛЬКО с paper trading (симуляция без реальных денег). Не используй деньги которые не можешь позволить себе потерять. Это не финансовый совет.</p>
<h3>Что такое AI Trading бот и как он реально работает</h3>
<p>AI Trading бот — это программа которая автоматически анализирует рыночные данные и принимает (или предлагает) торговые решения. В отличие от простых алгоритмических ботов которые следуют жёстким правилам ("купи если RSI < 30"), AI-бот с Claude может понимать контекст, новостной фон, оценивать качество паттерна и объяснять своё решение на человеческом языке.</p>
<p>Ключевая архитектура: <strong>Данные → Анализ → Решение → Исполнение → Логирование</strong>. Claude выступает как "decision engine" — получает структурированные данные и возвращает структурированное решение с обоснованием.</p>
<h3>Почему Sonnet 4.6 — правильный выбор для trading бота</h3>
<p>Claude Sonnet 4.6 в мае 2026 занял первое место на Finance Agent v1.1 benchmark (63.3%). Это не случайно: модель особенно сильна в многошаговых рассуждениях с числами, взвешивании неопределённости и структурированных выводах с объяснением. Именно то что нужно для trading аналитики.</p>
<h3>Рекомендуемый стек для старта</h3>
<ul><li><strong>Broker API: Alpaca</strong> — брокер с бесплатным paper trading API. Идеален для тестирования без реальных денег. Поддерживает акции США.</li><li><strong>Market Data: yfinance</strong> — бесплатные исторические данные. Задержка ~15 минут — достаточно для swing-стратегий.</li><li><strong>AI Engine: Claude Sonnet 4.6</strong> — через официальный Python SDK.</li><li><strong>Scheduling: Claude Code Routines</strong> — запуск агента по расписанию из терминала.</li><li><strong>Alerts: Telegram Bot</strong> — уведомления о каждом решении прямо в телефон.</li></ul>
<h3>Стиль торговли определяет всё</h3>
<p>Для старта: swing trading (удержание позиций от нескольких дней до недель). Почему: больше времени на анализ, меньше влияние краткосрочного шума, задержка данных в 15 минут не критична. Intraday и scalping требуют реальных данных в режиме реального времени и значительно более сложной инфраструктуры.</p>
<div class="warn-box"><strong>⚠️ Правило №1:</strong> Начни с одного актива. AAPL или BTC — один инструмент который ты хорошо знаешь. Добавляй новые активы только после 3 месяцев стабильной работы системы на paper trading.</div>`,
   prompts:[{l:'Архитектура',p:`Спроектируй AI trading бота.\n\nСТИЛЬ: swing trading (для старта)\nАКТИВЫ: акции США (paper trading)\n\nМодули:\n1. DATA: источники + частота обновления\n2. ANALYSIS: технические индикаторы (RSI, MA, Volume, ATR)\n3. AI ENGINE: системный промпт Claude, формат JSON ответа\n4. RISK MODULE: обязательные ограничения\n5. EXECUTION: Alpaca paper API\n6. LOGGING: CSV журнал + reasoning\n7. ALERTS: Telegram уведомления\n\nАрхитектура: монолит vs микросервисы?`},{l:'Структура проекта',p:`Структура Python проекта.\n\n.env, requirements.txt, CLAUDE.md\n\nМодули:\n- data/ — сбор данных\n- analysis/ — индикаторы\n- agent/ — Claude decision engine\n- execution/ — Alpaca обёртка\n- risk/ — проверки\n- logging/ — CSV журнал\n- monitoring/ — Telegram\n- backtest/ — бэктестинг\n\nДля каждого: filename.py + описание API`}],
   steps:[{s:'Скопируй промпт архитектуры',copy:true},{s:'Получи дизайн системы'},{s:'Создай структуру проекта'},{s:'ТОЛЬКО paper trading (Alpaca sandbox)'}],
   tips:['Swing trading для старта — больше времени на анализ','1 актив для начала (AAPL или BTC)','Paper trading 3-6 месяцев ОБЯЗАТЕЛЬНО до реальных денег']},
  {t:'Data Pipeline: рыночные данные',xp:300,
   theory:`<h3>Почему качество данных важнее качества алгоритма</h3>
<p>В machine learning есть принцип: "Garbage in — garbage out" (мусор на входе — мусор на выходе). Самый умный алгоритм не спасёт если данные неправильные, устаревшие или неполные. Data Pipeline — это система которая гарантирует чистоту и актуальность данных перед тем как они попадут к Claude.</p>
<p>Типичные проблемы данных с которыми сталкиваются начинающие: NaN значения в ценах (пустые ячейки), данные за нерабочие дни (праздники), задержанные данные которые ты считаешь актуальными, несоответствие таймзон. Все эти проблемы нужно обрабатывать до передачи данных в Claude.</p>
<h3>Технические индикаторы — зачем они нужны</h3>
<p>Сырые цены (Open, High, Low, Close, Volume) содержат информацию, но её сложно интерпретировать напрямую. Технические индикаторы — это математические преобразования которые делают скрытые паттерны видимыми:</p>
<ul><li><strong>RSI (Relative Strength Index, 14):</strong> показывает "перекупленность" или "перепроданность". RSI > 70 = возможно пора фиксировать прибыль. RSI < 30 = возможно интересная точка входа. Не торговый сигнал сам по себе — контекст.</li><li><strong>SMA 20 и SMA 50 (Simple Moving Average):</strong> средняя цена за 20 и 50 дней. Цена выше SMA 20 = краткосрочный бычий тренд. Пересечение SMA 20 и SMA 50 = потенциальная смена тренда.</li><li><strong>Volume ratio:</strong> сегодняшний объём / средний объём за 20 дней. Ratio > 2 = необычно высокий объём. Движение цены на высоком объёме более значимо.</li><li><strong>ATR (Average True Range, 14):</strong> средняя волатильность за 14 дней. Помогает рассчитать правильный размер стоп-лосса.</li></ul>
<h3>Формат данных для Claude — структура имеет значение</h3>
<p>Claude получает данные в виде структурированного JSON. Чем чище и понятнее структура — тем точнее анализ. Не отправляй "сырой" DataFrame pandas — конвертируй в читаемый формат с говорящими именами полей. Добавляй метаданные: дата данных, актив, таймфрейм анализа.</p>
<div class="tip-box"><strong>💡 Sentiment новостей:</strong> Добавь анализ новостей через NewsAPI как дополнительный слой данных. Claude Haiku 4.5 (самый дешёвый) идеально подходит для batch-оценки новостей — это дешевле чем использовать Sonnet для такой простой задачи.</div>`,
   prompts:[{l:'Data Pipeline',p:`Python data pipeline.\n\nТИКЕРЫ: [список]\nИСТОЧНИК: yfinance\nИНДИКАТОРЫ: RSI(14), SMA(20/50), Volume_ratio, ATR(14)\n\n1. data_fetcher.py — загрузка + кэш\n2. indicators.py — расчёт\n3. Формат для Claude:\n{\n  \"symbol\": \"AAPL\",\n  \"price\": 185.50,\n  \"change_1d_pct\": 1.2,\n  \"rsi_14\": 62.3,\n  \"above_sma_20\": true,\n  \"volume_vs_avg\": 1.4\n}\n4. Обновление каждые 30 мин\n5. Error handling + логирование`},{l:'Sentiment новостей',p:`Sentiment анализ новостей.\n\nИСТОЧНИК: NewsAPI\nТИКЕРЫ: [список]\n\nnews_sentiment.py:\n1. Топ-5 новостей за 24ч\n2. Claude Haiku 4.5 оценивает (-5 до +5)\n3. Агрегированный score\n4. Summary нарратива\n5. Флаги: earnings_soon, analyst_upgrade\n\nHaiku 4.5 — дешевле для batch новостей.`}],
   steps:[{s:'Скопируй Data Pipeline',copy:true},{s:'pip install yfinance pandas_ta newsapi-python anthropic'},{s:'Запусти для 3-5 тикеров'},{s:'Добавь sentiment после основного pipeline'}],
   tips:['yfinance задержка ~15 мин — норма для swing','Кэшируй — не делай лишних API запросов','Validate: проверяй не NaN и дату данных']},
  {t:'Claude как Decision Engine',xp:350,
   theory:`<h3>Принцип Human-in-Loop — почему он обязателен</h3>
<p>Human-in-Loop (человек в контуре управления) — это архитектурный принцип где AI предоставляет анализ и рекомендацию, но финальное решение принимает человек. Это не ограничение системы — это осознанная защита от системных рисков.</p>
<p>Даже самый точный AI может ошибиться. Рынок меняется, появляются чёрные лебеди, алгоритм встречает ситуации на которых не тренировался. В trading ошибки стоят денег. Именно поэтому в первые 3-6 месяцев каждое решение Claude должно проходить через твоё одобрение.</p>
<h3>Системный промпт — самый важный файл в проекте</h3>
<p>Системный промпт задаёт "характер" и "дисциплину" агента. Это инструкция которую Claude получает перед каждым анализом. Что должно быть в хорошем системном промпте для trading агента:</p>
<ul><li><strong>Роль и принципы:</strong> кто этот агент, какие ценности (сохранение капитала важнее прибыли)</li><li><strong>Конкретные критерии BUY:</strong> не "когда тренд растущий" — а "SMA 20 выше SMA 50 И RSI между 40-60 И объём выше среднего И нет крупных событий в ближайшие 48 часов"</li><li><strong>HOLD по умолчанию:</strong> критически важный принцип. Если нет чёткого сигнала — HOLD. Не BUY "на всякий случай".</li><li><strong>Risk rules — абсолютные запреты:</strong> никогда не входить против основного тренда, никогда не увеличивать проигрышную позицию, максимум X% капитала в одном активе</li><li><strong>Строгий JSON формат ответа:</strong> action, confidence, reasoning, entry_price, stop_loss, take_profit, risk_flag</li></ul>
<h3>Confidence level — почему важно не только решение, но и уверенность</h3>
<p>Агент должен оценивать не только что делать (BUY/SELL/HOLD), но и насколько он уверен (HIGH/MEDIUM/LOW). LOW confidence при BUY сигнале — повод пропустить сделку или уменьшить размер позиции. Это добавляет ещё один уровень фильтрации.</p>
<div class="info-box"><strong>ℹ️ Логирование reasoning обязательно:</strong> Каждое решение Claude — сохраняй полностью включая объяснение. Через месяц это будет ценнейший датасет для понимания как агент думает, где ошибается и как улучшить системный промпт.</div>`,
   prompts:[{l:'Decision Engine',p:`Python Decision Engine.\n\nСТИЛЬ: swing trading\nРИСК: 1-2% капитала\n\n1. trading_agent_prompt.txt:\n   - Роль и принципы\n   - Критерии BUY (5+ конкретных условий)\n   - Критерии SELL\n   - HOLD по умолчанию\n   - Risk rules (запреты)\n   - Формат JSON (строгий)\n\n2. agent.py:\n   - Принимает market_snapshot dict\n   - claude-sonnet-4-6-20250514\n   - Парсит JSON ответ\n   - Логирует reasoning\n\n3. decision_validator.py:\n   - Проверки перед исполнением`},{l:'Системный промпт агента',p:`Системный промпт Trading Agent.\n\nСТИЛЬ: [swing/intraday]\nРИСК: 1% капитала/сделку\n\nСоздай промпт:\n1. Роль агента\n2. Критерии BUY (5+ условий)\n3. Критерии SELL (stop + profit)\n4. Критерии HOLD (по умолчанию!)\n5. Risk rules (что НИКОГДА)\n6. Формат JSON строгий\n7. Confidence: когда HIGH/MEDIUM/LOW\n8. risk_flag: когда true`}],
   steps:[{s:'Скопируй Decision Engine',copy:true},{s:'Создай системный промпт — потрать время'},{s:'100 dry-run на исторических данных'},{s:'Норма: BUY в 10-30% случаев от всех сигналов'}],
   tips:['Хороший промпт = дисциплинированный агент','HOLD по умолчанию — не BUY/SELL','Логируй reasoning — данные для улучшения']},
  {t:'Backtesting и оптимизация',xp:350,
   theory:`<h3>Почему backtesting обязателен и что он реально показывает</h3>
<p>Backtesting — это запуск торговой стратегии на исторических данных как будто это было реальной торговлей. Ты узнаёшь: как бы работала стратегия в прошлом. Это не гарантия будущих результатов — рынок меняется. Но это единственный способ проверить логику стратегии до вложения реальных денег.</p>
<p>Важно понимать: backtesting показывает что работало в прошлом. Рынок 2024-2025 и рынок 2026 — разные условия. Именно поэтому после backtesting следует paper trading (6 месяцев на реальном рынке без реальных денег) прежде чем переходить к реальной торговле.</p>
<h3>Ключевые метрики и что они означают</h3>
<ul><li><strong>Sharpe Ratio:</strong> отношение доходности к риску. Значение > 1.0 — хорошо. > 2.0 — отлично (и повод проверить на overfitting). < 0.5 — стратегия не работает. Это главная метрика.</li><li><strong>Max Drawdown:</strong> максимальное падение от пика до дна за тестовый период. Значение > 20% означает очень высокий риск — психологически и практически сложно выдержать такое падение.</li><li><strong>Win Rate:</strong> процент прибыльных сделок. НЕ является показателем хорошей стратегии сам по себе. 40% Win Rate с R:R 2:1 (прибыль в 2 раза больше убытка) — прибыльная стратегия.</li><li><strong>Количество сделок:</strong> минимум 100 сделок для статистической значимости. Меньше — результаты случайны и не репрезентативны.</li></ul>
<h3>Три главных ловушки backtesting</h3>
<p><strong>Overfitting (переобучение):</strong> ты оптимизируешь параметры под конкретный исторический период — стратегия идеально работает на этих данных, но провалится на будущих. Признак: очень высокий Sharpe (> 3.0) при небольшом количестве сделок.</p>
<p><strong>Look-ahead bias (использование будущего):</strong> случайно используешь данные которых не было бы в реальный момент. Например, используешь цену закрытия дня для принятия решения в начале дня. Это делает результаты нереалистично хорошими.</p>
<p><strong>Survivorship bias:</strong> тестируешь только на активах которые "выжили" и существуют сегодня. Реально в прошлом было много компаний которые обанкротились — их нет в современном списке.</p>
<div class="tip-box"><strong>💡 Out-of-sample тест — честная проверка:</strong> Разбей исторические данные: 70% для оптимизации стратегии, 30% для тестирования. Оптимизируй на первых 70%, проверь на остальных 30% которые не видел. Если результаты похожи — стратегия реальна.</div>`,
   prompts:[{l:'Backtesting',p:`Backtesting системы.\n\nДАТА: yfinance, [2 года]\nСТРАТЕГИЯ: Claude Decision Engine\nКАПИТАЛ: [сумма]\n\nbacktest.py:\n1. Исторические данные\n2. Walk-forward (нет look-ahead bias)\n3. Claude для каждого момента\n4. Slippage 0.1%\n5. Sharpe, MaxDD, WinRate, Return\n6. Equity curve matplotlib\n7. vs Buy&Hold benchmark`},{l:'Анализ результатов',p:`Анализ backtesting.\n\nRETURN: [X%], SHARPE: [X], MAX DD: [X%]\nWIN RATE: [X%], R:R: [X:1]\nСДЕЛОК: [N], ПЕРИОД: [период]\nBENCHMARK: [X%]\n\n1. Статистическая значимость?\n2. Признаки overfitting?\n3. Где теряем больше?\n4. Что улучшить в промпте?\n5. Готова к paper trading?`}],
   steps:[{s:'Скопируй backtesting',copy:true},{s:'Запусти на 2 годах (2023-2024)'},{s:'Анализ результатов'},{s:'Итерируй промпт агента 5-10 раз'}],
   tips:['Sharpe < 0.5 = не работает. > 2.0 = проверь overfitting','Out-of-sample тест = честный результат','100+ сделок для статистической значимости']},
  {t:'Деплой и мониторинг в продакшн',xp:400,
   theory:`<h3>Переход к реальным деньгам — когда ты готов</h3>
<p>Большинство начинающих алготрейдеров делают одну ошибку: переходят к реальным деньгам слишком рано. Энтузиазм после хорошего backtesting — плохой советчик. Checklist перехода:</p>
<ul><li>✅ 3-6 месяцев paper trading с положительным Sharpe (не менее 1.0)</li><li>✅ Минимум 50-100 сделок в paper trading — достаточная статистика</li><li>✅ Ты понимаешь каждую строку кода и каждое правило стратегии</li><li>✅ Работающий мониторинг с алертами в Telegram</li><li>✅ Готов начать с МИНИМАЛЬНО возможным размером позиции</li></ul>
<h3>Архитектура production системы</h3>
<p><strong>Хостинг (Railway.app, $5-7/мес):</strong> Python-приложение которое запускается 24/7. Railway подключается к GitHub репозиторию и автоматически деплоит при каждом коммите. Это означает: исправил баг → запушил → система обновилась. Без ручного деплоя.</p>
<p><strong>Human-in-Loop первые 3 месяца:</strong> каждое решение бота приходит тебе в Telegram ДО исполнения ордера. Ты одобряешь или отклоняешь. Это замедляет работу — зато позволяет поймать системные ошибки прежде чем они дорого обойдутся.</p>
<p><strong>Telegram алерты — что должно приходить:</strong> каждое решение с reasoning (что анализировал, почему решил именно так), ежедневный P&L отчёт, алерт если drawdown превысил установленный порог.</p>
<h3>Risk Manager — обязательный компонент</h3>
<p>Risk Manager — это набор жёстких правил которые проверяются ПЕРЕД каждым ордером, независимо от того что решил Claude:</p>
<ul><li>Максимум X% от портфеля в одной позиции (рекомендация: 2-5%)</li><li>Если дневной убыток достиг Y% — остановить торговлю до следующего дня</li><li>Если недельный убыток достиг Z% — остановить торговлю до ручного перезапуска</li></ul>
<p>Risk Manager не обсуждает с Claude — он просто блокирует ордер если правило нарушено. Это последняя линия защиты.</p>
<div class="warn-box"><strong>⚠️ Абсолютное правило:</strong> Держи paper trading параллельно с реальной торговлей всё время. Это даёт baseline: если реальные результаты сильно отличаются от paper — значит что-то пошло не так и нужно остановиться и разобраться.</div>`,
   prompts:[{l:'Production бот',p:`Production trading бот.\n\nРЕЖИМ: paper trading ОБЯЗАТЕЛЬНО\nБРОКЕР: Alpaca Paper API\nХОСТИНГ: Railway\n\n1. main.py — loop 3x/день (10:00, 14:00, 18:00)\n2. alpaca_broker.py — paper mode обёртка\n3. risk_manager.py:\n   - Макс X% в позиции\n   - Макс Y% дневного убытка → стоп\n   - Проверки перед ордером\n4. telegram_alerts.py — каждое решение ДО исполнения\n5. journal.py — CSV + reasoning Claude\n6. health_check.py\n\nDocker + Railway deploy конфиг`},{l:'Streamlit дашборд',p:`Дашборд мониторинга.\n\nДАТАСОРС: CSV журнал\n\n1. Equity curve\n2. Win rate последних N\n3. Открытые позиции\n4. Последние 10 решений + reasoning\n5. P&L дн/нед/мес\n6. Drawdown\n7. Алерт если drawdown > 10%\n\nАвтообновление каждые 5 мин.`}],
   steps:[{s:'Скопируй production бот',copy:true},{s:'Деплой на Railway: GitHub → автодеплой'},{s:'Telegram алерты — каждое решение вручную первые 3 месяца'},{s:'ТОЛЬКО PAPER TRADING минимум 3 месяца'}],
   tips:['Railway $5/мес + GitHub автодеплой = идеально','Алерт ДО исполнения — обязателен для безопасности','Первые 3 месяца: ежедневно проверяй reasoning']}
]},
};
